<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Threat Actor Globe — Threatpedia</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* Design system colors */
        :root {
            --bg: #080b10;
            --surface: #0d1117;
            --border: #1e2733;
            --amber: #e8a020;
            --amber-dim: #a06a10;
            --text: #cdd5e0;
            --muted: #5a6a7e;
            --white: #f0f4f8;
            --red: #e04040;
            --blue: #40a0e0;
            --purple: #a020e0;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: var(--bg);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
        }

        /* Navigation */
        nav {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 60px;
            background: linear-gradient(180deg, rgba(8,11,16,0.95) 0%, rgba(8,11,16,0.8) 100%);
            border-bottom: 1px solid var(--border);
            z-index: 100;
            display: flex;
            align-items: center;
            padding: 0 20px;
            backdrop-filter: blur(10px);
        }

        .nav-brand {
            font-size: 18px;
            font-weight: 600;
            color: var(--amber);
            letter-spacing: 1px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .nav-brand::before {
            content: '◆';
            font-size: 14px;
        }

        .hamburger {
            margin-left: auto;
            cursor: pointer;
            width: 40px;
            height: 40px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 5px;
            transition: opacity 0.2s;
        }

        .hamburger:hover {
            opacity: 0.7;
        }

        .hamburger span {
            width: 24px;
            height: 2px;
            background: var(--text);
            border-radius: 1px;
            transition: all 0.3s;
        }

        /* Canvas */
        #globeCanvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        /* Timeline Container */
        .timeline-container {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: 120px;
            background: linear-gradient(180deg, rgba(8,11,16,0) 0%, rgba(8,11,16,0.95) 40%, rgba(13,17,23,0.98) 100%);
            border-top: 1px solid var(--border);
            z-index: 50;
            padding: 20px 20px 15px;
            backdrop-filter: blur(10px);
        }

        .timeline-controls {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 12px;
        }

        .play-button {
            width: 36px;
            height: 36px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 4px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--amber);
            font-size: 14px;
            transition: all 0.2s;
        }

        .play-button:hover {
            background: var(--amber);
            color: var(--bg);
        }

        .play-button.playing {
            background: var(--amber);
            color: var(--bg);
        }

        .year-display {
            font-size: 13px;
            color: var(--muted);
            min-width: 100px;
            font-variant-numeric: tabular-nums;
        }

        .year-display strong {
            color: var(--amber);
            font-weight: 600;
        }

        .timeline-track {
            position: relative;
            height: 6px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 3px;
            cursor: pointer;
            overflow: hidden;
            flex: 1;
        }

        .timeline-progress {
            height: 100%;
            background: linear-gradient(90deg, var(--amber) 0%, var(--amber-dim) 100%);
            width: 0%;
            transition: width 0.1s linear;
            border-radius: 2px;
        }

        .timeline-scrubber {
            position: absolute;
            top: 50%;
            left: 0%;
            width: 14px;
            height: 14px;
            background: var(--amber);
            border: 2px solid var(--bg);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            cursor: grab;
            box-shadow: 0 0 20px rgba(232, 160, 32, 0.6);
            z-index: 2;
            transition: box-shadow 0.2s;
        }

        .timeline-scrubber:hover {
            box-shadow: 0 0 30px rgba(232, 160, 32, 0.8);
        }

        .timeline-scrubber.dragging {
            cursor: grabbing;
            box-shadow: 0 0 40px rgba(232, 160, 32, 1);
        }

        .timeline-events {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
        }

        .timeline-event {
            position: absolute;
            width: 2px;
            height: 100%;
            background: var(--border);
            top: 0;
        }

        .timeline-event.active {
            background: var(--amber);
        }

        /* Legend and Info */
        .legend-sidebar {
            position: fixed;
            bottom: 130px;
            right: 20px;
            background: rgba(13, 17, 23, 0.9);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 16px;
            max-width: 240px;
            backdrop-filter: blur(10px);
            font-size: 12px;
            z-index: 40;
        }

        .legend-title {
            font-weight: 600;
            color: var(--amber);
            margin-bottom: 12px;
            font-size: 13px;
            letter-spacing: 0.5px;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 8px;
            color: var(--text);
        }

        .legend-item:last-child {
            margin-bottom: 0;
        }

        .legend-color {
            width: 12px;
            height: 12px;
            border-radius: 2px;
            flex-shrink: 0;
        }

        .legend-divider {
            height: 1px;
            background: var(--border);
            margin: 12px 0;
        }

        .legend-stat {
            font-size: 11px;
            color: var(--muted);
            margin-top: 12px;
            padding-top: 12px;
            border-top: 1px solid var(--border);
        }

        .legend-stat strong {
            color: var(--text);
        }

        /* Hover Tooltip */
        .tooltip {
            position: fixed;
            background: rgba(13, 17, 23, 0.98);
            border: 1px solid var(--border);
            border-radius: 4px;
            padding: 12px;
            pointer-events: none;
            font-size: 12px;
            max-width: 250px;
            z-index: 1000;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(10px);
            display: none;
        }

        .tooltip.visible {
            display: block;
        }

        .tooltip-title {
            font-weight: 600;
            color: var(--amber);
            margin-bottom: 4px;
        }

        .tooltip-text {
            color: var(--text);
            line-height: 1.4;
        }

        /* Loading state */
        .loading {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: var(--amber);
            font-size: 14px;
            z-index: 200;
            text-align: center;
        }

        .loading::after {
            content: '';
            display: inline-block;
            width: 4px;
            height: 4px;
            margin-left: 4px;
            background: var(--amber);
            border-radius: 50%;
            animation: blink 1.5s infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 1; }
        }

        /* Year labels on timeline */
        .timeline-years {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 16px;
            display: flex;
            justify-content: space-between;
            padding: 0 10px;
            font-size: 10px;
            color: var(--muted);
        }

        .year-label {
            text-align: center;
            flex: 1;
        }
    </style>
</head>
<body>
    <!-- Navigation -->
    <nav>
        <div class="nav-brand">Threatpedia</div>
        <div class="hamburger">
            <span></span>
            <span></span>
            <span></span>
        </div>
    </nav>

    <!-- Canvas -->
    <canvas id="globeCanvas"></canvas>

    <!-- Timeline -->
    <div class="timeline-container">
        <div class="timeline-controls">
            <button class="play-button" id="playButton" title="Play timeline">▶</button>
            <div class="year-display">
                <strong id="yearDisplay">2010</strong> — <strong id="yearEnd">2026</strong>
            </div>
            <div style="flex: 1; position: relative;">
                <div class="timeline-track">
                    <div class="timeline-events" id="timelineEvents"></div>
                    <div class="timeline-progress" id="timelineProgress"></div>
                    <div class="timeline-scrubber" id="timelineScrubber"></div>
                </div>
                <div class="timeline-years" id="timelineYears"></div>
            </div>
        </div>
    </div>

    <!-- Legend -->
    <div class="legend-sidebar">
        <div class="legend-title">THREAT ACTORS</div>
        <div class="legend-item">
            <div class="legend-color" style="background: #e8a020;"></div>
            <span>Nation-State Espionage</span>
        </div>
        <div class="legend-item">
            <div class="legend-color" style="background: #e04040;"></div>
            <span>Financial/Cybercrime</span>
        </div>
        <div class="legend-item">
            <div class="legend-color" style="background: #40a0e0;"></div>
            <span>Hacktivist</span>
        </div>
        <div class="legend-item">
            <div class="legend-color" style="background: #a020e0;"></div>
            <span>Destructive/Wiper</span>
        </div>
        <div class="legend-divider"></div>
        <div class="legend-stat">
            <div>Showing: <strong id="visibleCount">0</strong> attacks</div>
            <div style="margin-top: 4px;">Period: <strong id="periodLabel">2010-2026</strong></div>
        </div>
    </div>

    <!-- Tooltip -->
    <div class="tooltip" id="tooltip">
        <div class="tooltip-title" id="tooltipTitle"></div>
        <div class="tooltip-text" id="tooltipText"></div>
    </div>

    <!-- Loading indicator (will be hidden) -->
    <div class="loading" id="loading">Initializing globe...</div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        // Design system
        const colors = {
            bg: 0x080b10,
            surface: 0x0d1117,
            border: 0x1e2733,
            amber: 0xe8a020,
            amberDim: 0xa06a10,
            text: 0xcdd5e0,
            muted: 0x5a6a7e,
            red: 0xe04040,
            blue: 0x40a0e0,
            purple: 0xa020e0,
        };

        // Threat actor type colors
        const actorTypeColors = {
            'nation-state': colors.amber,
            'espionage': colors.amber,
            'financial': colors.red,
            'cybercrime': colors.red,
            'hacktivist': colors.blue,
            'destructive': colors.purple,
            'wiper': colors.purple,
            'ransomware': colors.red,
            'supply-chain': colors.blue,
            'defi-exploit': colors.red,
            'data-breach': colors.blue,
            'data-extortion': colors.red,
        };

        // Global state
        const state = {
            year: 2010,
            minYear: 2010,
            maxYear: 2026,
            isPlaying: false,
            isDragging: false,
            visibleAttacks: [],
            allAttacks: [],
            camera: null,
            controls: null,
            scene: null,
            globe: null,
            originDots: null,
            targetDots: null,
            arcs: null,
            particles: null,
        };

        // Country coordinates (lat, lon -> x, y, z on unit sphere)
        const countryCoords = {
            'Russia': [55.75, 37.62],
            'China': [39.9, 116.4],
            'North Korea': [39.02, 125.75],
            'Iran': [35.69, 51.39],
            'US': [38.9, -77.04],
            'United States': [38.9, -77.04],
            'UK': [51.51, -0.13],
            'Ukraine': [50.45, 30.52],
            'Germany': [52.52, 13.41],
            'France': [48.86, 2.35],
            'Italy': [41.9, 12.5],
            'Japan': [35.68, 139.69],
            'Australia': [-33.87, 151.21],
            'Canada': [45.42, -75.7],
            'India': [28.61, 77.23],
            'South Korea': [37.57, 126.98],
            'Israel': [31.77, 35.19],
            'Singapore': [1.35, 103.82],
            'Mexico': [19.43, -99.13],
            'Brazil': [-23.55, -46.63],
            'EU': [48.86, 2.35], // Default to France
            'Global': [0, 0],
        };

        // Representative attack dataset (real actors, realistic scenarios)
        const attackDataset = [
            // APT28 (Russia) - US/NATO targets
            { year: 2015, from: 'Russia', to: 'US', actor: 'APT28', title: 'DNC Email Compromise', type: 'espionage', severity: 9 },
            { year: 2016, from: 'Russia', to: 'US', actor: 'APT28', title: 'State Department Campaign', type: 'espionage', severity: 8 },
            { year: 2018, from: 'Russia', to: 'Ukraine', actor: 'Sandworm', title: 'Power Grid Attack', type: 'destructive', severity: 9 },
            { year: 2020, from: 'Russia', to: 'US', actor: 'APT29', title: 'SolarWinds Supply Chain', type: 'espionage', severity: 10 },
            { year: 2023, from: 'Russia', to: 'Ukraine', actor: 'Sandworm', title: 'Wiper Campaign', type: 'destructive', severity: 9 },

            // Lazarus Group (North Korea) - Global financial targets
            { year: 2013, from: 'North Korea', to: 'US', actor: 'Lazarus', title: 'Sony Pictures Attack', type: 'destructive', severity: 9 },
            { year: 2016, from: 'North Korea', to: 'Bangladesh', actor: 'Lazarus', title: 'Central Bank Heist', type: 'financial', severity: 10 },
            { year: 2017, from: 'North Korea', to: 'Global', actor: 'Lazarus', title: 'WannaCry Campaign', type: 'destructive', severity: 9 },
            { year: 2018, from: 'North Korea', to: 'Global', actor: 'Lazarus', title: 'Crypto Exchange Hack', type: 'financial', severity: 8 },
            { year: 2021, from: 'North Korea', to: 'Global', actor: 'Lazarus', title: 'DeFi Protocol Exploit', type: 'financial', severity: 8 },
            { year: 2024, from: 'North Korea', to: 'Global', actor: 'UNC1069', title: 'Axie Infinity Exploit', type: 'financial', severity: 9 },
            { year: 2026, from: 'North Korea', to: 'Global', actor: 'Lazarus', title: 'Drift Protocol $285M Exploit', type: 'financial', severity: 10 },

            // APT41/APT1 (China) - Global tech/telecom
            { year: 2014, from: 'China', to: 'US', actor: 'APT1', title: 'OPM Data Breach', type: 'espionage', severity: 9 },
            { year: 2017, from: 'China', to: 'Australia', actor: 'APT10', title: 'Managed Service Provider', type: 'espionage', severity: 8 },
            { year: 2019, from: 'China', to: 'UK', actor: 'APT41', title: 'Managed Service Attack', type: 'espionage', severity: 8 },
            { year: 2021, from: 'China', to: 'Global', actor: 'APT41', title: 'MSEXEC Campaign', type: 'espionage', severity: 7 },
            { year: 2022, from: 'China', to: 'US', actor: 'APT1', title: 'SMTP Compromise', type: 'espionage', severity: 7 },
            { year: 2024, from: 'China', to: 'Japan', actor: 'APT27', title: 'Telecom Espionage', type: 'espionage', severity: 8 },

            // Iran (Handala, MuddyWater) - Middle East, Global
            { year: 2019, from: 'Iran', to: 'Israel', actor: 'APT33', title: 'Aerospace Targeting', type: 'espionage', severity: 7 },
            { year: 2021, from: 'Iran', to: 'Global', actor: 'MuddyWater', title: 'Supply Chain Attack', type: 'espionage', severity: 7 },
            { year: 2026, from: 'Iran', to: 'Global', actor: 'Handala', title: 'Stryker Medical Device Wiper', type: 'destructive', severity: 9 },

            // TeamPCP (Unknown/Global) - Supply chain
            { year: 2025, from: 'Global', to: 'Global', actor: 'TeamPCP', title: 'PyPI/GitHub Actions Campaign', type: 'supply-chain', severity: 9 },
            { year: 2026, from: 'Global', to: 'EU', actor: 'TeamPCP', title: 'European Commission Breach', type: 'supply-chain', severity: 9 },
            { year: 2026, from: 'Global', to: 'Global', actor: 'UNC1069', title: 'Axios npm Compromise', type: 'supply-chain', severity: 9 },

            // Ransomware groups
            { year: 2023, from: 'Global', to: 'US', actor: 'RansomHouse', title: 'Municipal Ransomware', type: 'financial', severity: 7 },
            { year: 2024, from: 'Global', to: 'Germany', actor: 'Qilin', title: 'Political Party Attack', type: 'financial', severity: 7 },
            { year: 2025, from: 'Global', to: 'EU', actor: 'RansomHouse', title: 'Cultural Institution Attack', type: 'financial', severity: 7 },

            // Financial/Cybercrime
            { year: 2022, from: 'Global', to: 'Global', actor: 'ShinyHunters', title: 'Snowflake Data Theft', type: 'financial', severity: 8 },
            { year: 2023, from: 'Global', to: 'Global', actor: 'ShinyHunters', title: 'SaaS Extortion Campaign', type: 'financial', severity: 8 },

            // Healthcare/Other
            { year: 2026, from: 'Global', to: 'France', actor: 'Unknown', title: 'Healthcare Data Breach', type: 'financial', severity: 8 },
            { year: 2026, from: 'Global', to: 'US', actor: 'Unknown', title: 'Municipal Ransomware', type: 'financial', severity: 7 },
        ];

        // Lat/Lon to 3D position on sphere
        function latLonToVec3(lat, lon, radius = 1) {
            const phi = (90 - lat) * Math.PI / 180;
            const theta = (lon + 180) * Math.PI / 180;
            return new THREE.Vector3(
                radius * Math.sin(phi) * Math.cos(theta),
                radius * Math.cos(phi),
                radius * Math.sin(phi) * Math.sin(theta)
            );
        }

        // Get actor type color
        function getActorColor(attackType) {
            for (const [key, color] of Object.entries(actorTypeColors)) {
                if (attackType.toLowerCase().includes(key)) {
                    return color;
                }
            }
            return colors.amber;
        }

        // Get attack type label
        function getActorTypeLabel(type) {
            const typeMap = {
                'espionage': 'Nation-State Espionage',
                'financial': 'Financial/Cybercrime',
                'ransomware': 'Financial/Cybercrime',
                'supply-chain': 'Supply Chain',
                'destructive': 'Destructive/Wiper',
                'wiper': 'Destructive/Wiper',
                'defi-exploit': 'Financial/Cybercrime',
            };
            return typeMap[type] || 'Threat Activity';
        }

        // Initialize Three.js scene
        function initScene() {
            const canvas = document.getElementById('globeCanvas');
            const scene = new THREE.Scene();
            const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 10000);
            const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });

            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.setClearColor(colors.bg, 1);

            camera.position.z = 2.5;

            state.scene = scene;
            state.camera = camera;
            state.renderer = renderer;

            // Lighting
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
            scene.add(ambientLight);

            const directionalLight = new THREE.DirectionalLight(0xffffff, 1);
            directionalLight.position.set(2, 2, 2);
            scene.add(directionalLight);

            // Add glow light
            const glowLight = new THREE.PointLight(colors.amber, 0.3);
            glowLight.position.set(0, 0, 0);
            scene.add(glowLight);

            // Create globe
            createGlobe();
            createLocationDots();
            createArcsGroup();

            // Mouse controls
            setupMouseControls();

            // Resize handler
            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            });

            // Animation loop
            animate();
        }

        // Create globe geometry
        function createGlobe() {
            const geometry = new THREE.IcosahedronGeometry(1, 32);
            const material = new THREE.MeshPhongMaterial({
                color: 0x0a1628,
                emissive: 0x051219,
                wireframe: false,
                flatShading: false,
            });

            const globe = new THREE.Mesh(geometry, material);
            state.scene.add(globe);
            state.globe = globe;

            // Add grid lines
            const gridGeometry = new THREE.IcosahedronGeometry(1.001, 32);
            const gridMaterial = new THREE.MeshBasicMaterial({
                color: colors.border,
                wireframe: true,
                transparent: true,
                opacity: 0.2,
            });
            const gridMesh = new THREE.Mesh(gridGeometry, gridMaterial);
            state.scene.add(gridMesh);

            // Add glow
            const glowGeometry = new THREE.IcosahedronGeometry(1.05, 32);
            const glowMaterial = new THREE.MeshBasicMaterial({
                color: colors.amber,
                transparent: true,
                opacity: 0.05,
            });
            const glowMesh = new THREE.Mesh(glowGeometry, glowMaterial);
            state.scene.add(glowMesh);
        }

        // Create location dots (origin and target)
        function createLocationDots() {
            const originGroup = new THREE.Group();
            const targetGroup = new THREE.Group();

            state.scene.add(originGroup);
            state.scene.add(targetGroup);

            state.originDots = originGroup;
            state.targetDots = targetGroup;
        }

        // Create arcs group
        function createArcsGroup() {
            const arcsGroup = new THREE.Group();
            state.scene.add(arcsGroup);
            state.arcs = arcsGroup;
        }

        // Create arc from source to target
        function createArc(from, to, color, attackData) {
            const start = latLonToVec3(from[0], from[1], 1.01);
            const end = latLonToVec3(to[0], to[1], 1.01);

            // Create curve
            const midpoint = new THREE.Vector3().addVectors(start, end).multiplyScalar(0.5).normalize().multiplyScalar(1.3);
            const curve = new THREE.QuadraticBezierCurve3(start, midpoint, end);
            const points = curve.getPoints(100);

            // Create line
            const geometry = new THREE.BufferGeometry().setFromPoints(points);
            const material = new THREE.LineBasicMaterial({
                color,
                linewidth: 2,
                transparent: true,
                opacity: 0.7,
            });

            const line = new THREE.Line(geometry, material);
            line.userData = {
                attackData,
                color,
                fullOpacity: 0.7,
                isArc: true,
            };

            state.arcs.add(line);
            return line;
        }

        // Create location dot
        function createDot(position, radius, color, isOrigin = true) {
            const geometry = new THREE.SphereGeometry(radius, 16, 16);
            const material = new THREE.MeshBasicMaterial({ color });
            const dot = new THREE.Mesh(geometry, material);
            dot.position.copy(position);

            // Add glow
            const glowGeometry = new THREE.SphereGeometry(radius * 1.5, 16, 16);
            const glowMaterial = new THREE.MeshBasicMaterial({
                color,
                transparent: true,
                opacity: 0.3,
            });
            const glowDot = new THREE.Mesh(glowGeometry, glowMaterial);
            glowDot.position.copy(position);

            const group = new THREE.Group();
            group.add(dot);
            group.add(glowDot);
            group.userData = { isOrigin, position };

            return group;
        }

        // Update visualization for current year
        function updateVisualization() {
            // Clear previous arcs and dots
            state.arcs.clear();
            state.originDots.clear();
            state.targetDots.clear();

            // Filter attacks by year
            state.visibleAttacks = attackDataset.filter(a => a.year <= state.year);

            // Track locations
            const origins = new Map();
            const targets = new Map();

            // Create arcs and collect locations
            state.visibleAttacks.forEach(attack => {
                const fromCoords = countryCoords[attack.from] || countryCoords.Global;
                const toCoords = countryCoords[attack.to] || countryCoords.Global;

                const fromPos = latLonToVec3(fromCoords[0], fromCoords[1], 1.01);
                const toPos = latLonToVec3(toCoords[0], toCoords[1], 1.01);

                const color = getActorColor(attack.type);

                // Create arc
                createArc(fromCoords, toCoords, color, attack);

                // Track origins
                const originKey = `${fromCoords[0]},${fromCoords[1]}`;
                origins.set(originKey, {
                    pos: fromPos,
                    color,
                    count: (origins.get(originKey)?.count || 0) + 1,
                });

                // Track targets
                const targetKey = `${toCoords[0]},${toCoords[1]}`;
                targets.set(targetKey, {
                    pos: toPos,
                    color,
                    count: (targets.get(targetKey)?.count || 0) + 1,
                });
            });

            // Create dots
            origins.forEach((data) => {
                const radius = 0.02 + (data.count * 0.01);
                const dot = createDot(data.pos, Math.min(radius, 0.08), data.color, true);
                state.originDots.add(dot);
            });

            targets.forEach((data) => {
                const radius = 0.01 + (data.count * 0.005);
                const dot = createDot(data.pos, Math.min(radius, 0.04), data.color, false);
                state.targetDots.add(dot);
            });

            // Update legend
            document.getElementById('visibleCount').textContent = state.visibleAttacks.length;
            document.getElementById('periodLabel').textContent = `2010-${state.year}`;

            // Update timeline progress
            const progress = ((state.year - state.minYear) / (state.maxYear - state.minYear)) * 100;
            document.getElementById('timelineProgress').style.width = progress + '%';
            document.getElementById('timelineScrubber').style.left = progress + '%';
            document.getElementById('yearDisplay').textContent = state.year;
        }

        // Mouse controls
        function setupMouseControls() {
            let isDragging = false;
            let previousMousePosition = { x: 0, y: 0 };

            state.renderer.domElement.addEventListener('mousedown', (e) => {
                isDragging = true;
                previousMousePosition = { x: e.clientX, y: e.clientY };
            });

            state.renderer.domElement.addEventListener('mousemove', (e) => {
                if (isDragging) {
                    const deltaX = e.clientX - previousMousePosition.x;
                    const deltaY = e.clientY - previousMousePosition.y;

                    state.globe.rotation.y += deltaX * 0.01;
                    state.globe.rotation.x += deltaY * 0.01;

                    previousMousePosition = { x: e.clientX, y: e.clientY };
                }

                // Ray casting for arc interaction
                const raycaster = new THREE.Raycaster();
                const mouse = new THREE.Vector2((e.clientX / window.innerWidth) * 2 - 1, -(e.clientY / window.innerHeight) * 2 + 1);
                raycaster.setFromCamera(mouse, state.camera);

                // Check intersection with arcs
                const intersects = raycaster.intersectObjects(state.arcs.children);

                if (intersects.length > 0) {
                    const arc = intersects[0].object;
                    if (arc.userData.isArc) {
                        showTooltip(e.clientX, e.clientY, arc.userData.attackData);
                        arc.material.opacity = Math.min(arc.userData.fullOpacity * 1.5, 1);
                    }
                } else {
                    state.arcs.children.forEach(arc => {
                        arc.material.opacity = arc.userData.fullOpacity;
                    });
                    hideTooltip();
                }
            });

            state.renderer.domElement.addEventListener('mouseup', () => {
                isDragging = false;
            });

            // Scroll to zoom
            state.renderer.domElement.addEventListener('wheel', (e) => {
                e.preventDefault();
                state.camera.position.z += e.deltaY * 0.001;
                state.camera.position.z = Math.max(1.5, Math.min(5, state.camera.position.z));
            });
        }

        // Tooltip functions
        function showTooltip(x, y, attackData) {
            const tooltip = document.getElementById('tooltip');
            document.getElementById('tooltipTitle').textContent = attackData.actor;
            document.getElementById('tooltipText').textContent = `${attackData.title}\n${attackData.from} → ${attackData.to}\n${attackData.year}`;
            tooltip.style.left = x + 15 + 'px';
            tooltip.style.top = y + 15 + 'px';
            tooltip.classList.add('visible');
        }

        function hideTooltip() {
            document.getElementById('tooltip').classList.remove('visible');
        }

        // Timeline controls
        function setupTimeline() {
            const scrubber = document.getElementById('timelineScrubber');
            const track = scrubber.parentElement;
            const playButton = document.getElementById('playButton');

            // Timeline scrubber
            let isDraggingTimeline = false;

            scrubber.addEventListener('mousedown', () => {
                isDraggingTimeline = true;
                scrubber.classList.add('dragging');
                state.isDragging = true;
                state.isPlaying = false;
                playButton.textContent = '▶';
                playButton.classList.remove('playing');
            });

            document.addEventListener('mousemove', (e) => {
                if (isDraggingTimeline) {
                    const rect = track.getBoundingClientRect();
                    let x = e.clientX - rect.left;
                    x = Math.max(0, Math.min(x, rect.width));

                    const percent = x / rect.width;
                    state.year = Math.round(state.minYear + (state.maxYear - state.minYear) * percent);
                    state.year = Math.max(state.minYear, Math.min(state.year, state.maxYear));

                    updateVisualization();
                }
            });

            document.addEventListener('mouseup', () => {
                isDraggingTimeline = false;
                scrubber.classList.remove('dragging');
                state.isDragging = false;
            });

            // Click on track to jump
            track.addEventListener('click', (e) => {
                if (!isDraggingTimeline) {
                    const rect = track.getBoundingClientRect();
                    const x = e.clientX - rect.left;
                    const percent = x / rect.width;
                    state.year = Math.round(state.minYear + (state.maxYear - state.minYear) * percent);
                    state.year = Math.max(state.minYear, Math.min(state.year, state.maxYear));
                    updateVisualization();
                }
            });

            // Play button
            playButton.addEventListener('click', () => {
                state.isPlaying = !state.isPlaying;
                playButton.textContent = state.isPlaying ? '⏸' : '▶';
                playButton.classList.toggle('playing');
            });

            // Populate year labels
            const yearsContainer = document.getElementById('timelineYears');
            for (let year = 2010; year <= 2026; year += 2) {
                const label = document.createElement('div');
                label.className = 'year-label';
                label.textContent = year;
                yearsContainer.appendChild(label);
            }

            // Add event markers to timeline
            const eventsContainer = document.getElementById('timelineEvents');
            const yearCounts = {};
            attackDataset.forEach(a => {
                yearCounts[a.year] = (yearCounts[a.year] || 0) + 1;
            });

            Object.keys(yearCounts).forEach(year => {
                const percent = ((year - state.minYear) / (state.maxYear - state.minYear)) * 100;
                const event = document.createElement('div');
                event.className = 'timeline-event';
                event.style.left = percent + '%';
                event.id = `event-${year}`;
                eventsContainer.appendChild(event);
            });
        }

        // Animation loop
        let lastPlayTime = 0;
        function animate() {
            requestAnimationFrame(animate);

            // Auto-rotate globe
            if (!state.isDragging) {
                state.globe.rotation.y += 0.0001;
            }

            // Play timeline
            if (state.isPlaying && !state.isDragging) {
                const now = Date.now();
                if (now - lastPlayTime > 100) {
                    state.year += 1;
                    if (state.year > state.maxYear) {
                        state.year = state.minYear;
                    }
                    updateVisualization();
                    lastPlayTime = now;
                }
            }

            // Pulse dots
            state.originDots.children.forEach(dot => {
                const scale = 1 + Math.sin(Date.now() * 0.003) * 0.15;
                dot.children[1].scale.set(scale, scale, scale);
            });

            state.targetDots.children.forEach(dot => {
                const scale = 1 + Math.sin(Date.now() * 0.002 + 1) * 0.1;
                dot.children[1].scale.set(scale, scale, scale);
            });

            // Animate arc pulses
            state.arcs.children.forEach((arc, index) => {
                const pulse = Math.sin(Date.now() * 0.005 + index * 0.1) * 0.3 + 0.7;
                arc.material.opacity = arc.userData.fullOpacity * pulse;
            });

            state.renderer.render(state.scene, state.camera);
        }

        // Initialize
        window.addEventListener('load', () => {
            initScene();
            setupTimeline();
            updateVisualization();
            document.getElementById('loading').style.display = 'none';
        });

        // Google Analytics (placeholder)
        window.dataLayer = window.dataLayer || [];
        function gtag() { dataLayer.push(arguments); }
        gtag('js', new Date());
        gtag('config', 'G-THREATPEDIA');
    </script>
    <script src="assets/universal-search.js"></script>
</body>
