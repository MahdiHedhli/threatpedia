name: "Pipeline: Ingest Manual Submission"

# Triggers when a discovery submission Issue is opened
on:
  issues:
    types: [opened]

jobs:
  ingest:
    if: contains(github.event.issue.labels.*.name, 'pipeline/discovery')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v6

      - name: Checkout ingest branch
        id: branch
        env:
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          set -euo pipefail
          BRANCH="pipeline/ingest-issue-${ISSUE_NUMBER}"

          git fetch origin main
          if git ls-remote --exit-code --heads origin "$BRANCH" >/dev/null 2>&1; then
            git fetch origin "$BRANCH"
            git checkout -B "$BRANCH" "origin/$BRANCH"
            git merge --no-edit origin/main
          else
            git checkout -b "$BRANCH"
          fi

          echo "branch=$BRANCH" >> "$GITHUB_OUTPUT"

      - name: Parse Issue and create task
        id: parse
        uses: actions/github-script@v8
        with:
          script: |
            const issue = context.payload.issue;
            const body = issue.body || '';

            // ── Parse structured fields from Issue template ──────────────
            function parseField(label) {
              // GitHub Issue template renders as: ### Label\n\nValue
              const re = new RegExp(`### ${label}\\s*\\n\\n([\\s\\S]*?)(?=\\n### |$)`, 'i');
              const m = body.match(re);
              return m ? m[1].trim() : '';
            }

            const type = parseField('Article Type') || 'incident';
            const priorityRaw = parseField('Priority');
            const priority = priorityRaw.match(/P[0-3]/)?.[0] || 'P2';
            const topic = parseField('Topic');
            const sourcesRaw = parseField('Source URLs');
            const severity = parseField('Severity') || 'unknown';
            const sector = parseField('Sector');
            const geography = parseField('Geography');
            const threatActor = parseField('Threat Actor');
            const cvesRaw = parseField('CVEs');
            const notes = parseField('Additional Context');

            if (!topic) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                body: '**Pipeline Error:** No topic provided. Please edit the issue and add a topic description.'
              });
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                labels: ['pipeline/error']
              });
              return;
            }

            // Parse sources (one per line)
            const sources = sourcesRaw
              .split('\n')
              .map(s => s.trim())
              .filter(s => s.startsWith('http'));
            function normalizeUrl(rawUrl) {
              const value = String(rawUrl || '').trim().replace(/[.,;:'"()[\]]+$/g, '');
              if (!value) return null;
              try {
                const url = new URL(value);
                url.hash = '';
                if (url.pathname.length > 1 && url.pathname.endsWith('/')) {
                  url.pathname = url.pathname.slice(0, -1);
                }
                return url.toString();
              } catch {
                return null;
              }
            }

            function extractMarkdownUrls(content) {
              return [...String(content || '').matchAll(/https?:\/\/[^\s)<>\"']+/g)]
                .map(match => normalizeUrl(match[0]))
                .filter(Boolean);
            }

            const normalizedSources = [...new Set(sources.map(normalizeUrl).filter(Boolean))];

            const validTypes = new Set(['incident', 'campaign', 'threat-actor', 'zero-day']);
            if (!validTypes.has(type)) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                body: `**Pipeline Error:** Invalid article type \`${type}\`. Expected one of: incident, campaign, threat-actor, zero-day.`
              });
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                labels: ['pipeline/error']
              });
              return;
            }

            const validSeverities = new Set(['critical', 'high', 'medium', 'low', 'unknown']);
            if (!validSeverities.has(severity)) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                body: `**Pipeline Error:** Invalid severity \`${severity}\`. Expected one of: critical, high, medium, low, unknown.`
              });
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                labels: ['pipeline/error']
              });
              return;
            }

            if (normalizedSources.length === 0) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                body: '**Pipeline Error:** No valid source URLs were provided. Add at least one http(s) source URL and resubmit.'
              });
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                labels: ['pipeline/error']
              });
              return;
            }

            // Parse CVEs
            const cves = cvesRaw
              ? cvesRaw.split(',').map(c => c.trim()).filter(c => /^CVE-\d{4}-\d{4,}$/.test(c))
              : [];

            // ── Generate task ID ─────────────────────────────────────────
            const now = new Date();
            const year = now.getUTCFullYear();

            // Find next available task number
            const fs = require('fs');
            const path = require('path');
            const tasksDir = '.github/pipeline/tasks';
            const contentDir = 'site/src/content';

            // ── Dedup against queue + existing corpus URLs ────────────────
            const knownUrls = new Set();
            if (fs.existsSync(tasksDir)) {
              const files = fs.readdirSync(tasksDir);
              for (const f of files) {
                if (!/^TASK-\d{4}-\d+\.json$/.test(f)) continue;
                const full = path.join(tasksDir, f);
                try {
                  const task = JSON.parse(fs.readFileSync(full, 'utf8'));
                  for (const source of task.input?.sources || []) {
                    const normalized = normalizeUrl(source);
                    if (normalized) knownUrls.add(normalized);
                  }
                } catch {}
              }
            }

            function collectMarkdownFiles(dir, out = []) {
              if (!fs.existsSync(dir)) return out;
              for (const entry of fs.readdirSync(dir, { withFileTypes: true })) {
                const full = path.join(dir, entry.name);
                if (entry.isDirectory()) collectMarkdownFiles(full, out);
                if (entry.isFile() && full.endsWith('.md')) out.push(full);
              }
              return out;
            }

            for (const file of collectMarkdownFiles(contentDir)) {
              const content = fs.readFileSync(file, 'utf8');
              for (const url of extractMarkdownUrls(content)) {
                knownUrls.add(url);
              }
            }

            const duplicateSources = normalizedSources.filter(url => knownUrls.has(url));
            if (duplicateSources.length > 0) {
              const duplicateLines = duplicateSources.map(url => `- ${url}`).join('\n');
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                body: [
                  '**Pipeline Dedup Notice:** no task was created because at least one submitted source URL already exists in the corpus or task queue.',
                  '',
                  duplicateLines,
                  '',
                  'If this is intentionally a follow-on or correction request, update the Issue with new corroborating URLs and context, then resubmit.',
                ].join('\n'),
              });
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                labels: ['pipeline/duplicate']
              });
              return;
            }

            let maxNum = 0;
            if (fs.existsSync(tasksDir)) {
              const files = fs.readdirSync(tasksDir);
              for (const f of files) {
                const m = f.match(new RegExp(`^TASK-${year}-(\\d+)\\.json$`));
                if (m) maxNum = Math.max(maxNum, parseInt(m[1]));
              }
            }

            const openPulls = await github.paginate(github.rest.pulls.list, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              per_page: 100,
            });
            for (const pr of openPulls) {
              const prFiles = await github.paginate(github.rest.pulls.listFiles, {
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: pr.number,
                per_page: 100,
              });
              for (const file of prFiles) {
                const m = file.filename.match(new RegExp(`^${tasksDir}/TASK-${year}-(\\d+)\\.json$`));
                if (m) maxNum = Math.max(maxNum, parseInt(m[1]));
              }
            }
            const taskNum = String(maxNum + 1).padStart(4, '0');
            const taskId = `TASK-${year}-${taskNum}`;

            function acceptanceCriteriaFor(articleType) {
              const minH2Sections = {
                campaign: 7,
                'threat-actor': 6,
              };
              const minMitreMappings = {
                'threat-actor': 3,
              };

              return {
                frontmatter_valid: true,
                min_sources: 3,
                min_h2_sections: minH2Sections[articleType] || 5,
                min_mitre_mappings: minMitreMappings[articleType] || 1,
                review_status: 'draft_ai',
                schema_validation: 'pass',
                astro_build: true,
              };
            }

            // ── Build task YAML ──────────────────────────────────────────
            const candidateData = {};
            if (severity !== 'unknown') candidateData.severity = severity;
            if (sector) candidateData.sector = sector;
            if (geography) candidateData.geography = geography;
            if (threatActor) candidateData.threat_actor = threatActor;
            if (cves.length > 0) candidateData.cves = cves;

            const task = {
              task_id: taskId,
              stage: 'draft',
              type: type,
              priority: priority,
              status: 'pending',
              created: now.toISOString(),
              updated: now.toISOString(),
              source: 'manual_submission',
              submitted_by: issue.user.login,
              locked_by: null,
              locked_at: null,
              input: {
                topic: topic,
                sources: normalizedSources,
                candidate_data: Object.keys(candidateData).length > 0 ? candidateData : undefined,
                notes: notes || undefined,
              },
              specs: [
                'DATA-STANDARDS-v1.0.md',
                'EDITORIAL-WORKFLOW-SPEC.md §14A',
                'INGESTION-SPEC.md §2',
              ],
              // Canonical write shape: `acceptance_criteria` (not `acceptance`)
              // and `astro_build` (not `build_passes`) per TASK-2026-0066 /
              // Slice 4b. Readers tolerate the legacy forms for back-compat.
              acceptance_criteria: acceptanceCriteriaFor(type),
              depends_on: [],
              preconditions: [
                'editorial queue depth < 50',
              ],
              output: {
                file_pattern: `site/src/content/${type === 'threat-actor' ? 'threat-actors' : type + 's'}/{slug}.md`,
                branch: `pipeline/${taskId}`,
                pr: true,
              },
              history: [
                {
                  // Canonical creation entry carries BOTH `action: 'created'`
                  // (consumed by the runner's "Created:" display lookup) AND
                  // `{from: 'none', to: 'pending'}` (consumed by transition
                  // rendering). See docs/PIPELINE.md "Task JSON — canonical
                  // shape". TASK-2026-0066 / Slice 4b.
                  timestamp: now.toISOString(),
                  action: 'created',
                  from: 'none',
                  to: 'pending',
                  agent: issue.user.login,
                  note: `Manual submission from Issue #${issue.number}`,
                },
              ],
            };

            // ── Write task file ──────────────────────────────────────────
            // Write as JSON (easier for Actions to parse than YAML)
            const taskPath = `${tasksDir}/${taskId}.json`;
            try {
              fs.mkdirSync(tasksDir, { recursive: true });
              fs.writeFileSync(taskPath, JSON.stringify(task, null, 2) + '\n');
            } catch (error) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                body: `**Pipeline Error:** Failed to write task file \`${taskPath}\`: ${error.message}`
              });
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                labels: ['pipeline/error']
              });
              return;
            }

            core.setOutput('has_task', 'true');
            core.setOutput('task_id', taskId);
            core.setOutput('task_path', taskPath);
            core.setOutput('type', type);
            core.setOutput('priority', priority);
            core.setOutput('source_count', String(normalizedSources.length));

      - name: Commit task file
        id: commit
        if: steps.parse.outputs.has_task == 'true'
        env:
          BRANCH: ${{ steps.branch.outputs.branch }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .github/pipeline/tasks/
          if git diff --cached --quiet; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git commit -m "chore(pipeline): ingest manual submission from Issue #${{ github.event.issue.number }}"
          git push -u origin "$BRANCH"
          echo "has_changes=true" >> "$GITHUB_OUTPUT"

      - name: Create task PR
        id: pr
        if: steps.parse.outputs.has_task == 'true' && steps.commit.outputs.has_changes == 'true'
        uses: actions/github-script@v8
        env:
          BRANCH: ${{ steps.branch.outputs.branch }}
          TASK_ID: ${{ steps.parse.outputs.task_id }}
          TASK_PATH: ${{ steps.parse.outputs.task_path }}
          TYPE: ${{ steps.parse.outputs.type }}
          PRIORITY: ${{ steps.parse.outputs.priority }}
          SOURCE_COUNT: ${{ steps.parse.outputs.source_count }}
        with:
          script: |
            const { owner, repo } = context.repo;
            const branch = process.env.BRANCH;
            const taskId = process.env.TASK_ID;
            const taskPath = process.env.TASK_PATH;
            const type = process.env.TYPE;
            const priority = process.env.PRIORITY;
            const sourceCount = process.env.SOURCE_COUNT;
            const issueNumber = context.payload.issue.number;
            const label = 'pipeline/ingest';

            try {
              await github.rest.issues.getLabel({ owner, repo, name: label });
            } catch (error) {
              if (error.status === 404) {
                await github.rest.issues.createLabel({
                  owner,
                  repo,
                  name: label,
                  color: '1d76db',
                  description: 'Manual pipeline ingestion task PR',
                });
              } else {
                throw error;
              }
            }

            const title = `Pipeline ingest task — ${taskId} from Issue #${issueNumber}`;
            const body = [
              '## Pipeline ingest task',
              '',
              `This PR adds task file \`${taskPath}\` for manual submission Issue #${issueNumber}.`,
              '',
              '| Field | Value |',
              '|---|---|',
              `| Task | \`${taskId}\` |`,
              `| Type | ${type} |`,
              `| Priority | ${priority} |`,
              `| Sources | ${sourceCount} URL(s) |`,
              `| Article branch | \`pipeline/${taskId}\` |`,
              '',
              'After this PR merges, the dispatcher can pick up the task and create the article PR.',
            ].join('\n');

            const { data: existing } = await github.rest.pulls.list({
              owner,
              repo,
              state: 'open',
              head: `${owner}:${branch}`,
              per_page: 5,
            });

            let pr;
            if (existing.length > 0) {
              pr = existing[0];
              await github.rest.pulls.update({
                owner,
                repo,
                pull_number: pr.number,
                title,
                body,
              });
            } else {
              const created = await github.rest.pulls.create({
                owner,
                repo,
                head: branch,
                base: 'main',
                title,
                body,
              });
              pr = created.data;
            }

            await github.rest.issues.addLabels({
              owner,
              repo,
              issue_number: pr.number,
              labels: [label, `type/${type}`],
            });

            core.setOutput('number', String(pr.number));
            core.setOutput('url', pr.html_url);

      - name: Comment on source Issue
        if: steps.pr.outputs.number != ''
        uses: actions/github-script@v8
        env:
          TASK_ID: ${{ steps.parse.outputs.task_id }}
          TASK_PATH: ${{ steps.parse.outputs.task_path }}
          TYPE: ${{ steps.parse.outputs.type }}
          PRIORITY: ${{ steps.parse.outputs.priority }}
          SOURCE_COUNT: ${{ steps.parse.outputs.source_count }}
          PR_NUMBER: ${{ steps.pr.outputs.number }}
          PR_URL: ${{ steps.pr.outputs.url }}
        with:
          script: |
            const { owner, repo } = context.repo;
            const issue_number = context.payload.issue.number;
            const taskId = process.env.TASK_ID;
            const taskPath = process.env.TASK_PATH;
            const type = process.env.TYPE;
            const priority = process.env.PRIORITY;
            const sourceCount = process.env.SOURCE_COUNT;
            const prNumber = process.env.PR_NUMBER;
            const prUrl = process.env.PR_URL;

            await github.rest.issues.createComment({
              owner,
              repo,
              issue_number,
              body: [
                `**Pipeline Task PR Created:** \`${taskId}\``,
                '',
                '| Field | Value |',
                '|---|---|',
                `| Type | ${type} |`,
                `| Priority | ${priority} |`,
                `| Sources | ${sourceCount} URL(s) |`,
                `| Stage | draft (pending task PR) |`,
                `| Article Branch | \`pipeline/${taskId}\` |`,
                `| Task PR | [#${prNumber}](${prUrl}) |`,
                '',
                'The task will be queued for dispatcher pickup after the task PR merges.',
                '',
                `Task file: \`${taskPath}\``,
              ].join('\n'),
            });

            await github.rest.issues.addLabels({
              owner,
              repo,
              issue_number,
              labels: ['pipeline/queued', `type/${type}`],
            });
