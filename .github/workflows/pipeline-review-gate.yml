name: "Pipeline: Review Gate"

on:
  pull_request_review:
    types: [submitted, dismissed]
  issue_comment:
    types: [created, edited]
  workflow_dispatch:
    inputs:
      pr_number:
        description: "Pull request number to evaluate"
        required: true
        type: number

permissions:
  contents: read
  checks: read
  issues: read
  pull-requests: read

concurrency:
  # Non-gate issue comments still instantiate the workflow before the job-level
  # guard skips them. Keep those no-op runs out of the shared PR gate group so
  # commands such as /gemini review cannot cancel an active review-gate run.
  group: review-gate-${{ github.repository }}-${{ github.event.pull_request.number || github.event.issue.number || inputs.pr_number }}-${{ github.event_name != 'issue_comment' && 'gate' || startsWith(github.event.comment.body, '/review-gate') && 'gate' || startsWith(github.event.comment.body, '/pipeline review-gate') && 'gate' || github.run_id }}
  cancel-in-progress: true

jobs:
  review-gate:
    if: |
      github.event_name == 'workflow_dispatch' ||
      (
        github.event_name == 'pull_request_review' &&
        contains(
          fromJSON('["gemini-code-assist", "gemini-code-assist[bot]", "dangermouse-bot"]'),
          github.event.review.user.login
        )
      ) ||
      (
        github.event_name == 'issue_comment' &&
        github.event.issue.pull_request &&
        (
          startsWith(github.event.comment.body, '/review-gate') ||
          startsWith(github.event.comment.body, '/pipeline review-gate')
        )
      )
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Resolve pull request number
        id: pr
        shell: bash
        run: |
          set -euo pipefail

          case "${{ github.event_name }}" in
            workflow_dispatch)
              number="${{ inputs.pr_number }}"
              ;;
            pull_request_review)
              number="${{ github.event.pull_request.number }}"
              ;;
            issue_comment)
              number="${{ github.event.issue.number }}"
              ;;
            *)
              echo "Unsupported event: ${{ github.event_name }}" >&2
              exit 1
              ;;
          esac

          echo "number=${number}" >> "$GITHUB_OUTPUT"

      - name: Evaluate review gate
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ steps.pr.outputs.number }}
        run: node scripts/pipeline-review-gate.mjs --pr "$PR_NUMBER"
