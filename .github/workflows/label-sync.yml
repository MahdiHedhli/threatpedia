# Create and sync review labels on the repo
name: Sync Review Labels

on:
  workflow_dispatch:

permissions:
  issues: write

jobs:
  sync-labels:
    runs-on: ubuntu-latest
    steps:
      - name: Create review labels
        uses: actions/github-script@v7
        with:
          script: |
            const labels = [
              { name: 'new-incident', color: 'dc2626', description: 'PR adds a new incident report' },
              { name: 'incident-update', color: 'f97316', description: 'PR updates an existing incident report' },
              { name: 'new-threat-actor', color: 'a855f7', description: 'PR adds a new threat actor page' },
              { name: 'actor-update', color: '8b5cf6', description: 'PR updates a threat actor page' },
              { name: 'needs-review', color: 'eab308', description: 'Awaiting human review before merge' },
              { name: 'approved', color: '22c55e', description: 'Reviewed and approved for publication' },
              { name: 'changes-requested', color: 'ef4444', description: 'Reviewer requested changes' },
              { name: 'auto-generated', color: '3b82f6', description: 'Content generated by scheduled automation' },
              { name: 'manifest-change', color: '64748b', description: 'PR modifies incidents/manifest.json' },
              { name: 'index-change', color: '64748b', description: 'PR modifies threat-actor-index.json' },
              { name: 'enrichment-only', color: '06b6d4', description: 'Updates to existing content — no new articles' },
            ];

            for (const label of labels) {
              try {
                await github.rest.issues.createLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  ...label,
                });
                console.log(`Created: ${label.name}`);
              } catch (e) {
                if (e.status === 422) {
                  await github.rest.issues.updateLabel({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    ...label,
                  });
                  console.log(`Updated: ${label.name}`);
                } else {
                  throw e;
                }
              }
            }
