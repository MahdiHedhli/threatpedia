name: "Pipeline: Dispatcher"

# Runs on schedule and manual trigger
on:
  schedule:
    - cron: "30 */2 * * *"   # Every 2 hours at :30
  workflow_dispatch:
    inputs:
      task_id:
        description: "Run a specific task (leave blank to process queue)"
        required: false

env:
  DISPATCHER_BRANCH: pipeline/dispatcher
  DISPATCHER_LABEL: pipeline/dispatcher

jobs:
  dispatch:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: main

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: scripts/package-lock.json

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Install scripts/ dependencies
        # scripts/pipeline-config.mjs imports js-yaml (added in Slice 4e).
        # On a fresh runner, scripts/node_modules does not exist, so the
        # dispatcher would fail on the first `node scripts/...` invocation
        # below. Install pinned lockfile versions before any script runs.
        working-directory: scripts
        run: npm ci --no-audit --no-fund

      - name: Checkout dispatcher branch
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          OWNER: ${{ github.repository_owner }}
        run: |
          set -euo pipefail
          BRANCH="${DISPATCHER_BRANCH}"

          if git ls-remote --exit-code --heads origin "$BRANCH" >/dev/null 2>&1; then
            echo "Branch $BRANCH exists on remote — checking open PR state"
            OPEN_PRS=$(curl -sSf \
              -H "Authorization: token ${GH_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/${REPO}/pulls?state=open&head=${OWNER}:${BRANCH}&per_page=5" \
              | python3 -c 'import sys,json; print(len(json.loads(sys.stdin.read(), strict=False)))')

            if [ "$OPEN_PRS" = "0" ]; then
              echo "No open PR on $BRANCH — previous dispatcher state was merged or closed."
              echo "Resetting branch to origin/main."
              git fetch origin main
              git checkout -B "$BRANCH" origin/main
              git push --force-with-lease origin "$BRANCH"
            else
              echo "Open PR exists on $BRANCH — accumulating onto existing branch"
              git fetch origin "$BRANCH"
              git checkout -B "$BRANCH" "origin/$BRANCH"
              echo "Merging latest main into $BRANCH"
              if ! git merge --no-edit origin/main; then
                echo "::error::Merge conflict between $BRANCH and main. Human resolution required."
                git merge --abort || true
                exit 1
              fi
            fi
          else
            echo "Branch $BRANCH does not exist — creating from main"
            git checkout -b "$BRANCH"
          fi

      - name: Load pipeline config
        id: config
        run: |
          set -euo pipefail
          # Shell out to the authoritative reader. On parse failure it prints
          # safe defaults + a WARN to stderr; the workflow continues with those
          # so the dispatcher never fails-closed on config-parsing issues.
          CONFIG_JSON=$(node scripts/pipeline-config.mjs)
          # Escape newlines so the JSON survives as a step output
          {
            echo "json<<EOF"
            echo "$CONFIG_JSON"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Check preconditions and dispatch tasks
        uses: actions/github-script@v8
        env:
          CONFIG_JSON: ${{ steps.config.outputs.json }}
        with:
          script: |
            const fs = require('fs');
            const path = require('path');

            const TASKS_DIR = '.github/pipeline/tasks';
            const DISPATCH_LABEL = 'pipeline/ready';

            // ── Load pipeline config ─────────────────────────────────────
            // Parsed by scripts/pipeline-config.mjs (authoritative reader);
            // passed in via env var so this step doesn't re-parse YAML.
            // Falls back to safe defaults if something is off.
            const DEFAULTS = {
              maxEditorial: 50,
              backpressureResume: 40,
              failureThreshold: 3,
              staleLockMinutes: 30,
              cooldownMinutes: 60,
              failureWindowMinutes: 120,
            };

            function loadConfig() {
              try {
                const raw = process.env.CONFIG_JSON || '';
                if (!raw) return { ...DEFAULTS, _source: 'defaults', _reason: 'no-env' };
                const cfg = JSON.parse(raw);
                return {
                  maxEditorial:         cfg?.queues?.editorial?.max_pending ?? DEFAULTS.maxEditorial,
                  backpressureResume:   cfg?.queues?.editorial?.backpressure_resume ?? DEFAULTS.backpressureResume,
                  failureThreshold:     cfg?.circuit_breaker?.failure_threshold ?? DEFAULTS.failureThreshold,
                  staleLockMinutes:     cfg?.scheduling?.stale_lock_minutes ?? DEFAULTS.staleLockMinutes,
                  cooldownMinutes:      cfg?.circuit_breaker?.cooldown_minutes ?? DEFAULTS.cooldownMinutes,
                  failureWindowMinutes: cfg?.circuit_breaker?.failure_window_minutes ?? DEFAULTS.failureWindowMinutes,
                  // Preserve reader diagnostics (source, reason, path) so the log line
                  // below can surface any fallback state end-to-end — including the
                  // reader-side fallbacks (file-not-found, read-error, parse-error).
                  _source: cfg._source || 'file',
                  _reason: cfg._reason,
                  _path:   cfg._path,
                };
              } catch (e) {
                console.warn(`::warning::Pipeline config parse failed: ${e.message}. Using safe defaults.`);
                return { ...DEFAULTS, _source: 'defaults', _reason: 'parse-error' };
              }
            }
            const config = loadConfig();

            // ── Log resolved config (every run self-documents active thresholds) ─
            console.log('─── Dispatcher config (active thresholds) ───────────────');
            console.log(`  source:               ${config._source}${config._reason ? ' (' + config._reason + ')' : ''}${config._path ? ' · ' + config._path : ''}`);
            console.log(`  maxEditorial:         ${config.maxEditorial}  (queues.editorial.max_pending)`);
            console.log(`  backpressureResume:   ${config.backpressureResume}  (queues.editorial.backpressure_resume)`);
            console.log(`  failureThreshold:     ${config.failureThreshold}  (circuit_breaker.failure_threshold)`);
            console.log(`  failureWindowMinutes: ${config.failureWindowMinutes}  (circuit_breaker.failure_window_minutes)`);
            console.log(`  cooldownMinutes:      ${config.cooldownMinutes}  (circuit_breaker.cooldown_minutes)`);
            console.log(`  staleLockMinutes:     ${config.staleLockMinutes}  (scheduling.stale_lock_minutes)`);
            console.log('──────────────────────────────────────────────────────────');

            // ── Load all tasks ───────────────────────────────────────────
            function loadTasks() {
              if (!fs.existsSync(TASKS_DIR)) return [];
              return fs.readdirSync(TASKS_DIR)
                .filter(f => f.endsWith('.json'))
                .map(f => {
                  const data = JSON.parse(fs.readFileSync(path.join(TASKS_DIR, f), 'utf8'));
                  data._file = f;
                  return data;
                });
            }

            const allTasks = loadTasks();

            async function loadOpenPipelineIssues() {
              const issues = await github.paginate(
                github.rest.issues.listForRepo,
                {
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  state: 'open',
                  labels: DISPATCH_LABEL,
                  per_page: 100,
                }
              );
              return issues.filter(issue => !issue.pull_request);
            }

            const openPipelineIssues = await loadOpenPipelineIssues();

            function findOpenPipelineIssue(taskId) {
              return openPipelineIssues.find(issue =>
                issue.title.includes(`[PIPELINE] ${taskId}:`) ||
                (issue.body || '').includes(`## Pipeline Task: \`${taskId}\``)
              ) || null;
            }

            // ── Check circuit breaker ────────────────────────────────────
            const recentFailed = allTasks
              .filter(t => t.status === 'failed')
              .sort((a, b) => new Date(b.updated) - new Date(a.updated))
              .slice(0, config.failureThreshold);

            if (recentFailed.length >= config.failureThreshold) {
              const allRecent = recentFailed.every(t => {
                const ago = (Date.now() - new Date(t.updated).getTime()) / 60000;
                return ago < config.failureWindowMinutes;
              });
              if (allRecent) {
                console.log('::warning::Circuit breaker tripped — 3+ consecutive recent failures. Halting dispatch.');
                await github.rest.issues.create({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  title: `[PIPELINE ALERT] Circuit breaker tripped — ${config.failureThreshold} consecutive failures`,
                  body: `The pipeline dispatcher detected ${config.failureThreshold} consecutive failures within the last ${config.failureWindowMinutes} minutes.\n\nFailed tasks:\n${recentFailed.map(t => `- \`${t.task_id}\`: ${t.error?.message || 'unknown error'}`).join('\n')}\n\nThe pipeline is paused until this issue is resolved. Cooldown after resume: ${config.cooldownMinutes} minutes. Close this issue to resume.`,
                  labels: ['pipeline/alert', 'pipeline/circuit-breaker'],
                });
                return;
              }
            }

            // ── Check editorial queue backpressure (hysteresis) ───────────
            // State lives in a labeled GitHub Issue, reusing the same Issue-
            // as-state pattern the circuit breaker uses for "paused" signals.
            //
            //   queue >= maxEditorial            → pause (create Issue if absent)
            //   queue >= backpressureResume
            //     AND Issue already open         → stay paused (hysteresis band)
            //   queue <  backpressureResume
            //     AND Issue already open         → auto-resume + close Issue
            //   queue <  backpressureResume
            //     AND no Issue                   → no-op, run dispatch
            //
            // Auto-close on drain (unlike circuit breaker, which requires
            // operator acknowledgement) because backpressure is a soft
            // throttle that self-heals as reviewers drain the queue.
            const BP_LABEL = 'pipeline/backpressure';

            const pendingDrafts = allTasks.filter(t =>
              t.status === 'pr_open' ||
              t.stage === 'validation' ||
              t.stage === 'review'
            ).length;

            async function findBackpressureIssue() {
              const { data } = await github.rest.issues.listForRepo({
                owner: context.repo.owner,
                repo: context.repo.repo,
                state: 'open',
                labels: BP_LABEL,
                per_page: 5,
              });
              return data[0] || null;
            }

            const bpIssue = await findBackpressureIssue();
            const queueInBand = pendingDrafts >= config.backpressureResume;
            const queueAtCap = pendingDrafts >= config.maxEditorial;

            if (queueAtCap && !bpIssue) {
              // Hit the ceiling — open Issue, pause.
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: `[PIPELINE BACKPRESSURE] Editorial queue at capacity (${pendingDrafts}/${config.maxEditorial})`,
                body: `The editorial review queue is at or above capacity. Dispatch of new drafts is paused.\n\n**Active thresholds:**\n- Pause at: ${config.maxEditorial}\n- Resume at: ${config.backpressureResume}\n\nThe dispatcher will auto-resume and close this Issue on the first cycle where pending drafts drop below the resume threshold. No operator action required unless the queue stays stuck.`,
                labels: [BP_LABEL, 'pipeline/alert'],
              });
              console.log(`Editorial queue at ${pendingDrafts}/${config.maxEditorial} — backpressure engaged, Issue opened.`);
              return;
            }

            if (bpIssue && queueInBand) {
              // In the hysteresis band — stay paused.
              console.log(`Backpressure active (Issue #${bpIssue.number}): pendingDrafts=${pendingDrafts} still ≥ resume threshold ${config.backpressureResume}. Staying paused.`);
              return;
            }

            if (bpIssue && !queueInBand) {
              // Queue has drained — auto-resume.
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: bpIssue.number,
                body: `Auto-resuming: pendingDrafts=${pendingDrafts} dropped below resume threshold ${config.backpressureResume}. Dispatch continuing.`,
              });
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: bpIssue.number,
                state: 'closed',
                state_reason: 'completed',
              });
              console.log(`Backpressure cleared (Issue #${bpIssue.number} closed): pendingDrafts=${pendingDrafts} < ${config.backpressureResume}. Resuming dispatch.`);
            }
            // Otherwise: no Issue, queue below cap — normal dispatch.

            // ── Release stale locks ──────────────────────────────────────
            const now = new Date();
            for (const task of allTasks) {
              if (task.status === 'locked' && task.locked_at) {
                const lockAge = (now - new Date(task.locked_at)) / 60000;
                if (lockAge > config.staleLockMinutes) {
                  console.log(`Releasing stale lock on ${task.task_id} (locked ${Math.round(lockAge)}m ago)`);
                  task.status = 'pending';
                  task.locked_by = null;
                  task.locked_at = null;
                  task.updated = now.toISOString();
                  task.history = task.history || [];
                  task.history.push({
                    timestamp: now.toISOString(),
                    from: 'locked',
                    to: 'pending',
                    agent: 'dispatcher',
                    note: `Stale lock released after ${Math.round(lockAge)} minutes`,
                  });
                  fs.writeFileSync(
                    path.join(TASKS_DIR, task._file),
                    JSON.stringify(task, null, 2) + '\n'
                  );
                }
              }
            }

            // ── Find dispatchable tasks ──────────────────────────────────
            // Priority order: P0 > P1 > P2 > P3, then oldest first
            const priorityOrder = { P0: 0, P1: 1, P2: 2, P3: 3 };
            const pendingTasks = allTasks
              .filter(t => t.status === 'pending' && t.stage === 'draft')
              .sort((a, b) => {
                const pDiff = (priorityOrder[a.priority] || 9) - (priorityOrder[b.priority] || 9);
                if (pDiff !== 0) return pDiff;
                return new Date(a.created) - new Date(b.created);
              });

            // If specific task requested via manual trigger
            const requestedId = '${{ inputs.task_id }}';
            const tasksToRun = requestedId
              ? pendingTasks.filter(t => t.task_id === requestedId)
              // `tasks_per_run` is intentionally fixed (not config-backed) for
              // this slice — deliberate operational ceiling. If dispatch volume
              // pattern changes, move to config.yml as `dispatcher.tasks_per_run`
              // in a follow-on slice.
              : pendingTasks.slice(0, 3);

            if (tasksToRun.length === 0) {
              console.log('No pending tasks to dispatch.');
              return;
            }

            // ── Check dependencies ───────────────────────────────────────
            for (const task of tasksToRun) {
              const deps = task.depends_on || [];
              const unmet = deps.filter(depId => {
                const dep = allTasks.find(t => t.task_id === depId);
                return !dep || dep.status !== 'complete';
              });

              if (unmet.length > 0) {
                console.log(`Task ${task.task_id} blocked by unmet dependencies: ${unmet.join(', ')}`);
                task.status = 'blocked';
                task.updated = now.toISOString();
                task.history = task.history || [];
                task.history.push({
                  timestamp: now.toISOString(),
                  from: 'pending',
                  to: 'blocked',
                  agent: 'dispatcher',
                  note: `Blocked by: ${unmet.join(', ')}`,
                });
                fs.writeFileSync(
                  path.join(TASKS_DIR, task._file),
                  JSON.stringify(task, null, 2) + '\n'
                );
                continue;
              }

              // ── Dispatch: create Issue for agent pickup ────────────────
              console.log(`Dispatching ${task.task_id} (${task.type}, ${task.priority})`);

              const existingIssue = findOpenPipelineIssue(task.task_id);
              if (existingIssue) {
                console.log(`Task ${task.task_id} already has open Issue #${existingIssue.number} — skipping duplicate dispatch`);
                task.history = task.history || [];
                const alreadyRecorded = task.history.some(entry =>
                  entry.agent === 'dispatcher' &&
                  String(entry.note || '').includes(`Issue #${existingIssue.number}`)
                );
                if (!alreadyRecorded) {
                  task.updated = now.toISOString();
                  task.history.push({
                    timestamp: now.toISOString(),
                    from: 'pending',
                    to: 'pending',
                    agent: 'dispatcher',
                    note: `Dispatch already open as Issue #${existingIssue.number}`,
                  });
                  fs.writeFileSync(
                    path.join(TASKS_DIR, task._file),
                    JSON.stringify(task, null, 2) + '\n'
                  );
                }
                continue;
              }

              // Create GitHub Issue for agent execution
              const issueBody = [
                `## Pipeline Task: \`${task.task_id}\``,
                '',
                '**This is an automated pipeline task. Any agent (Claude Code, Gemini, human) can execute this.**',
                '',
                '### Instructions',
                '',
                `1. View full brief:  \`node scripts/pipeline-run-task.mjs --task ${task.task_id}\``,
                `2. Lock the task:    \`node scripts/pipeline-run-task.mjs --task ${task.task_id} --lock\``,
                `3. Create branch:    \`git checkout -b ${task.output.branch}\``,
                '4. Write the article using your AI agent or manually (follow the brief)',
                `5. Validate:         \`node scripts/pipeline-run-task.mjs --task ${task.task_id} --validate\``,
                '6. Commit and push your task branch',
                `7. Open + record PR state:  \`node scripts/pipeline-run-task.mjs --task ${task.task_id} --open-pr\``,
                '',
                '### Task Details',
                '',
                '| Field | Value |',
                '|---|---|',
                `| Type | \`${task.type}\` |`,
                `| Priority | \`${task.priority}\` |`,
                `| Topic | ${task.input.topic} |`,
                `| Sources | ${(task.input.sources || []).length} URL(s) |`,
                '',
                '### Acceptance Criteria',
                '',
                '```json',
                // Tolerant read: accept canonical `acceptance_criteria` or
                // legacy `acceptance`. New task writers always emit
                // `acceptance_criteria` per TASK-2026-0066 / Slice 4b; older
                // task files on disk may still carry the legacy alias.
                JSON.stringify(task.acceptance_criteria || task.acceptance || {}, null, 2),
                '```',
                '',
                '### Source URLs',
                '',
                ...(task.input.sources || []).map(s => `- ${s}`),
                '',
                task.input.notes ? `### Notes\n\n${task.input.notes}` : '',
              ].join('\n');

              const { data: createdIssue } = await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: `[PIPELINE] ${task.task_id}: ${task.input.topic.substring(0, 60)}`,
                body: issueBody,
                labels: ['pipeline/ready', `type/${task.type}`, `priority/${task.priority.toLowerCase()}`],
              });

              // Update task status
              task.status = 'pending'; // Stays pending until agent locks it
              task.updated = now.toISOString();
              task.history = task.history || [];
              task.history.push({
                timestamp: now.toISOString(),
                from: 'pending',
                to: 'pending',
                agent: 'dispatcher',
                note: `Dispatched as Issue #${createdIssue.number}`,
              });
              fs.writeFileSync(
                path.join(TASKS_DIR, task._file),
                  JSON.stringify(task, null, 2) + '\n'
                );

              openPipelineIssues.push(createdIssue);
            }

      - name: Commit any task updates
        id: commit
        run: |
          git add .github/pipeline/tasks/
          if git diff --cached --quiet; then
            echo "No changes to commit"
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git commit -m "chore(pipeline): dispatcher run — $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push --force-with-lease origin "${DISPATCHER_BRANCH}"
          echo "has_changes=true" >> "$GITHUB_OUTPUT"

      - name: Create or update dispatcher PR
        if: ${{ steps.commit.outputs.has_changes == 'true' }}
        uses: actions/github-script@v8
        with:
          script: |
            const { execSync } = require('child_process');
            const fs = require('fs');

            const BRANCH = process.env.DISPATCHER_BRANCH;
            const LABEL = process.env.DISPATCHER_LABEL;
            const { owner, repo } = context.repo;

            let taskPaths = [];
            try {
              const diffOut = execSync(
                `git diff --name-only origin/main...HEAD -- '.github/pipeline/tasks/*.json'`,
                { encoding: 'utf8' },
              );
              taskPaths = diffOut.split('\n').map(s => s.trim()).filter(Boolean);
            } catch (e) {
              console.log(`Failed to enumerate branch-only task files: ${e.message}`);
              return;
            }

            if (taskPaths.length === 0) {
              console.log('No branch-only task files detected. Skipping PR update.');
              return;
            }

            const tasks = [];
            for (const p of taskPaths) {
              try {
                const t = JSON.parse(fs.readFileSync(p, 'utf8'));
                const history = Array.isArray(t.history) ? t.history : [];
                const lastEntry = history[history.length - 1] || {};
                tasks.push({
                  task_id: t.task_id,
                  stage: t.stage || '—',
                  status: t.status || '—',
                  updated: t.updated || '—',
                  note: lastEntry.note || '—',
                });
              } catch (e) {
                console.log(`Failed to parse ${p}: ${e.message}`);
              }
            }

            if (tasks.length === 0) {
              console.log('No parseable tasks found on branch. Skipping PR update.');
              return;
            }

            tasks.sort((a, b) => a.task_id.localeCompare(b.task_id));

            try {
              await github.rest.issues.getLabel({ owner, repo, name: LABEL });
            } catch (e) {
              if (e.status === 404) {
                try {
                  await github.rest.issues.createLabel({
                    owner, repo,
                    name: LABEL,
                    color: '1d76db',
                    description: 'Automated dispatcher bookkeeping PRs for pipeline task state updates',
                  });
                  console.log(`Created label ${LABEL}`);
                } catch (e2) {
                  console.log(`Could not create label ${LABEL}: ${e2.message} — continuing without label`);
                }
              }
            }

            const title = `Pipeline dispatcher — ${tasks.length} task update${tasks.length === 1 ? '' : 's'} pending`;
            const nowIso = new Date().toISOString();

            let body = `## Automated Dispatcher state updates\n\n`;
            body += `This PR persists task-state changes produced by `;
            body += `\`.github/workflows/pipeline-dispatcher.yml\` on the \`${BRANCH}\` branch.\n\n`;
            body += `These updates are bookkeeping only: dispatch notes, stale-lock releases, and dependency blocking.\n`;
            body += `No content is generated on this path.\n\n`;
            body += `Merge this PR to persist dispatcher state. Close it to discard these task-state updates and reset the branch on the next run.\n\n`;
            body += `---\n\n`;
            body += `| Task | Stage | Status | Last update | Latest note |\n`;
            body += `|---|---|---|---|---|\n`;
            for (const t of tasks) {
              const noteCell = String(t.note).replace(/\|/g, '\\|');
              body += `| \`${t.task_id}\` | ${t.stage} | ${t.status} | ${t.updated} | ${noteCell} |\n`;
            }
            body += `\n---\n\n`;
            body += `_Last updated: ${nowIso} · Run [${context.runId}](${context.serverUrl}/${owner}/${repo}/actions/runs/${context.runId}) · See [docs/PIPELINE.md](${context.serverUrl}/${owner}/${repo}/blob/main/docs/PIPELINE.md) for the end-to-end flow._\n`;

            const { data: existing } = await github.rest.pulls.list({
              owner, repo,
              state: 'open',
              head: `${owner}:${BRANCH}`,
              per_page: 5,
            });

            if (existing.length > 0) {
              const pr = existing[0];
              console.log(`Updating existing PR #${pr.number}`);
              await github.rest.pulls.update({
                owner, repo,
                pull_number: pr.number,
                title,
                body,
              });
            } else {
              console.log('Creating new dispatcher PR');
              const { data: pr } = await github.rest.pulls.create({
                owner, repo,
                head: BRANCH,
                base: 'main',
                title,
                body,
              });
              try {
                await github.rest.issues.addLabels({
                  owner, repo,
                  issue_number: pr.number,
                  labels: [LABEL],
                });
              } catch (e) {
                console.log(`Could not add label ${LABEL} to PR #${pr.number}: ${e.message}`);
              }
              console.log(`Opened PR #${pr.number}: ${pr.html_url}`);
            }
