name: "Pipeline: Dispatcher"

# Runs on schedule and manual trigger
on:
  schedule:
    - cron: "30 */2 * * *"   # Every 2 hours at :30
  workflow_dispatch:
    inputs:
      task_id:
        description: "Run a specific task (leave blank to process queue)"
        required: false

concurrency:
  group: pipeline-dispatcher
  cancel-in-progress: false

env:
  DISPATCHER_BRANCH: pipeline/dispatcher
  DISPATCHER_LABEL: pipeline/dispatcher

jobs:
  dispatch:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: main

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: scripts/package-lock.json

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Install scripts/ dependencies
        # scripts/pipeline-config.mjs imports js-yaml (added in Slice 4e).
        # On a fresh runner, scripts/node_modules does not exist, so the
        # dispatcher would fail on the first `node scripts/...` invocation
        # below. Install pinned lockfile versions before any script runs.
        working-directory: scripts
        run: npm ci --no-audit --no-fund

      - name: Checkout dispatcher branch
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          OWNER: ${{ github.repository_owner }}
        run: |
          set -euo pipefail
          BRANCH="${DISPATCHER_BRANCH}"

          if git ls-remote --exit-code --heads origin "$BRANCH" >/dev/null 2>&1; then
            echo "Branch $BRANCH exists on remote — checking open PR state"
            OPEN_PRS=$(curl -sSf \
              -H "Authorization: token ${GH_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/${REPO}/pulls?state=open&head=${OWNER}:${BRANCH}&per_page=5" \
              | python3 -c 'import sys,json; print(len(json.loads(sys.stdin.read(), strict=False)))')

            if [ "$OPEN_PRS" = "0" ]; then
              echo "No open PR on $BRANCH — previous dispatcher state was merged or closed."
              echo "Resetting branch to origin/main."
              git fetch origin main "$BRANCH"
              REMOTE_BRANCH_SHA="$(git rev-parse --verify "refs/remotes/origin/$BRANCH")"
              git checkout -B "$BRANCH" origin/main
              git push --force-with-lease="$BRANCH:$REMOTE_BRANCH_SHA" origin "$BRANCH"
            else
              echo "Open PR exists on $BRANCH — accumulating onto existing branch"
              git fetch origin "$BRANCH"
              git checkout -B "$BRANCH" "origin/$BRANCH"
              echo "Merging latest main into $BRANCH"
              if ! git merge --no-edit origin/main; then
                echo "::error::Merge conflict between $BRANCH and main. Human resolution required."
                git merge --abort || true
                exit 1
              fi
            fi
          else
            echo "Branch $BRANCH does not exist — creating from main"
            git checkout -b "$BRANCH"
          fi

      - name: Load pipeline config
        id: config
        run: |
          set -euo pipefail
          # Shell out to the authoritative reader. On parse failure it prints
          # safe defaults + a WARN to stderr; the workflow continues with those
          # so the dispatcher never fails-closed on config-parsing issues.
          CONFIG_JSON=$(node scripts/pipeline-config.mjs)
          # Escape newlines so the JSON survives as a step output
          {
            echo "json<<EOF"
            echo "$CONFIG_JSON"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Check preconditions and dispatch tasks
        uses: actions/github-script@v8
        env:
          CONFIG_JSON: ${{ steps.config.outputs.json }}
          REQUESTED_TASK_ID: ${{ inputs.task_id || '' }}
        with:
          script: |
            const run = require(`${process.env.GITHUB_WORKSPACE}/scripts/pipeline-dispatcher-dispatch-step.cjs`);
            await run({ github, context, core });

      - name: Commit any task updates
        id: commit
        run: |
          git add .github/pipeline/tasks/
          if git diff --cached --quiet; then
            echo "No changes to commit"
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git commit -m "chore(pipeline): dispatcher run — $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push --force-with-lease origin "${DISPATCHER_BRANCH}"
          echo "has_changes=true" >> "$GITHUB_OUTPUT"

      - name: Create or update dispatcher PR
        if: ${{ steps.commit.outputs.has_changes == 'true' }}
        uses: actions/github-script@v8
        with:
          script: |
            const run = require(`${process.env.GITHUB_WORKSPACE}/scripts/pipeline-dispatcher-pr-step.cjs`);
            await run({ github, context, core });
