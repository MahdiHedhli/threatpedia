name: "Pipeline: Dispatcher"

# Runs on schedule and manual trigger
on:
  schedule:
    - cron: "30 */2 * * *"   # Every 2 hours at :30
  workflow_dispatch:
    inputs:
      task_id:
        description: "Run a specific task (leave blank to process queue)"
        required: false

jobs:
  dispatch:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Check preconditions and dispatch tasks
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');

            const TASKS_DIR = '.github/pipeline/tasks';
            const CONFIG_PATH = '.github/pipeline/config.yml';

            // ── Load pipeline config ─────────────────────────────────────
            // Simple YAML parser for flat config (avoids dependency)
            function loadConfig() {
              const text = fs.readFileSync(CONFIG_PATH, 'utf8');
              // Extract key values we need
              const maxEditorial = 50;  // Hardcoded from config
              const failureThreshold = 3;
              const staleLockMinutes = 30;
              return { maxEditorial, failureThreshold, staleLockMinutes };
            }
            const config = loadConfig();

            // ── Load all tasks ───────────────────────────────────────────
            function loadTasks() {
              if (!fs.existsSync(TASKS_DIR)) return [];
              return fs.readdirSync(TASKS_DIR)
                .filter(f => f.endsWith('.json'))
                .map(f => {
                  const data = JSON.parse(fs.readFileSync(path.join(TASKS_DIR, f), 'utf8'));
                  data._file = f;
                  return data;
                });
            }

            const allTasks = loadTasks();

            // ── Check circuit breaker ────────────────────────────────────
            const recentFailed = allTasks
              .filter(t => t.status === 'failed')
              .sort((a, b) => new Date(b.updated) - new Date(a.updated))
              .slice(0, config.failureThreshold);

            if (recentFailed.length >= config.failureThreshold) {
              const allRecent = recentFailed.every(t => {
                const ago = (Date.now() - new Date(t.updated).getTime()) / 60000;
                return ago < 120; // Within last 2 hours
              });
              if (allRecent) {
                console.log('::warning::Circuit breaker tripped — 3+ consecutive recent failures. Halting dispatch.');
                await github.rest.issues.create({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  title: `[PIPELINE ALERT] Circuit breaker tripped — ${config.failureThreshold} consecutive failures`,
                  body: `The pipeline dispatcher detected ${config.failureThreshold} consecutive failures within the last 2 hours.\n\nFailed tasks:\n${recentFailed.map(t => `- \`${t.task_id}\`: ${t.error?.message || 'unknown error'}`).join('\n')}\n\nThe pipeline is paused until this issue is resolved. Close this issue to resume.`,
                  labels: ['pipeline/alert', 'pipeline/circuit-breaker'],
                });
                return;
              }
            }

            // ── Check editorial queue backpressure ────────────────────────
            const pendingDrafts = allTasks.filter(t =>
              t.stage === 'draft' && t.status === 'complete' ||
              t.stage === 'validation' ||
              t.stage === 'review'
            ).length;

            if (pendingDrafts >= config.maxEditorial) {
              console.log(`Editorial queue at ${pendingDrafts}/${config.maxEditorial} — backpressure active, skipping new drafts.`);
              return;
            }

            // ── Release stale locks ──────────────────────────────────────
            const now = new Date();
            for (const task of allTasks) {
              if (task.status === 'locked' && task.locked_at) {
                const lockAge = (now - new Date(task.locked_at)) / 60000;
                if (lockAge > config.staleLockMinutes) {
                  console.log(`Releasing stale lock on ${task.task_id} (locked ${Math.round(lockAge)}m ago)`);
                  task.status = 'pending';
                  task.locked_by = null;
                  task.locked_at = null;
                  task.updated = now.toISOString();
                  task.history = task.history || [];
                  task.history.push({
                    timestamp: now.toISOString(),
                    from: 'locked',
                    to: 'pending',
                    agent: 'dispatcher',
                    note: `Stale lock released after ${Math.round(lockAge)} minutes`,
                  });
                  fs.writeFileSync(
                    path.join(TASKS_DIR, task._file),
                    JSON.stringify(task, null, 2) + '\n'
                  );
                }
              }
            }

            // ── Find dispatchable tasks ──────────────────────────────────
            // Priority order: P0 > P1 > P2 > P3, then oldest first
            const priorityOrder = { P0: 0, P1: 1, P2: 2, P3: 3 };
            const pendingTasks = allTasks
              .filter(t => t.status === 'pending' && t.stage === 'draft')
              .sort((a, b) => {
                const pDiff = (priorityOrder[a.priority] || 9) - (priorityOrder[b.priority] || 9);
                if (pDiff !== 0) return pDiff;
                return new Date(a.created) - new Date(b.created);
              });

            // If specific task requested via manual trigger
            const requestedId = '${{ inputs.task_id }}';
            const tasksToRun = requestedId
              ? pendingTasks.filter(t => t.task_id === requestedId)
              : pendingTasks.slice(0, 3); // Process up to 3 tasks per dispatch

            if (tasksToRun.length === 0) {
              console.log('No pending tasks to dispatch.');
              return;
            }

            // ── Check dependencies ───────────────────────────────────────
            for (const task of tasksToRun) {
              const deps = task.depends_on || [];
              const unmet = deps.filter(depId => {
                const dep = allTasks.find(t => t.task_id === depId);
                return !dep || dep.status !== 'complete';
              });

              if (unmet.length > 0) {
                console.log(`Task ${task.task_id} blocked by unmet dependencies: ${unmet.join(', ')}`);
                task.status = 'blocked';
                task.updated = now.toISOString();
                task.history = task.history || [];
                task.history.push({
                  timestamp: now.toISOString(),
                  from: 'pending',
                  to: 'blocked',
                  agent: 'dispatcher',
                  note: `Blocked by: ${unmet.join(', ')}`,
                });
                fs.writeFileSync(
                  path.join(TASKS_DIR, task._file),
                  JSON.stringify(task, null, 2) + '\n'
                );
                continue;
              }

              // ── Dispatch: create Issue for agent pickup ────────────────
              console.log(`Dispatching ${task.task_id} (${task.type}, ${task.priority})`);

              // Create GitHub Issue for agent execution
              const issueBody = [
                `## Pipeline Task: \`${task.task_id}\``,
                '',
                '**This is an automated pipeline task. Any agent (Claude Code, Gemini, human) can execute this.**',
                '',
                '### Instructions',
                '',
                `1. View full brief:  \`node scripts/pipeline-run-task.mjs --task ${task.task_id}\``,
                `2. Lock the task:    \`node scripts/pipeline-run-task.mjs --task ${task.task_id} --lock\``,
                `3. Create branch:    \`git checkout -b ${task.output.branch}\``,
                '4. Write the article using your AI agent or manually (follow the brief)',
                `5. Validate:         \`node scripts/pipeline-run-task.mjs --task ${task.task_id} --validate\``,
                '6. Commit, push, and open PR targeting `main`',
                `7. Mark complete:    \`node scripts/pipeline-run-task.mjs --task ${task.task_id} --complete\``,
                '',
                '### Task Details',
                '',
                '| Field | Value |',
                '|---|---|',
                `| Type | \`${task.type}\` |`,
                `| Priority | \`${task.priority}\` |`,
                `| Topic | ${task.input.topic} |`,
                `| Sources | ${(task.input.sources || []).length} URL(s) |`,
                '',
                '### Acceptance Criteria',
                '',
                '```json',
                JSON.stringify(task.acceptance, null, 2),
                '```',
                '',
                '### Source URLs',
                '',
                ...(task.input.sources || []).map(s => `- ${s}`),
                '',
                task.input.notes ? `### Notes\n\n${task.input.notes}` : '',
              ].join('\n');

              const { data: createdIssue } = await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: `[PIPELINE] ${task.task_id}: ${task.input.topic.substring(0, 60)}`,
                body: issueBody,
                labels: ['pipeline/ready', `type/${task.type}`, `priority/${task.priority.toLowerCase()}`],
              });

              // Update task status
              task.status = 'pending'; // Stays pending until agent locks it
              task.updated = now.toISOString();
              task.history = task.history || [];
              task.history.push({
                timestamp: now.toISOString(),
                from: 'pending',
                to: 'pending',
                agent: 'dispatcher',
                note: `Dispatched as Issue #${createdIssue.number}`,
              });
              fs.writeFileSync(
                path.join(TASKS_DIR, task._file),
                JSON.stringify(task, null, 2) + '\n'
              );
            }

      - name: Commit any task updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .github/pipeline/tasks/
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "chore(pipeline): dispatcher run — $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push
