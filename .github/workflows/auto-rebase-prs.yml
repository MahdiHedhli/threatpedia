name: Auto-rebase open PRs

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  rebase-open-prs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.DMBOT_PAT }}

      - name: Configure git identity
        run: |
          git config user.name "dangermouse-bot"
          git config user.email "dangermousebot@threatpedia.wiki"

      - name: Get open PRs and attempt merge
        env:
          GH_TOKEN: ${{ secrets.DMBOT_PAT }}
          MAIN_SHA: ${{ github.sha }}
          REPO: ${{ github.repository }}
        run: |
          echo "Main advanced to ${MAIN_SHA:0:7}. Checking open PRs..."

          # Get open PRs targeting main (non-draft, same-repo only)
          prs=$(gh pr list --base main --state open --json number,headRefName,isDraft,labels,headRepositoryOwner --jq '
            .[] | select(.isDraft == false)
                | select(.headRepositoryOwner.login == "MahdiHedhli")
                | select(([.labels[].name] | index("no-auto-rebase")) == null)
                | "\(.number) \(.headRefName)"
          ')

          if [ -z "$prs" ]; then
            echo "No eligible open PRs found."
            exit 0
          fi

          echo "$prs" | while read -r pr_number branch; do
            echo ""
            echo "=== PR #${pr_number} (${branch}) ==="

            # Skip PRs that are not currently healthy. Rebase churn on failing
            # branches only retriggers validation noise without moving them
            # toward merge readiness.
            pr_status=$(gh pr view "${pr_number}" --json statusCheckRollup)
            failing_or_pending_checks=$(echo "$pr_status" | jq '
              def allowed_conclusion: . == "SUCCESS" or . == "SKIPPED" or . == "NEUTRAL";
              def allowed_state: . == "SUCCESS" or . == "SKIPPED" or . == "NEUTRAL";
              [
                .statusCheckRollup[]?
                | select(
                    (has("status") and .status != "COMPLETED")
                    or (has("conclusion") and ((.conclusion // "PENDING") | allowed_conclusion | not))
                    or (has("state") and (.state | allowed_state | not))
                  )
              ] | length
            ')

            if [ "${failing_or_pending_checks}" -gt 0 ]; then
              echo "  ⏭️ Skipping auto-rebase because the PR has failing or pending checks."
              continue
            fi

            # Fetch the PR branch
            git fetch origin "${branch}" 2>/dev/null
            if [ $? -ne 0 ]; then
              echo "  ⚠️ Could not fetch branch ${branch}, skipping."
              continue
            fi

            # Check if branch is already up to date with main
            merge_base=$(git merge-base "origin/${branch}" "origin/main")
            if [ "$merge_base" = "$(git rev-parse origin/main)" ]; then
              echo "  ✅ Already up to date with main."
              continue
            fi

            # Attempt merge in a detached state
            git checkout "origin/${branch}" 2>/dev/null
            if git merge --no-edit origin/main 2>/dev/null; then
              # Merge succeeded — push
              git push origin HEAD:"${branch}" 2>/dev/null
              if [ $? -eq 0 ]; then
                echo "  ✅ Merged main and pushed."
                if ! gh pr comment "${pr_number}" --body "✅ Auto-rebased against main (${MAIN_SHA:0:7}). No conflicts."; then
                  echo "  ⚠️ Could not post auto-rebase success comment."
                fi
              else
                echo "  ⚠️ Merge succeeded but push failed."
                if ! gh pr comment "${pr_number}" --body "⚠️ Auto-rebase merged cleanly but push failed. Manual push needed."; then
                  echo "  ⚠️ Could not post push-failure comment."
                fi
              fi
            else
              # Merge failed — extract conflicted files
              conflicts=$(git diff --name-only --diff-filter=U 2>/dev/null | head -20)
              git merge --abort 2>/dev/null

              echo "  ❌ Conflicts detected."

              # Add needs-rebase label via REST so repo-scoped tokens work.
              if ! gh api -X POST "repos/${REPO}/labels" \
                -f name='needs-rebase' \
                -f description='PR has merge conflicts with main' \
                -f color='D93F0B' >/dev/null 2>&1; then
                true
              fi

              if ! gh api -X POST "repos/${REPO}/issues/${pr_number}/labels" \
                -f labels[]='needs-rebase' >/dev/null; then
                echo "  ⚠️ Could not apply needs-rebase label."
              fi

              # Comment with conflict details
              conflict_list=$(echo "$conflicts" | sed 's/^/- `/' | sed 's/$/`/')
              if ! gh api -X POST "repos/${REPO}/issues/${pr_number}/comments" \
                -f body="$(cat <<EOF
          ⚠️ Merge conflicts detected after main advanced to ${MAIN_SHA:0:7}.

          **Conflicted files:**
          ${conflict_list}

          DangerMouse-Bot will resolve on next session, or resolve manually and remove the \`needs-rebase\` label.
          EOF
              )" >/dev/null; then
                echo "  ⚠️ Could not post conflict comment."
              fi
            fi

            # Reset for next PR
            git checkout --detach origin/main 2>/dev/null
          done

          echo ""
          echo "Done processing all eligible PRs."
