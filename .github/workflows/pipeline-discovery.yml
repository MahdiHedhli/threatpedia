name: "Pipeline: Automated Discovery"

# Scans external sources for new CVEs and incidents and creates pipeline tasks.
#
# This workflow is a thin wrapper around scripts/pipeline-discover.mjs —
# the single source of truth for discovery logic (feed fetch, scoring,
# dedup, task emission). All ROAD-011 scoring, ADR 0007 ID allocation, and
# dispatcher-compatible task shape come from there.
#
# Execution model stays subscription-backed and agent-agnostic:
#   - this workflow creates tasks only
#   - pipeline-dispatcher.yml hands tasks to agents
#   - agents execute under their own subscriptions via
#     scripts/pipeline-run-task.mjs (no API key required on this path)
#
# See docs/PIPELINE.md for the end-to-end flow.

on:
  schedule:
    - cron: "0 */6 * * *"   # Every 6 hours
  workflow_dispatch:
    inputs:
      days:
        description: "Lookback window in days (default: 14)"
        required: false
        default: "14"
      limit:
        description: "Max tasks to create per run (default: 5)"
        required: false
        default: "5"
      execute:
        description: "Write task files (true) or dry-run (false)"
        required: false
        default: "true"
        type: choice
        options:
          - "true"
          - "false"

jobs:
  discover:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Run discovery
        id: discover
        env:
          DAYS: ${{ inputs.days || '14' }}
          LIMIT: ${{ inputs.limit || '5' }}
          EXECUTE: ${{ inputs.execute || 'true' }}
        run: |
          set -euo pipefail
          echo "Running pipeline-discover.mjs (days=${DAYS}, limit=${LIMIT}, execute=${EXECUTE})"

          ARGS="--days ${DAYS} --limit ${LIMIT}"
          if [ "${EXECUTE}" = "true" ]; then
            ARGS="${ARGS} --execute"
          fi

          node scripts/pipeline-discover.mjs ${ARGS}

      - name: Commit new tasks
        if: ${{ inputs.execute != 'false' }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .github/pipeline/tasks/
          if git diff --cached --quiet; then
            echo "No new discoveries this run."
            exit 0
          fi
          git commit -m "chore(pipeline): auto-discovery — $(date -u +%Y-%m-%d) — new candidates from pipeline-discover.mjs"
          git pull --rebase origin main
          git push
