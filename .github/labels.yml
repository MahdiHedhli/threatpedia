# Threatpedia GitHub Labels
# Apply with: gh label create "<name>" --color "<color>" --description "<desc>"
# Or use github-label-sync / similar tooling

# ── Review Status ─────────────────────────────────────────────────
- name: needs-review
  color: "e8a020"
  description: "Awaiting human review before merge"

- name: approved
  color: "22c55e"
  description: "Reviewed and approved for publication"

- name: changes-requested
  color: "dc2626"
  description: "Reviewer requested changes before approval"

- name: hold
  color: "a855f7"
  description: "On hold — waiting for external info or decision"

# ── Content Type ──────────────────────────────────────────────────
- name: new-incident
  color: "ff6b6b"
  description: "PR adds a new incident report"

- name: incident-update
  color: "ffa07a"
  description: "PR updates an existing incident report"

- name: new-threat-actor
  color: "4ecdc4"
  description: "PR adds a new threat actor page"

- name: actor-update
  color: "87ceeb"
  description: "PR updates an existing threat actor page"

- name: manifest-change
  color: "b8860b"
  description: "PR modifies incidents/manifest.json"

- name: index-change
  color: "daa520"
  description: "PR modifies threat-actor-index.json"

# ── Source ────────────────────────────────────────────────────────
- name: auto-generated
  color: "5a6a7e"
  description: "Content generated by a scheduled automation task"

- name: manual-submission
  color: "3b82f6"
  description: "Content submitted by a human contributor"

# ── Priority ──────────────────────────────────────────────────────
- name: severity-critical
  color: "dc2626"
  description: "Critical severity incident — expedite review"

- name: severity-high
  color: "f97316"
  description: "High severity incident"
