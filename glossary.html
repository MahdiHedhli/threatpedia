            { letter: 'U', name: 'Unauthorized Access', acronym: '', definition: 'Any access that violates the stated security policy.', source: 'NICCS/CISA', roles: ['ciso','network-infra'] },
            { letter: 'U', name: 'Unbounded Consumption', acronym: '', definition: 'A vulnerability in LLM applications where insufficient controls on resource usage allow attackers to trigger excessive computation, memory, or API calls, leading to denial of service, cost explosion, or model degradation. Listed in the OWASP Top 10 for LLM Applications.', source: 'OWASP', roles: ['appsec-devsecops','cloud-sec'] },
            { letter: 'U', name: 'Unified Threat Management', acronym: 'UTM', definition: 'A network security appliance that combines multiple security functions including firewall, IDS/IPS, antivirus, VPN, and content filtering into a single platform.', source: 'Allot', roles: ['network-infra','ciso'] },
            { letter: 'U', name: 'Unvalidated Redirect', acronym: '', definition: 'A vulnerability where an application redirects users to attacker-controlled URLs without proper validation. Used in phishing attacks to lend credibility to malicious links.', source: 'Threatpedia', roles: ['pentest-red'] },
            { letter: 'U', name: 'UpSkill', acronym: '', definition: 'to provide someone, such as an employee, with more advanced skills through additional education and training', source: 'NICCS/CISA', roles: ['ciso','soc'] },
            { letter: 'U', name: 'URL Filtering', acronym: '', definition: 'A security technology that restricts access to websites based on URL categories, reputation, or custom policies. Protects users from malicious or inappropriate content.', source: 'Allot', roles: ['network-infra','soc'] },
            { letter: 'U', name: 'User and Entity Behavior Analytics', acronym: 'UEBA', definition: 'A security solution that uses machine learning to establish baseline behavior patterns for users and entities, detecting anomalies that may indicate threats.', source: 'SANS', roles: ['soc','threat-hunter'] },
            { letter: 'U', name: 'User Behavior Analytics', acronym: 'UBA', definition: 'Security technology that uses machine learning to analyze user behavior patterns and detect anomalies that may indicate compromised accounts or insider threats.', source: 'Huntress', roles: ['soc','threat-hunter'] },
            { letter: 'V', name: 'Vendor Risk Management', acronym: '', definition: 'The process of assessing and managing security risks associated with third-party vendors and suppliers. Includes vendor assessments and contract review.', source: 'Threatpedia', roles: ['ciso'] },
            { letter: 'V', name: 'Virtual Desktop Infrastructure', acronym: 'VDI', definition: 'A technology that hosts desktop environments on a centralized server, streaming them to end users. Enhances security by keeping data in the data center.', source: 'SANS', roles: ['cloud-sec','ciso'] },
            { letter: 'V', name: 'Virtual Machine', acronym: 'VM', definition: 'A software emulation of a physical computer that runs an operating system and applications. Used in security for isolation, testing, and sandboxing.', source: 'Allot', roles: ['cloud-sec','ir-forensics'] },
            { letter: 'V', name: 'Virtual Private Network', acronym: 'VPN', definition: 'A technology that creates an encrypted tunnel through the internet to securely connect remote users or sites to a private network. Provides confidentiality and can mask true location.', source: 'Threatpedia', roles: ['network-infra'] },
            { letter: 'V', name: 'Virtualization', acronym: '', definition: 'creating virtual representations of servers, storage, networks, and other physical machines', source: 'NICCS/CISA', roles: ['ciso','soc'] },
            { letter: 'V', name: 'Virus', acronym: '', definition: 'Self-replicating malware that requires user action to propagate and infect other files or systems. Historically common but less prevalent than other malware types.', source: 'Threatpedia', roles: ['soc','threat-hunter','ciso'], related: 'macro virus' },
            { letter: 'V', name: 'Vishing', acronym: '', definition: 'a hacking technique of defrauding target\'s over the phone, enticing them to divulge sensitive information', source: 'NICCS/CISA', roles: ['ciso','soc','pentest-red'], related: 'Phishing' },
            { letter: 'V', name: 'VLAN', acronym: 'Virtual Local Area Network', definition: 'A logical subdivision of a network that groups devices regardless of physical location. Used for network segmentation to improve security and reduce broadcast traffic.', source: 'SANS', roles: ['network-infra'] },
            { letter: 'V', name: 'VLAN Hopping', acronym: '', definition: 'An attack that allows traffic from one VLAN to reach another without passing through a router, bypassing network segmentation. Achieved through switch spoofing or double tagging.', source: 'SANS', roles: ['pentest-red','network-infra'] },
            { letter: 'V', name: 'VM Escape', acronym: '', definition: 'An exploit that allows an attacker to break out of a virtual machine and interact with the host operating system, potentially compromising all other VMs on the same host.', source: 'SANS', roles: ['cloud-sec','pentest-red'] },
            { letter: 'V', name: 'VPN Split Tunneling', acronym: '', definition: 'A networking configuration that allows a VPN user to access both the corporate network and the public internet simultaneously through different routes.', source: 'SANS', roles: ['network-infra'] },
            { letter: 'V', name: 'Vulnerability', acronym: '', definition: 'A weakness in a system or application that could be exploited by an attacker. Can be technical, process-based, or human-related.', source: 'Threatpedia', roles: ['pentest-red'], related: 'weakness' },
            { letter: 'V', name: 'Vulnerability Assessment', acronym: '', definition: 'A systematic examination of systems and applications to identify security vulnerabilities. Typically uses automated scanning tools and manual testing.', source: 'Threatpedia', roles: ['pentest-red'] },
            { letter: 'V', name: 'Vulnerability Assessment And Management', acronym: '', definition: 'In the NICE Framework, cybersecurity work where a person: Conducts assessments of threats and vulnerabilities, determines deviations from acceptable configurations, enterprise or local policy, assesses the level of risk, and develops and/or recommends appropriate mitigation countermeasures in operational and non-operational situations.', source: 'NICCS/CISA', roles: ['ciso','pentest-red','grc'] },
            { letter: 'V', name: 'Vulnerability Disclosure', acronym: '', definition: 'The process of reporting security vulnerabilities to vendors in accordance with responsible disclosure practices. Includes coordinated release of patches.', source: 'Threatpedia', roles: ['pentest-red','network-infra'] },
            { letter: 'V', name: 'Vulnerability Management', acronym: '', definition: 'A continuous process of identifying, evaluating, treating, and reporting on security vulnerabilities in systems and software across an organization.', source: 'Huntress', roles: ['grc','soc','ciso'] },
            { letter: 'V', name: 'Vulnerability Scanner', acronym: '', definition: 'An automated tool that scans systems, networks, and applications for known security vulnerabilities, misconfigurations, and policy violations. Examples include Nessus and Qualys.', source: 'SANS', roles: ['soc','pentest-red'] },
            { letter: 'W', name: 'Wardriving', acronym: '', definition: 'attackers searching for wireless networks with vulnerabilities while moving around an area in a moving vehicle', source: 'NICCS/CISA', roles: ['soc','threat-hunter'] },
            { letter: 'W', name: 'Wargaming', acronym: '', definition: 'an interactive technique that immerses potential cyber incident responders in a simulated cyber scenario', source: 'NICCS/CISA', roles: ['ciso','soc'] },
            { letter: 'W', name: 'Watering Hole', acronym: '', definition: 'A targeted attack strategy that compromises websites frequently visited by a specific group. The attacker infects the site to deliver malware to the intended victims.', source: 'SANS', roles: ['threat-intel','threat-hunter'] },
            { letter: 'W', name: 'Watering Hole Attack', acronym: '', definition: 'A cyber attack that compromises legitimate websites frequently visited by a target group, infecting them with malware to compromise users who visit the site. The attacker identifies and exploits trusted resources to reach intended victims.', source: 'Threatpedia', roles: ['pentest-red'] },
            { letter: 'W', name: 'Weakness', acronym: '', definition: 'A shortcoming or imperfection in software code, design, architecture, or deployment that, under proper conditions, could become a vulnerability or contribute to the introduction of vulnerabilities.', source: 'NICCS/CISA', roles: ['soc','threat-hunter'], related: 'vulnerability' },
            { letter: 'W', name: 'Weaponeering', acronym: '', definition: 'a term borrowed from military doctrine that refers to the process of analyzing target vulnerabilities and matching them with specific cyber capabilities (weapons) to achieve a desired effect or objective Application to Cyber: In the cyber domain, the principles are analogous:\\n<ul>\\n<li>Target Analysis: Identifying and characterizing critical systems, networks, or data (targets) and their vulnerabilities.</li>\\n<li>Capability Matching: Selecting or developing the most appropriate cyber "weapon" (e.g., malware, exploit, or a specific technique) to exploit those vulnerabilities.</li>\\n<li>Effect Estimation: Predicting the intended outcome (e.g., disruption, denial, degradation, destruction, or manipulation of data/systems) and assessing potential unintended consequences or "collateral damage".</li>\\n<li>Planning: Integrating the selected cyber capabilities into a broader operational plan to achieve strategic or tactical objectives.</li>\\n</ul>', source: 'NICCS/CISA', roles: ['threat-hunter'] },
            { letter: 'W', name: 'Weaponization', acronym: '', definition: 'an attacker creates malware or malicious payloads to use against the target by designing new forms of malware. Modifying existing programs to better match the vulnerabilities they\'re trying to exploit', source: 'NICCS/CISA', roles: ['pentest-red'] },
            { letter: 'W', name: 'Weaponize', acronym: '', definition: 'to develop an exploit against a vulnerability into an attack tool that can be deployed against a target', source: 'NICCS/CISA', roles: ['pentest-red'] },
            { letter: 'W', name: 'Web Application Firewall', acronym: 'WAF', definition: 'A specialized firewall that inspects HTTP/HTTPS traffic to block web application attacks such as SQL injection, XSS, and DDoS attacks.', source: 'Threatpedia', roles: ['pentest-red','network-infra'] },
            { letter: 'W', name: 'Web Application Penetration Test', acronym: '', definition: 'A focused penetration test targeting web applications to identify vulnerabilities such as injection flaws, authentication bypass, and data exposure.', source: 'Threatpedia', roles: ['pentest-red'] },
            { letter: 'W', name: 'Web Scraping', acronym: '', definition: 'The automated extraction of data from websites. Can be used for reconnaissance, competitive intelligence gathering, or harvesting email addresses for phishing campaigns.', source: 'SANS', roles: ['pentest-red','threat-intel'] },
            { letter: 'W', name: 'Web Shell', acronym: '', definition: 'A malicious script uploaded to a web server that provides remote access and command execution capabilities. Commonly used for persistence after initial compromise.', source: 'SANS', roles: ['ir-forensics','pentest-red','threat-hunter'] },
            { letter: 'W', name: 'Website Defacement', acronym: '', definition: 'An attack where an attacker gains unauthorized access to a website and modifies its content. Often a precursor to more serious attacks.', source: 'Threatpedia', roles: ['soc','threat-hunter'] },
            { letter: 'W', name: 'Whaling', acronym: '', definition: 'A highly targeted phishing attack directed at senior executives or high-profile individuals. Uses personalized, business-relevant content to increase success rates.', source: 'Allot', roles: ['soc','ciso','threat-intel'] },
            { letter: 'W', name: 'White Box Testing', acronym: '', definition: 'A testing methodology where the tester has full knowledge of the target system\'s internal structure, source code, and architecture.', source: 'SANS', roles: ['pentest-red','appsec-devsecops'] },
            { letter: 'W', name: 'White Team', acronym: '', definition: 'A group responsible for refereeing an engagement between a Red Team of mock attackers and a Blue Team of actual defenders of information systems.', source: 'NICCS/CISA', roles: ['pentest-red'], related: 'Blue Team, Red Team' },
            { letter: 'W', name: 'Whitebox', acronym: '', definition: 'a form of testing that is performed with knowledge of a target system\'s internals', source: 'NICCS/CISA', roles: ['ciso','soc'], related: 'Blackbox' },
            { letter: 'W', name: 'Whitelisting', acronym: '', definition: 'A security approach that explicitly allows only approved entities (applications, IP addresses, email addresses) while blocking everything else by default.', source: 'SANS', roles: ['network-infra','soc'] },
            { letter: 'W', name: 'Win-DDoS', acronym: '', definition: 'a novel cybersecurity attack technique that weaponizes legitimate, public-facing Windows Domain Controllers (DCs) to form a powerful, stealthy distributed denial-of-service (DDoS) botnet Discovered by SafeBreach researchers in August 2025, it exploits fundamental vulnerabilities in Windows\' Remote Procedure Call (RPC) and Lightweight Directory Access Protocol (LDAP) to launch high-impact attacks without requiring credentials, malware installation, or code execution on the target systems', source: 'NICCS/CISA', roles: ['pentest-red'], related: 'DDoS' },
            { letter: 'W', name: 'Wiper', acronym: '', definition: 'Destructive malware designed to permanently destroy data on infected systems. Unlike ransomware, wipers have no recovery mechanism and aim for maximum damage.', source: 'SANS', roles: ['ir-forensics','threat-intel','soc'] },
            { letter: 'W', name: 'Wiper Malware', acronym: '', definition: 'Destructive malware designed to permanently destroy data on infected systems by overwriting or corrupting files and disk structures. Often used in geopolitical cyber warfare.', source: 'Huntress', roles: ['ir-forensics','threat-intel'] },
            { letter: 'W', name: 'Wireless Intrusion Prevention System', acronym: 'WIPS', definition: 'A network device that monitors the radio spectrum for unauthorized access points and automatically takes countermeasures to protect the wireless network.', source: 'SANS', roles: ['network-infra'] },
            { letter: 'W', name: 'Wireless Security', acronym: '', definition: 'Security measures for protecting wireless networks from unauthorized access and attacks. Includes WPA3, 802.1X authentication, and wireless IDS.', source: 'SANS', roles: ['network-infra'] },
            { letter: 'W', name: 'Work Factor', acronym: '', definition: 'An estimate of the effort or time needed by a potential adversary, with specified expertise and resources, to overcome a protective measure.', source: 'NICCS/CISA', roles: ['ciso','soc'] },
            { letter: 'W', name: 'Worm', acronym: '', definition: 'Self-replicating malware that spreads across networks and systems without user interaction. Can consume resources and propagate itself independently of user action.', source: 'Threatpedia', roles: ['soc','threat-hunter','ciso'] },
            { letter: 'X', name: 'XaaS', acronym: 'Anything as a service', definition: 'a general category of services related to cloud computing and remote access', source: 'NICCS/CISA', roles: ['ciso','network-infra'] },
            { letter: 'X', name: 'XML External Entity', acronym: 'XXE', definition: 'An attack that exploits vulnerable XML parsers by injecting malicious external entity declarations. Attackers can read local files, perform SSRF attacks, or cause denial of service.', source: 'Threatpedia', roles: ['pentest-red'] },
            { letter: 'Y', name: 'YARA Rules', acronym: '', definition: 'A tool for identifying and classifying malware samples based on textual or binary patterns. Used by malware researchers and threat hunters to create detection signatures.', source: 'SANS', roles: ['threat-hunter','ir-forensics','threat-intel'] },
            { letter: 'Z', name: 'Zero Trust', acronym: '', definition: 'A security philosophy that no entity inside or outside the network should be automatically trusted. Every access request must be verified regardless of origin.', source: 'Huntress', roles: ['ciso','network-infra','cloud-sec'] },
            { letter: 'Z', name: 'Zero Trust Architecture', acronym: 'ZTA', definition: 'A security model that assumes no user or system is inherently trustworthy and requires verification for every access request, regardless of location or previous authentication. It operates on the principle of "never trust, always verify" and implements continuous authentication and authorization.', source: 'Threatpedia', roles: ['network-infra'] },
            { letter: 'Z', name: 'Zero Trust Network Access', acronym: 'ZTNA', definition: 'A security approach that verifies every access request and provides least-privilege access to specific resources, regardless of location or network.', source: 'Threatpedia', roles: ['network-infra'] },
            { letter: 'Z', name: 'Zero-Day', acronym: '', definition: 'A previously unknown software vulnerability that has no available patch at the time of discovery. Called zero-day because developers have had zero days to fix it.', source: 'Allot', roles: ['soc','threat-intel','pentest-red'] },
            { letter: 'Z', name: 'Zero-Day Exploit', acronym: '', definition: 'Malware or attack that exploits a previously unknown vulnerability before a patch is available. Highly valued in the criminal underground and among nation-state actors.', source: 'Threatpedia', roles: ['pentest-red'] },
            { letter: 'Z', name: 'Zero-Day Vulnerability', acronym: '', definition: 'A previously unknown security vulnerability with no available patch. Highly dangerous as attackers can exploit it before vendors can create a fix.', source: 'Threatpedia', roles: ['pentest-red'] },
            { letter: 'Z', name: 'Zerologon', acronym: '', definition: 'A critical vulnerability (CVE-2020-1472) in Microsoft\'s Netlogon protocol allowing an attacker to take over a domain controller by exploiting a cryptographic flaw.', source: 'SANS', roles: ['pentest-red','ir-forensics'] }
        ];

        // State
        const searchInput = document.getElementById('searchInput');
        const alphabetNav = document.getElementById('alphabetNav');
        const termsContainer = document.getElementById('termsContainer');
        const noResults = document.getElementById('noResults');
        const termCount = document.getElementById('termCount');
        const totalCount = document.getElementById('totalCount');
        let activeLetterBtn = null;
        let selectedRoles = new Set();

        // Initialize alphabet buttons
        function initializeAlphabet() {
            const letters = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ'.split('');
            letters.forEach(letter => {
                const btn = document.createElement('button');
                btn.className = 'letter-btn';
                btn.textContent = letter;
                btn.addEventListener('click', () => filterByLetter(letter, btn));
                alphabetNav.appendChild(btn);
            });
        }

        // Initialize role filters
        function initializeRoleFilters() {
            document.querySelectorAll('.role-chip').forEach(chip => {
                chip.addEventListener('click', () => {
                    const role = chip.dataset.role;
                    if (role === 'all') {
                        selectedRoles.clear();
                        document.querySelectorAll('.role-chip').forEach(c => c.classList.remove('active'));
                        chip.classList.add('active');
                    } else {
                        document.querySelector('.role-chip[data-role="all"]').classList.remove('active');
                        if (selectedRoles.has(role)) {
                            selectedRoles.delete(role);
                            chip.classList.remove('active');
                            if (selectedRoles.size === 0) {
                                document.querySelector('.role-chip[data-role="all"]').classList.add('active');
                            }
                        } else {
                            selectedRoles.add(role);
                            chip.classList.add('active');
                        }
                    }
                    applyFilters();
                });
            });
        }

        // Filter by letter
        function filterByLetter(letter, btn) {
            searchInput.value = '';
            if (activeLetterBtn) {
                activeLetterBtn.classList.remove('active');
            }
            if (activeLetterBtn === btn) {
                activeLetterBtn = null;
            } else {
                btn.classList.add('active');
                activeLetterBtn = btn;
            }
            applyFilters();
        }

        // Search filter
        searchInput.addEventListener('input', () => {
            if (activeLetterBtn) {
                activeLetterBtn.classList.remove('active');
                activeLetterBtn = null;
            }
            applyFilters();
        });

        // Apply all filters
        function applyFilters() {
            let filtered = glossaryTerms;

            // Letter filter
            if (activeLetterBtn) {
                const letter = activeLetterBtn.textContent;
                filtered = filtered.filter(t => t.letter === letter);
            }

            // Search filter
            const query = searchInput.value.toLowerCase();
            if (query.length > 0) {
                filtered = filtered.filter(t =>
                    t.name.toLowerCase().includes(query) ||
                    t.acronym.toLowerCase().includes(query) ||
                    t.definition.toLowerCase().includes(query)
                );
            }

            // Role filter
            if (selectedRoles.size > 0) {
                filtered = filtered.filter(t =>
                    t.roles && t.roles.some(r => selectedRoles.has(r))
                );
            }

            displayTerms(filtered);
        }

        // Display terms
        function displayTerms(terms) {
            termsContainer.innerHTML = '';
            termCount.textContent = terms.length;

            if (terms.length === 0) {
                noResults.classList.remove('hidden');
                return;
            }

            noResults.classList.add('hidden');

            const grouped = {};
            terms.forEach(term => {
                if (!grouped[term.letter]) {
                    grouped[term.letter] = [];
                }
                grouped[term.letter].push(term);
            });

            Object.keys(grouped).sort().forEach(letter => {
                const section = document.createElement('div');
                section.className = 'letter-section';
                section.id = 'section-' + letter;

                const header = document.createElement('h2');
                header.className = 'letter-header';
                header.textContent = letter;
                section.appendChild(header);

                const grid = document.createElement('div');
                grid.className = 'terms-grid';

                grouped[letter].forEach(term => {
                    const card = document.createElement('div');
                    card.className = 'term-card';
                    const slug = term.name.toLowerCase().replace(/[^a-z0-9\s-]/g, '').replace(/\s+/g, '-');
                    card.id = slug;
                    if (term.roles) {
                        card.setAttribute('data-roles', term.roles.join(' '));
                    }

                    const name = document.createElement('h3');
                    name.className = 'term-name';
                    name.textContent = term.name;
                    card.appendChild(name);

                    if (term.acronym) {
                        const acronym = document.createElement('div');
                        acronym.className = 'term-acronym';
                        acronym.textContent = term.acronym;
                        card.appendChild(acronym);
                    }

                    // Role tags
                    if (term.roles && term.roles.length > 0) {
                        const rolesDiv = document.createElement('div');
                        rolesDiv.className = 'term-roles';
                        term.roles.forEach(r => {
                            const tag = document.createElement('span');
                            tag.className = 'role-tag';
                            tag.textContent = roleNames[r] || r;
                            rolesDiv.appendChild(tag);
                        });
                        card.appendChild(rolesDiv);
                    }

                    const definition = document.createElement('p');
                    definition.className = 'term-definition';
                    definition.textContent = term.definition;
                    card.appendChild(definition);

                    // Source badge
                    if (term.source) {
                        const source = document.createElement('span');
                        source.className = 'term-source';
                        source.textContent = 'Source: ' + term.source;
                        card.appendChild(source);
                    }

                    // Related terms and synonyms
                    let metaHtml = '';
                    if (term.related) {
                        const relatedLinks = term.related.split(',').map(r => {
                            r = r.trim();
                            const rSlug = r.toLowerCase().replace(/[^a-z0-9\s-]/g, '').replace(/\s+/g, '-');
                            return '<a href="#' + rSlug + '">' + r + '</a>';
                        }).join(', ');
                        metaHtml += '<div>Related: ' + relatedLinks + '</div>';
                    }
                    if (term.synonyms) {
                        metaHtml += '<div>Synonyms: ' + term.synonyms + '</div>';
                    }
                    if (metaHtml) {
                        const meta = document.createElement('div');
                        meta.className = 'term-meta';
                        meta.innerHTML = metaHtml;
                        card.appendChild(meta);
                    }

                    grid.appendChild(card);
                });

                section.appendChild(grid);
                termsContainer.appendChild(section);
            });
        }

        // Initialize
        initializeAlphabet();
        initializeRoleFilters();
        displayTerms(glossaryTerms);

        // URL query param support
        (function() {
            const params = new URLSearchParams(window.location.search);
            const q = params.get('q');
            if (q) {
                searchInput.value = q;
                applyFilters();
            }
        })();

        // Hamburger Menu
        (function () {            /* Menu search — redirect to glossary with query */

        })();
    </script>
  <div id="site-footer"></div>


  <script src="assets/site-chrome.js"></script>
  <script src="assets/universal-search.js"></script>
  <script src="assets/incident-ticker.js"></script>
</body>
