<!DOCTYPE html>
<html lang="en">
<head>
  <script src="assets/analytics.js"></script>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cyber Security Glossary - Threatpedia</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800&family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg: #080b10;
            --surface: #0d1117;
            --border: #1e2733;
            --amber: #e8a020;
            --amber-dim: #a06a10;
            --text: #cdd5e0;
            --muted: #5a6a7e;
            --white: #f0f4f8;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'IBM Plex Sans', sans-serif;
            line-height: 1.6;
            position: relative;
            overflow-x: hidden;
        }

        /* Grid overlay background */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image:
                linear-gradient(0deg, transparent 24%, rgba(232, 160, 32, 0.02) 25%, rgba(232, 160, 32, 0.02) 26%, transparent 27%, transparent 74%, rgba(232, 160, 32, 0.02) 75%, rgba(232, 160, 32, 0.02) 76%, transparent 77%, transparent),
                linear-gradient(90deg, transparent 24%, rgba(232, 160, 32, 0.02) 25%, rgba(232, 160, 32, 0.02) 26%, transparent 27%, transparent 74%, rgba(232, 160, 32, 0.02) 75%, rgba(232, 160, 32, 0.02) 76%, transparent 77%, transparent);
            background-size: 50px 50px;
            pointer-events: none;
            z-index: 0;
        }

        /* Noise texture overlay */
        body::after {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 400 400' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' seed='1' /%3E%3C/filter%3E%3Crect width='400' height='400' filter='url(%23noiseFilter)' opacity='0.03'/%3E%3C/svg%3E");
            pointer-events: none;
            z-index: 0;
        }

        main {
            position: relative;
            z-index: 1;
            padding-top: 80px;
        }

        .hero {
            padding: 4rem 2rem 3rem;
            text-align: center;
            border-bottom: 1px solid var(--border);
        }

        .hero h1 {
            font-family: 'Playfair Display', serif;
            font-size: 3.5rem;
            font-weight: 800;
            color: var(--white);
            margin-bottom: 0.5rem;
            letter-spacing: -0.02em;
        }

        .hero p {
            color: var(--muted);
            font-size: 1.1rem;
            max-width: 600px;
            margin: 0 auto;
        }

        .controls {
            padding: 2rem 2rem;
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            position: sticky;
            top: 75px;
            z-index: 100;
        }

        .search-container {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            max-width: 500px;
        }

        .search-label {
            font-family: 'IBM Plex Mono', monospace;
            font-size: 0.8rem;
            color: var(--muted);
            letter-spacing: 0.1em;
            text-transform: uppercase;
        }

        .search-input {
            background: var(--bg);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 0.75rem 1rem;
            font-family: 'IBM Plex Mono', monospace;
            font-size: 0.95rem;
            border-radius: 4px;
            transition: all 0.3s ease;
        }

        .search-input:focus {
            outline: none;
            border-color: var(--amber);
            box-shadow: 0 0 12px rgba(232, 160, 32, 0.15);
        }

        /* Role Filters */
        .role-filters {
            display: flex;
            gap: 0.4rem;
            flex-wrap: wrap;
            align-items: center;
        }

        .role-filters-label {
            font-family: 'IBM Plex Mono', monospace;
            font-size: 0.8rem;
            color: var(--muted);
            letter-spacing: 0.1em;
            text-transform: uppercase;
            margin-right: 0.5rem;
        }

        .role-chip {
            background: var(--surface);
            border: 1px solid var(--border);
            color: var(--muted);
            padding: 0.35rem 0.75rem;
            font-family: 'IBM Plex Mono', monospace;
            font-size: 0.7rem;
            cursor: pointer;
            border-radius: 3px;
            transition: all 0.2s ease;
            letter-spacing: 0.05em;
        }

        .role-chip:hover {
            border-color: var(--amber);
            color: var(--amber);
        }

        .role-chip.active {
            background: var(--amber);
            color: var(--bg);
            border-color: var(--amber);
        }

        .alphabet-

        .alphabet-label {
            font-family: 'IBM Plex Mono', monospace;
            font-size: 0.8rem;
            color: var(--muted);
            letter-spacing: 0.1em;
            text-transform: uppercase;
            margin-right: 0.5rem;
        }

        .alphabet-buttons {
            display: flex;
            gap: 0.25rem;
            flex-wrap: wrap;
        }

        .letter-btn {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text);
            padding: 0.4rem 0.6rem;
            font-family: 'IBM Plex Mono', monospace;
            font-size: 0.75rem;
            cursor: pointer;
            border-radius: 3px;
            transition: all 0.2s ease;
        }

        .letter-btn:hover {
            border-color: var(--amber);
            color: var(--amber);
        }

        .letter-btn.active {
            background: var(--amber);
            border-color: var(--amber);
            color: var(--bg);
        }

        .content {
            padding: 2rem;
            max-width: 1400px;
            margin: 0 auto;
        }

        .terms-count {
            color: var(--muted);
            font-family: 'IBM Plex Mono', monospace;
            font-size: 0.9rem;
            margin-bottom: 2rem;
            letter-spacing: 0.05em;
        }

        .letter-section {
            margin-bottom: 3rem;
        }

        .letter-header {
            font-family: 'Playfair Display', serif;
            font-size: 2rem;
            color: var(--amber);
            margin-bottom: 1.5rem;
            padding-bottom: 0.5rem;
            border-bottom: 2px solid var(--border);
            letter-spacing: -0.02em;
        }

        .terms-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .term-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 4px;
            padding: 1.5rem;
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }

        .term-card:hover {
            border-color: var(--amber);
            box-shadow: 0 8px 16px rgba(232, 160, 32, 0.1);
            transform: translateY(-2px);
        }

        .term-name {
            font-family: 'Playfair Display', serif;
            font-size: 1.3rem;
            color: var(--white);
            font-weight: 700;
            letter-spacing: -0.01em;
        }

        .term-acronym {
            font-family: 'IBM Plex Mono', monospace;
            font-size: 0.8rem;
            color: var(--amber);
            letter-spacing: 0.1em;
            text-transform: uppercase;
        }

        .term-roles {
            display: flex;
            flex-wrap: wrap;
            gap: 4px;
        }

        .role-tag {
            font-family: 'IBM Plex Mono', monospace;
            font-size: 0.65rem;
            background: rgba(232, 160, 32, 0.12);
            color: var(--amber-dim);
            padding: 2px 8px;
            border-radius: 2px;
            letter-spacing: 0.05em;
        }

        .term-definition {
            color: var(--text);
            font-size: 0.95rem;
            line-height: 1.6;
        }

        .term-source {
            font-family: 'IBM Plex Mono', monospace;
            font-size: 0.65rem;
            color: var(--muted);
            letter-spacing: 0.05em;
        }

        .term-meta {
            font-size: 0.82rem;
            color: var(--muted);
            line-height: 1.5;
        }

        .term-meta a {
            color: var(--amber-dim);
            text-decoration: none;
        }

        .term-meta a:hover {
            color: var(--amber);
            text-decoration: underline;
        }

        .no-results {
            text-align: center;
            padding: 3rem 2rem;
            color: var(--muted);
        }

        .no-results h3 {
            font-family: 'Playfair Display', serif;
            font-size: 1.5rem;
            color: var(--text);
            margin-bottom: 0.5rem;
        }

        .hidden {
            display: none;
        }

        @media (max-width: 860px) {

            .hero h1 {
                font-size: 2.5rem;
            }

            .controls {
                padding: 1.5rem;
                gap: 1rem;
            }

            .search-input {
                padding: 0.6rem 0.8rem;
                font-size: 0.9rem;
            }

            .terms-grid {
                grid-template-columns: 1fr;
            }

            .letter-header {
                font-size: 1.5rem;
            }

            .role-chip {
                font-size: 0.62rem;
                padding: 0.25rem 0.5rem;
            }
        }
    </style>
</head>
<body>

  <div id="site-header"></div>

    <main>
        <section class="hero">
            <h1>Cyber Security Glossary</h1>
            <p>Comprehensive reference guide for information security terminology, frameworks, and concepts</p>
        </section>

        <section class="controls">
            <div class="search-container">
                <label class="search-label">Search Terms</label>
                <input type="text" id="searchInput" class="search-input" placeholder="Enter search term or acronym...">
            </div>
            <div class="role-filters">
                <span class="role-filters-label">Filter by Role</span>
                <div id="roleFilters">
                    <button class="role-chip active" data-role="all">All Roles</button>
                    <button class="role-chip" data-role="ciso">CISO</button>
                    <button class="role-chip" data-role="soc">SOC Analyst</button>
                    <button class="role-chip" data-role="threat-hunter">Threat Hunter</button>
                    <button class="role-chip" data-role="ir-forensics">IR / Forensics</button>
                    <button class="role-chip" data-role="pentest-red">Pentest / Red Team</button>
                    <button class="role-chip" data-role="grc">GRC / Compliance</button>
                    <button class="role-chip" data-role="cloud-sec">Cloud Security</button>
                    <button class="role-chip" data-role="appsec-devsecops">AppSec / DevSecOps</button>
                    <button class="role-chip" data-role="threat-intel">Threat Intel</button>
                    <button class="role-chip" data-role="network-infra">Network / Infra</button>
                </div>
            </div>
            <div class="alphabet-nav">
                <span class="alphabet-label">Quick Jump</span>
                <div class="alphabet-buttons" id="alphabetNav"></div>
            </div>
        </section>

        <section class="content">
            <div class="terms-count">
                Showing <span id="termCount">0</span> of <span id="totalCount">1023</span> terms
            </div>
            <div id="termsContainer"></div>
            <div id="noResults" class="no-results hidden">
                <h3>No terms found</h3>
                <p>Try adjusting your search or filters</p>
            </div>
        </section>
    </main>

    <script>
        // Role display names
        const roleNames = {
            'ciso': 'CISO',
            'soc': 'SOC Analyst',
            'threat-hunter': 'Threat Hunter',
            'ir-forensics': 'IR / Forensics',
            'pentest-red': 'Pentest / Red Team',
            'grc': 'GRC / Compliance',
            'cloud-sec': 'Cloud Security',
            'appsec-devsecops': 'AppSec / DevSecOps',
            'threat-intel': 'Threat Intel',
            'network-infra': 'Network / Infra'
        };

        // Glossary terms
        const glossaryTerms = [
            { letter: 'A', name: 'Abuse Case', acronym: '', definition: 'A specification for how a system can be misused or attacked. The counterpart to use cases in security-focused software development.', source: 'SANS', roles: ['appsec-devsecops'] },
            { letter: 'A', name: 'Acceptable Risk', acronym: '', definition: 'The level of risk that an organization is willing to accept, based on a cost-benefit analysis of implementing security controls versus the potential impact of a threat.', source: 'SANS', roles: ['ciso','grc'] },
            { letter: 'A', name: 'Acceptable Use Policy', acronym: 'AUP', definition: 'A policy that defines the acceptable use of an organization\'s IT resources, including computers, networks, and internet access. Establishes rules and guidelines for employee behavior.', source: 'SANS', roles: ['ciso','grc'] },
            { letter: 'A', name: 'Access', acronym: '', definition: 'The ability and means to communicate with or otherwise interact with a system, to use system resources to handle information, to gain knowledge of the information the system contains, or to control system components and functions.', source: 'NICCS/CISA', roles: ['ciso','network-infra'] },
            { letter: 'A', name: 'Access Broker', acronym: '', definition: 'A threat actor that specializes in gaining initial access to organizations and selling that access to other cybercriminals, including ransomware operators.', source: 'Huntress', roles: ['threat-intel','soc'] },
            { letter: 'A', name: 'Access Control', acronym: '', definition: 'The process of granting or denying specific requests for or attempts to: 1) obtain and use information and related information processing services; and 2) enter specific physical facilities.', source: 'NICCS/CISA', roles: ['ciso','network-infra'], related: 'access control mechanism' },
            { letter: 'A', name: 'Access Control List', acronym: 'ACL', definition: 'A list of permissions attached to a system resource that specifies which users or system processes are granted access and what operations are allowed.', source: 'SANS', roles: ['network-infra','cloud-sec'] },
            { letter: 'A', name: 'Access Control Mechanism', acronym: '', definition: 'Security measures designed to detect and deny unauthorized access and permit authorized access to an information system or a physical facility.', source: 'NICCS/CISA', roles: ['ciso','network-infra'] },
            { letter: 'A', name: 'Access Token', acronym: '', definition: 'A credential that represents the authorization granted to an application or user. Contains the security context including identity and privileges.', source: 'SANS', roles: ['appsec-devsecops','cloud-sec'] },
            { letter: 'A', name: 'Account Harvesting', acronym: '', definition: 'The process of collecting valid user accounts through techniques such as DNS enumeration, Finger protocol, or LDAP queries.', source: 'SANS', roles: ['pentest-red','threat-hunter'] },
            { letter: 'A', name: 'Account Lockout', acronym: '', definition: 'A security mechanism that temporarily or permanently disables an account after multiple failed login attempts. Prevents brute force attacks.', source: 'Threatpedia', roles: ['soc','pentest-red'] },
            { letter: 'A', name: 'Account Takeover', acronym: 'ATO', definition: 'An attack where a cybercriminal gains unauthorized access to a user account, typically through stolen credentials, phishing, or session hijacking.', source: 'SANS', roles: ['soc','threat-intel'] },
            { letter: 'A', name: 'Accountability', acronym: '', definition: 'The requirement to track and log user and system activities to ensure users can be held responsible for their actions.', source: 'Threatpedia', roles: ['ciso','soc'] },
            { letter: 'A', name: 'Active Attack', acronym: '', definition: 'An actual assault perpetrated by an intentional threat source that attempts to alter a system, its resources, its data, or its operations.', source: 'NICCS/CISA', roles: ['pentest-red'], related: 'passive attack' },
            { letter: 'A', name: 'Active Content', acronym: '', definition: 'Software that is able to automatically carry out or trigger actions without the explicit intervention of a user.', source: 'NICCS/CISA', roles: ['ciso','soc'] },
            { letter: 'A', name: 'Active Directory', acronym: 'AD', definition: 'Microsoft\'s directory service for Windows domain networks that provides authentication, authorization, and directory services. A primary target for enterprise attackers.', source: 'SANS', roles: ['network-infra','pentest-red','ir-forensics'] },
            { letter: 'A', name: 'Active Reconnaissance', acronym: '', definition: 'The phase of an attack where the adversary directly interacts with the target system to gather information, such as port scanning or vulnerability scanning.', source: 'SANS', roles: ['pentest-red'] },
            { letter: 'A', name: 'Address Resolution Protocol', acronym: 'ARP', definition: 'A protocol used to map IP network addresses to the hardware (MAC) addresses used by a data link protocol. ARP operates below the network layer.', source: 'SANS', roles: ['network-infra'] },
            { letter: 'A', name: 'Address Space Layout Randomization', acronym: 'ASLR', definition: 'A memory protection technique that randomizes the positions of key data areas in a process\'s address space, making it harder to exploit buffer overflow vulnerabilities.', source: 'SANS', roles: ['appsec-devsecops','pentest-red'] },
            { letter: 'A', name: 'Advanced Encryption Standard', acronym: 'AES', definition: 'A symmetric encryption algorithm approved by the U.S. National Security Agency for encrypting classified information. Uses 128, 192, or 256-bit keys and is widely used globally.', source: 'Threatpedia', roles: ['grc'] },
            { letter: 'A', name: 'Advanced Persistent Threat', acronym: 'APT', definition: 'A sophisticated, prolonged cyber attack by well-resourced adversaries, often nation-states, targeting specific organizations. Characterized by stealth, persistence, and advanced capabilities.', source: 'Threatpedia', roles: ['soc','threat-hunter'] },
            { letter: 'A', name: 'Advanced Threat Protection', acronym: 'ATP', definition: 'A category of security solutions designed to detect and prevent sophisticated attacks that bypass traditional security measures. Includes sandboxing, behavioral analysis, and threat intelligence.', source: 'SANS', roles: ['soc','ciso'] },
            { letter: 'A', name: 'Adversarial Machine Learning', acronym: '', definition: 'Techniques for attacking and defending machine learning models, including adversarial examples designed to cause misclassification.', source: 'Threatpedia', roles: ['soc','threat-hunter'] },
            { letter: 'A', name: 'Adversarial Robustness', acronym: '', definition: 'The ability of an AI or machine learning model to maintain correct behavior when subjected to adversarial inputs designed to cause misclassification or incorrect outputs. A key concern in AI-integrated application security.', source: 'NIST', roles: ['appsec-devsecops','threat-intel'] },
            { letter: 'A', name: 'Adversary', acronym: '', definition: 'An individual, group, organization, or government that conducts or has the intent to conduct detrimental activities.', source: 'NICCS/CISA', roles: ['threat-hunter'], related: 'threat agent, attacker' },
            { letter: 'A', name: 'Adversary Emulation', acronym: '', definition: 'The practice of simulating specific threat actor behavior and TTPs to test and validate security controls. More targeted than general penetration testing.', source: 'Huntress', roles: ['pentest-red','threat-hunter'] },
            { letter: 'A', name: 'Adversary Simulation', acronym: '', definition: 'The practice of mimicking the tactics, techniques, and procedures of real threat actors to test and validate an organization\'s detection and response capabilities.', source: 'SANS', roles: ['pentest-red','threat-hunter'] },
            { letter: 'A', name: 'Adware', acronym: '', definition: 'Malware that displays unwanted advertisements and may track user behavior for marketing purposes. While not always malicious, can compromise privacy and system performance.', source: 'Threatpedia', roles: ['soc','threat-hunter'] },
            { letter: 'A', name: 'Agent', acronym: '', definition: 'In cybersecurity, software that runs on a host to perform security functions such as monitoring, data collection, or policy enforcement on behalf of a central management system.', source: 'SANS', roles: ['soc','network-infra'] },
            { letter: 'A', name: 'Agentic AI Security', acronym: '', definition: 'The discipline of securing autonomous AI agents that can independently perform multi-step tasks, make decisions, and interact with external systems. Addresses risks such as excessive agency, privilege escalation, and unintended actions in agentic workflows.', source: 'OWASP', roles: ['appsec-devsecops','threat-intel'] },
            { letter: 'A', name: 'Aggregation Risk', acronym: '', definition: 'The risk that combining multiple pieces of non-sensitive information reveals sensitive information. Individual data points may be harmless, but their combination can compromise security.', source: 'SANS', roles: ['ciso','grc'] },
            { letter: 'A', name: 'AI Red Teaming', acronym: '', definition: 'A structured adversarial testing methodology for identifying vulnerabilities, biases, and safety issues in AI and machine learning systems. Includes prompt injection testing, jailbreak attempts, model evasion, and evaluating guardrail effectiveness.', source: 'OWASP', roles: ['appsec-devsecops','pentest-red','threat-intel'] },
            { letter: 'A', name: 'AI Security', acronym: '', definition: 'Security practices and challenges specific to artificial intelligence and machine learning systems, including model poisoning, adversarial examples, and data privacy.', source: 'Threatpedia', roles: ['grc'] },
            { letter: 'A', name: 'AI Security Posture Management', acronym: 'AI-SPM', definition: 'A security discipline that continuously monitors, assesses, and hardens the security posture of AI models, training pipelines, data assets, and inference endpoints against threats such as prompt injection, model poisoning, data exfiltration, and shadow AI deployments.', source: 'Threatpedia', roles: ['cloud-sec','ciso','appsec-devsecops'] },
            { letter: 'A', name: 'AIaaS', acronym: 'Artificial Intelligence as a Service', definition: 'a cloud-based service offering artificial intelligence (AI) outsourcing', source: 'NICCS/CISA', roles: ['cloud-sec'] },
            { letter: 'A', name: 'Air Gap', acronym: '', definition: 'To physically separate or isolate a system from other systems or networks (verb). The physical separation or isolation of a system from other systems or networks (noun).', source: 'NICCS/CISA', roles: ['ciso','soc','network-infra'] },
            { letter: 'A', name: 'Air-Gapped Network', acronym: '', definition: 'A network security measure where a computer or network is physically isolated from unsecured networks. Used for highly classified or sensitive systems.', source: 'SANS', roles: ['network-infra','ciso'] },
            { letter: 'A', name: 'Alert', acronym: '', definition: 'A notification that a specific attack has been detected or directed at an organization’s information systems.', source: 'NICCS/CISA', roles: ['soc'] },
            { letter: 'A', name: 'Alert Fatigue', acronym: '', definition: 'A condition where security analysts become desensitized to alerts due to high volumes of notifications, leading to missed genuine threats.', source: 'Huntress', roles: ['soc','ciso'] },
            { letter: 'A', name: 'Algorithm', acronym: '', definition: 'A finite set of step-by-step instructions for a problem-solving or computation procedure, especially one that can be implemented by a computer.', source: 'SANS', roles: ['appsec-devsecops'] },
            { letter: 'A', name: 'All Source Intelligence', acronym: '', definition: 'In the NICE Framework, cybersecurity work where a person: Analyzes threat information from multiple sources, disciplines, and agencies across the Intelligence Community. Synthesizes and places intelligence information in context; draws insights about the possible implications.', source: 'NICCS/CISA', roles: ['threat-intel'] },
            { letter: 'A', name: 'Allowlist', acronym: '', definition: 'A list of entities that are considered trustworthy and are granted access or privileges.', source: 'NICCS/CISA', roles: ['ciso','network-infra'], related: 'Blocklist' },
            { letter: 'A', name: 'Analyze', acronym: '', definition: 'A NICE Framework category consisting of specialty areas responsible for highly specialized review and evaluation of incoming cybersecurity information to determine its usefulness for intelligence.', source: 'NICCS/CISA', roles: ['ciso','soc'] },
            { letter: 'A', name: 'Anomaly Detection', acronym: '', definition: 'A security technique that identifies deviations from normal behavior patterns to detect potential threats. Uses statistical analysis and machine learning.', source: 'SANS', roles: ['soc','threat-hunter'] },
            { letter: 'A', name: 'Anonymizers', acronym: '', definition: 'an anonymous proxy is a tool that attempts to make activity on the Internet untraceable', source: 'NICCS/CISA', roles: ['ciso','soc'] },
            { letter: 'A', name: 'anti-CSRF', acronym: 'Anti - Cross-Site Request Forgery', definition: 'related pairs of tokens given to users to validate their requests and prevent issue requests from attackers via the victim', source: 'NICCS/CISA', roles: ['soc','threat-hunter'] },
            { letter: 'A', name: 'Anti-Malware', acronym: '', definition: 'Software designed to detect, prevent, and remove malicious software from computer systems. Includes antivirus, anti-spyware, and anti-ransomware capabilities.', source: 'SANS', roles: ['soc','network-infra'] },
            { letter: 'A', name: 'Anti-Phishing', acronym: '', definition: 'Technologies and practices designed to detect and prevent phishing attacks, including email filtering, URL reputation checking, and user awareness training.', source: 'SANS', roles: ['soc','network-infra'] },
            { letter: 'A', name: 'Anti-Replay', acronym: '', definition: 'A security mechanism that prevents attackers from intercepting and retransmitting valid data transmissions to gain unauthorized access or repeat transactions.', source: 'SANS', roles: ['network-infra'] },
            { letter: 'A', name: 'Antiforensic', acronym: '', definition: 'a set of techniques used to conceal or destroy evidence to frustrate or deceive digital forensic investigations', source: 'NICCS/CISA', roles: ['ir-forensics'], related: 'forensic, digital forensic, computer forensic, Timestomping' },
            { letter: 'A', name: 'Antispoofing', acronym: '', definition: 'a technique for identifying and dropping packets that have a false source address. In a spoofing attack, the source address of an incoming packet is changed to make it appear as if it is coming from a known, trusted source. Spoofed packets are commonly used to carry out denial-of-service (DoS) attacks, exploit network and system vulnerabilities, and gain unauthorized access to corporate networks and data.', source: 'NICCS/CISA', roles: ['pentest-red','network-infra'] },
            { letter: 'A', name: 'Antispyware Software', acronym: '', definition: 'A program that specializes in detecting and blocking or removing forms of spyware.', source: 'NICCS/CISA', roles: ['ciso','soc'], related: 'spyware' },
            { letter: 'A', name: 'Antivirus', acronym: 'AV', definition: 'Software designed to detect, prevent, and remove malicious software from computers. Uses signature-based, heuristic, and behavioral detection methods.', source: 'Allot', roles: ['soc','network-infra'] },
            { letter: 'A', name: 'Antivirus Software', acronym: '', definition: 'A program that monitors a computer or network to detect or identify major types of malicious code and to prevent or contain malware incidents. Sometimes by removing or neutralizing the malicious code.', source: 'NICCS/CISA', roles: ['soc'] },
            { letter: 'A', name: 'Application Firewall', acronym: 'WAF', definition: 'A firewall that operates at the application layer to monitor, filter, and block HTTP/HTTPS traffic to and from a web application. Protects against attacks like SQL injection and XSS.', source: 'SANS', roles: ['appsec-devsecops','network-infra'] },
            { letter: 'A', name: 'Application Layer Attack', acronym: '', definition: 'A DDoS attack targeting the application layer (Layer 7 of the OSI model) to exhaust server resources by mimicking legitimate user requests.', source: 'Allot', roles: ['network-infra','appsec-devsecops'] },
            { letter: 'A', name: 'Application Programming Interface Security', acronym: 'API Security', definition: 'The practice of protecting APIs from attacks and misuse. Includes authentication, authorization, rate limiting, input validation, and encryption of API traffic.', source: 'SANS', roles: ['appsec-devsecops','cloud-sec'] },
            { letter: 'A', name: 'Application Security Testing', acronym: 'AST', definition: 'The process of making applications more resistant to security threats through identifying, fixing, and preventing security vulnerabilities using SAST, DAST, and IAST methods.', source: 'SANS', roles: ['appsec-devsecops'] },
            { letter: 'A', name: 'Application Whitelisting', acronym: '', definition: 'A security practice that allows only pre-approved applications to run on a system, blocking all unauthorized software. A strong defense against malware.', source: 'SANS', roles: ['soc','network-infra','appsec-devsecops'] },
            { letter: 'A', name: 'AppSec', acronym: '', definition: 'the process of finding, fixing, and preventing security vulnerabilities at the application level, as part of the software development processes', source: 'NICCS/CISA', roles: ['ciso','soc'] },
            { letter: 'A', name: 'ARP Spoofing', acronym: '', definition: 'An attack that forges ARP messages to associate the attacker\'s MAC address with a legitimate IP address, enabling MITM attacks on local networks.', source: 'Threatpedia', roles: ['soc','threat-hunter'] },
            { letter: 'A', name: 'Asset', acronym: '', definition: 'A person, structure, facility, information, and records, information technology systems and resources, material, process, relationships, or reputation that has value. Anything useful that contributes to the success of something, such as an organizational mission; assets are things of value or properties to which value can be assigned.', source: 'NICCS/CISA', roles: ['ciso','soc'] },
            { letter: 'A', name: 'Asset Inventory', acronym: '', definition: 'A comprehensive catalog of all hardware, software, and data assets in an organization. Foundation for vulnerability management and security monitoring.', source: 'Huntress', roles: ['ciso','grc','soc'] },
            { letter: 'A', name: 'Assume Breach', acronym: '', definition: 'A security mindset that operates under the assumption that adversaries have already compromised or will compromise the environment. Drives investment in detection and response.', source: 'SANS', roles: ['ciso','threat-hunter'] },
            { letter: 'A', name: 'Asymmetric Encryption', acronym: '', definition: 'An encryption method using a pair of public and private keys. Enables secure communication without prior key exchange.', source: 'Threatpedia', roles: ['network-infra','appsec-devsecops'] },
            { letter: 'A', name: 'Asymmetric Warfare', acronym: '', definition: 'In cyber context, conflict where one party has significantly different resources or capabilities than the other. Small actors can cause disproportionate damage through cyber attacks.', source: 'SANS', roles: ['threat-intel','ciso'] },
            { letter: 'A', name: 'Attack', acronym: '', definition: 'An attempt to gain unauthorized access to system services, resources, or information, or an attempt to compromise system integrity. The intentional act of attempting to bypass one or more security services or controls of an information system.', source: 'NICCS/CISA', roles: ['pentest-red'], related: 'active attack, passive attack' },
            { letter: 'A', name: 'Attack Graph', acronym: '', definition: 'A visual representation of all possible paths an attacker could take through a network to reach a target. Used in risk assessment and security architecture planning.', source: 'SANS', roles: ['pentest-red','ciso'] },
            { letter: 'A', name: 'Attack Lifecycle', acronym: '', definition: 'The sequential phases of a cyber attack from initial reconnaissance through to data exfiltration or impact. Understanding the lifecycle enables defenders to detect and disrupt attacks at each stage.', source: 'Huntress', roles: ['threat-hunter','soc'] },
            { letter: 'A', name: 'Attack Method', acronym: '', definition: 'The manner or technique and means an adversary may use in an assault on information or an information system.', source: 'NICCS/CISA', roles: ['threat-hunter','pentest-red'] },
            { letter: 'A', name: 'Attack Path', acronym: '', definition: 'The steps that an adversary takes or may take to plan, prepare for, and execute an attack.', source: 'NICCS/CISA', roles: ['pentest-red'] },
            { letter: 'A', name: 'Attack Pattern', acronym: '', definition: 'Similar cyber events or behaviors that may indicate an attack has occurred or is occurring, resulting in a security violation or a potential security violation. For software, descriptions of common methods for exploiting software systems.', source: 'NICCS/CISA', roles: ['pentest-red'], related: 'attack signature' },
            { letter: 'A', name: 'Attack Signature', acronym: '', definition: 'A characteristic or distinctive pattern that can be searched for or that can be used in matching to previously identified attacks. An automated set of rules for identifying a potential threat (such as an exploit or the presence of an attacker tool) and possible responses to that threat.', source: 'NICCS/CISA', roles: ['pentest-red','network-infra'], related: 'attack pattern' },
            { letter: 'A', name: 'Attack Surface', acronym: '', definition: 'The set of ways in which an adversary can enter a system and potentially cause damage. An information system\'s characteristics that permit an adversary to probe, attack, or maintain presence in the information system.', source: 'NICCS/CISA', roles: ['pentest-red','ciso','appsec-devsecops'] },
            { letter: 'A', name: 'Attack Tree', acronym: '', definition: 'A conceptual diagram showing how an asset or target might be attacked. Uses a tree structure to decompose the goal of an attack into sub-goals and associated attack methods.', source: 'SANS', roles: ['ciso','pentest-red'] },
            { letter: 'A', name: 'Attack Vector', acronym: '', definition: 'The path or means by which an attacker gains access to a target system. Common vectors include email, web browsers, removable media, and network services.', source: 'SANS', roles: ['soc','threat-hunter','pentest-red'] },
            { letter: 'A', name: 'Attacker', acronym: '', definition: 'An individual, group, organization, or government that executes an attack. A party acting with malicious intent to compromise an information system.', source: 'NICCS/CISA', roles: ['pentest-red'], related: 'adversary, threat agent' },
            { letter: 'A', name: 'Attribute-Based Access Control', acronym: 'ABAC', definition: 'An advanced access control model that grants access based on attributes such as user properties, resource properties, and environmental conditions.', source: 'Threatpedia', roles: ['ciso','network-infra'] },
            { letter: 'A', name: 'Attribution', acronym: '', definition: 'The process of identifying and confirming the source or perpetrator of a cyber attack. Often difficult and relies on technical indicators, behavioral analysis, and intelligence gathering.', source: 'Threatpedia', roles: ['threat-intel'] },
            { letter: 'A', name: 'Audit Log', acronym: '', definition: 'A record of system activities and security events that provides evidence of who accessed what and when. Essential for compliance and forensic investigation.', source: 'Threatpedia', roles: ['soc','ir-forensics','grc'] },
            { letter: 'A', name: 'Audit Trail', acronym: '', definition: 'A chronological record of system activities that provides documentary evidence of the sequence of activities. Enables reconstruction and examination of events from inception to final results.', source: 'SANS', roles: ['grc','ir-forensics'] },
            { letter: 'A', name: 'Authenticated Vulnerability Scan', acronym: '', definition: 'A vulnerability scan performed with valid credentials that can check for vulnerabilities from an insider\'s perspective, including patch levels and configuration issues.', source: 'SANS', roles: ['soc','pentest-red'] },
            { letter: 'A', name: 'Authentication', acronym: '', definition: 'The process of verifying the identity of a user, device, or system. The first step in the AAA model (Authentication, Authorization, Accounting).', source: 'Threatpedia', roles: ['ciso','network-infra'] },
            { letter: 'A', name: 'Authenticity', acronym: '', definition: 'A property achieved through cryptographic methods of being genuine and being able to be verified and trusted, resulting in confidence in the validity of a transmission, information or a message, or sender of information or a message.', source: 'NICCS/CISA', roles: ['network-infra','appsec-devsecops'], related: 'integrity, non-repudiation' },
            { letter: 'A', name: 'Authorization', acronym: '', definition: 'The process of determining what an authenticated user or system is allowed to do. Defines access rights and permissions.', source: 'Threatpedia', roles: ['ciso','network-infra'] },
            { letter: 'A', name: 'Automated Indicator Sharing', acronym: 'AIS', definition: 'A CISA service that enables the exchange of cyber threat indicators between the federal government and the private sector at machine speed.', source: 'SANS', roles: ['threat-intel','soc'] },
            { letter: 'A', name: 'Automated Threat Response', acronym: '', definition: 'Security capabilities that automatically take action against detected threats without human intervention, such as isolating endpoints or blocking IPs.', source: 'Huntress', roles: ['soc','ir-forensics'] },
            { letter: 'A', name: 'Autonomous System', acronym: 'AS', definition: 'A connected group of IP networks that share a common routing policy and are run by one or more operators. Identified by a unique Autonomous System Number (ASN).', source: 'SANS', roles: ['network-infra'] },
            { letter: 'A', name: 'Availability', acronym: '', definition: 'A security principle ensuring that systems and data are accessible and usable by authorized users when needed.', source: 'Threatpedia', roles: ['ciso','network-infra'], related: 'confidentiality, integrity' },
            { letter: 'B', name: 'Backdoor', acronym: '', definition: 'A hidden method of gaining unauthorized access to a system, bypassing normal authentication mechanisms. Can be installed by malware or accidentally left by developers.', source: 'Threatpedia', roles: ['soc','threat-hunter','ciso','network-infra'] },
            { letter: 'B', name: 'Bandwidth', acronym: '', definition: 'The maximum rate of data transfer across a network path. In security, bandwidth constraints affect DDoS resilience and security tool performance.', source: 'Allot', roles: ['network-infra'] },
            { letter: 'B', name: 'Bandwidth Throttling', acronym: '', definition: 'The intentional slowing of internet service by a network operator. Can be used as a DDoS mitigation technique or network management strategy.', source: 'SANS', roles: ['network-infra'] },
            { letter: 'B', name: 'Banner Grabbing', acronym: '', definition: 'A technique used to gain information about computer systems on a network and the services running on its open ports. Attackers use this during reconnaissance to identify potential vulnerabilities.', source: 'SANS', roles: ['pentest-red','threat-hunter'] },
            { letter: 'B', name: 'Baseline Security', acronym: '', definition: 'The minimum level of security controls required for an information system, based on its identified needs for the protection of confidentiality, integrity, and availability.', source: 'SANS', roles: ['ciso','grc'] },
            { letter: 'B', name: 'Baselining', acronym: '', definition: 'The process of establishing a standard or reference point for system configurations, network traffic, or user behavior against which deviations can be measured.', source: 'SANS', roles: ['soc','grc'] },
            { letter: 'B', name: 'Bastion Host', acronym: '', definition: 'A hardened computer specifically configured to withstand attacks, placed at the edge of a network to provide controlled access. Often used as a jump server.', source: 'SANS', roles: ['network-infra','cloud-sec'] },
            { letter: 'B', name: 'BCrypt', acronym: '', definition: 'password-hashing function based on the Blowfish cipher and presented at USENIX in 1999', source: 'NICCS/CISA', roles: ['network-infra','appsec-devsecops'] },
            { letter: 'B', name: 'Beacon', acronym: '', definition: 'A type of malware communication where compromised systems periodically contact a command and control server for instructions. Detection of beaconing is key to identifying compromised hosts.', source: 'SANS', roles: ['soc','threat-hunter','ir-forensics'] },
            { letter: 'B', name: 'Behaviour', acronym: '', definition: 'the extent to which an individual practices several types of cybersecurity measures to avoid or attenuate the types of cyber threats that they are vulnerable to', source: 'NICCS/CISA', roles: ['soc','threat-hunter'] },
            { letter: 'B', name: 'Biocertification', acronym: '', definition: 'refers to the use of biometric data for authentication and access control to improve cybersecurity', source: 'NICCS/CISA', roles: ['threat-hunter'] },
            { letter: 'B', name: 'Biohacking', acronym: '', definition: 'making small, strategic changes to habits and behaviors to improve things like cognitive function and weight management.', source: 'NICCS/CISA', roles: ['ciso','soc'] },
            { letter: 'B', name: 'Biometric', acronym: '', definition: 'use unique physical or behavioral traits like fingerprints, facial features, and voice patterns for cybersecurity authentication This method verifies a user\'s identity by using their biological characteristics instead of passwords, which can be forgotten or stolen. While highly convenient and difficult to forge, biometrics are most effective when used in combination with other security measures, as they carry their own set of privacy risks and can be vulnerable to advanced attacks like deepfakes', source: 'NICCS/CISA', roles: ['soc','threat-hunter'], related: 'deepfake' },
            { letter: 'B', name: 'Biometric Authentication', acronym: '', definition: 'Authentication based on unique physical or behavioral characteristics such as fingerprints, facial recognition, or iris scanning. Difficult to forge or steal.', source: 'Threatpedia', roles: ['ciso','network-infra'] },
            { letter: 'B', name: 'Biosurveillance', acronym: '', definition: 'A systematic process of gathering near real-time biological information to detect, monitor, and characterize threats to human, animal, plant, and environmental health, enabling early warning and identification of potential outbreaks.', source: 'NICCS/CISA', roles: ['soc','threat-hunter'] },
            { letter: 'B', name: 'Birthday Attack', acronym: '', definition: 'A cryptographic attack that exploits the mathematics behind the birthday problem in probability theory. Used to find collisions in hash functions.', source: 'SANS', roles: ['pentest-red','appsec-devsecops'] },
            { letter: 'B', name: 'Bit Flipping Attack', acronym: '', definition: 'A cryptographic attack that manipulates ciphertext bits to produce predictable changes in plaintext. Effective against certain block cipher modes like CBC.', source: 'SANS', roles: ['pentest-red','appsec-devsecops'] },
            { letter: 'B', name: 'Black Box Testing', acronym: '', definition: 'A testing methodology where the tester has no prior knowledge of the target system\'s internal structure. Simulates a real-world external attacker perspective.', source: 'SANS', roles: ['pentest-red'] },
            { letter: 'B', name: 'Blackbox', acronym: '', definition: 'a form of testing that is performed with no knowledge of a target system\'s internals', source: 'NICCS/CISA', roles: ['ciso','soc'], related: 'Whitebox' },
            { letter: 'B', name: 'Blacklist', acronym: '', definition: 'A list of entities (IP addresses, domains, applications) that are explicitly denied access or blocked. The opposite of whitelisting.', source: 'Allot', roles: ['network-infra','soc'] },
            { letter: 'B', name: 'Blind SQL Injection', acronym: '', definition: 'A type of SQL injection attack where the attacker asks the database true or false questions and determines the answer based on the application\'s response, without seeing actual data output.', source: 'SANS', roles: ['pentest-red','appsec-devsecops'] },
            { letter: 'B', name: 'Block Cipher', acronym: '', definition: 'A symmetric encryption algorithm that divides plaintext into fixed-size blocks and encrypts each block independently. Examples include AES and DES.', source: 'SANS', roles: ['network-infra'] },
            { letter: 'B', name: 'Blockchain', acronym: '', definition: 'Blockchain is a decentralized ledger that records and verifies transactions across a network of computers. It\'s a database that stores data in blocks that are linked together in a chain. <ul>\\n<li>Tracking transactions: Blockchain can track orders, payments, accounts, and more.</li>\\n<li>Supply chain management: Blockchain can track the movement of products through the supply chain.</li>\\n<li>Preventing fraud: Blockchain can help prevent counterfeiting and fraudulent banking.</li>\\n<li>Safeguarding records: Blockchain can be used to store and protect medical records.</li>\\n</ul>', source: 'NICCS/CISA', roles: ['ciso','soc'] },
            { letter: 'B', name: 'Blocklist', acronym: '', definition: 'A list of entities that are blocked or denied privileges or access.', source: 'NICCS/CISA', roles: ['ciso','network-infra'], related: 'Allowlist' },
            { letter: 'B', name: 'Blue Screen of Death', acronym: 'BSOD', definition: 'A Windows system error screen indicating a critical system failure. Can be caused by malware, hardware failures, or driver issues. Targeted by some ransomware and wipers.', source: 'Huntress', roles: ['soc','ir-forensics'] },
            { letter: 'B', name: 'blue Team', acronym: '', definition: 'A group that defends an enterprise\'s information systems when mock attackers (i.e., the Red Team) attack, typically as part of an operational exercise conducted according to rules established and monitored by a neutral group (i.e., the White Team). Also, a group that conducts operational vulnerability evaluations and recommends mitigation techniques to customers who need an independent technical review of their cybersecurity posture.', source: 'NICCS/CISA', roles: ['pentest-red','soc','ir-forensics','ciso'], related: 'Red Team, White Team' },
            { letter: 'B', name: 'Bluejacking', acronym: '', definition: 'an attack in which someone sends unsolicited messages to a Bluetooth-enabled device', source: 'NICCS/CISA', roles: ['soc','threat-hunter'], related: 'Bluesnarfing' },
            { letter: 'B', name: 'Bluesnarfing', acronym: '', definition: 'a hacking technique in which a hacker accesses a wireless device through a Bluetooth connection', source: 'NICCS/CISA', roles: ['ciso','network-infra'], related: 'Bluejacking' },
            { letter: 'B', name: 'Boot Sector Virus', acronym: '', definition: 'A type of virus that infects the master boot record or volume boot record of a storage device, executing before the operating system loads.', source: 'SANS', roles: ['soc','ir-forensics'] },
            { letter: 'B', name: 'Bootkits', acronym: '', definition: 'A bootkit is a type of malware that infects a computer\'s boot process, giving the attacker control over the system. Bootkits are a major security threat because they can bypass standard security measures and remain hidden.', source: 'NICCS/CISA', roles: ['soc','threat-hunter'] },
            { letter: 'B', name: 'Bot', acronym: '', definition: 'A computer connected to the Internet that has been surreptitiously / secretly compromised with malicious logic to perform activities under remote the command and control of a remote administrator. A member of a larger collection of compromised computers known as a botnet.', source: 'NICCS/CISA', roles: ['ciso','soc'], related: 'botnet', synonyms: 'zombie' },
            { letter: 'B', name: 'Bot Master', acronym: '', definition: 'The controller of a botnet that, from a remote location, provides direction to the compromised computers in the botnet.', source: 'NICCS/CISA', roles: ['ciso','soc'], synonyms: 'bot herder' },
            { letter: 'B', name: 'Botnet', acronym: '', definition: 'A network of compromised computers controlled by an attacker through a command and control (C2) infrastructure. Used for DDoS attacks, spam distribution, and credential theft.', source: 'Threatpedia', roles: ['soc','threat-hunter','ciso'] },
            { letter: 'B', name: 'Boundary Protection', acronym: '', definition: 'The monitoring and control of communications at the external boundary of an information system to prevent and detect malicious and other unauthorized communications.', source: 'SANS', roles: ['network-infra','ciso'] },
            { letter: 'B', name: 'Breach and Attack Simulation', acronym: 'BAS', definition: 'Automated tools that continuously simulate attacks against an organization\'s security controls to identify gaps and validate defensive capabilities.', source: 'Huntress', roles: ['pentest-red','soc','ciso'] },
            { letter: 'B', name: 'Bridge', acronym: '', definition: 'A network device that connects two or more network segments at the data link layer, filtering and forwarding frames based on MAC addresses.', source: 'SANS', roles: ['network-infra'] },
            { letter: 'B', name: 'Bring Your Own Device', acronym: 'BYOD', definition: 'A policy allowing employees to use personal devices for work purposes. Creates challenges for security teams in maintaining control over corporate data on unmanaged devices.', source: 'SANS', roles: ['ciso','grc'] },
            { letter: 'B', name: 'Bring Your Own Key', acronym: 'BYOK', definition: 'A cloud security model where customers manage their own encryption keys rather than relying on the cloud provider\'s key management.', source: 'SANS', roles: ['cloud-sec','ciso'] },
            { letter: 'B', name: 'Browser Isolation', acronym: '', definition: 'A security technique that runs web browsing activities in an isolated environment separate from the endpoint, preventing malicious web content from reaching the user\'s device.', source: 'SANS', roles: ['network-infra','soc'] },
            { letter: 'B', name: 'Brute Force Attack', acronym: '', definition: 'An attack that systematically attempts all possible combinations of passwords or cryptographic keys until the correct one is found. Dictionary attacks and rainbow tables are common brute force variations.', source: 'Threatpedia', roles: ['pentest-red'] },
            { letter: 'B', name: 'Brute Force Protection', acronym: '', definition: 'Security mechanisms that detect and prevent brute force attacks, including account lockout policies, progressive delays, CAPTCHAs, and IP-based rate limiting.', source: 'SANS', roles: ['network-infra','appsec-devsecops'] },
            { letter: 'B', name: 'Bruteforce', acronym: '', definition: 'an attack is a method that uses trial and error to crack passwords, login credentials, and encryption keys', source: 'NICCS/CISA', roles: ['soc','threat-hunter'] },
            { letter: 'B', name: 'Buffer Overflow', acronym: '', definition: 'A programming vulnerability where data written to a buffer exceeds its capacity, overwriting adjacent memory. Attackers can exploit this to inject malicious code, cause denial of service, or execute arbitrary commands with elevated privileges.', source: 'Threatpedia', roles: ['pentest-red'] },
            { letter: 'B', name: 'Bug', acronym: '', definition: 'An unexpected and relatively small defect, fault, flaw, or imperfection in an information system or device.', source: 'NICCS/CISA', roles: ['ciso','soc'] },
            { letter: 'B', name: 'Bug Bounty', acronym: '', definition: 'A program where organizations offer rewards to security researchers for responsibly disclosing vulnerabilities. Incentivizes finding and reporting bugs.', source: 'Threatpedia', roles: ['ciso','soc'] },
            { letter: 'B', name: 'Bug Bounty Program', acronym: '', definition: 'An organized program where organizations offer monetary rewards to security researchers who responsibly disclose vulnerabilities. Crowdsources security testing efforts.', source: 'SANS', roles: ['ciso','appsec-devsecops'] },
            { letter: 'B', name: 'Build Pipeline Security', acronym: '', definition: 'Security measures integrated into continuous integration/continuous deployment (CI/CD) pipelines to detect and prevent vulnerabilities in code.', source: 'Threatpedia', roles: ['appsec-devsecops'] },
            { letter: 'B', name: 'Build Security In', acronym: '', definition: 'A set of principles, practices, and tools to design, develop, and evolve information systems and software that enhance resistance to vulnerabilities, flaws, and attacks.', source: 'NICCS/CISA', roles: ['soc','threat-hunter'] },
            { letter: 'B', name: 'Bulk Data Collection', acronym: '', definition: 'The large-scale collection of digital communications data. Raises significant privacy and civil liberties concerns while being used for intelligence and threat detection purposes.', source: 'SANS', roles: ['threat-intel','grc'] },
            { letter: 'B', name: 'Business Continuity', acronym: 'BC', definition: 'A strategic and tactical capability to continue critical operations during and after a disruptive incident. Includes planning, testing, and recovery procedures.', source: 'Threatpedia', roles: ['ciso'] },
            { letter: 'B', name: 'Business Email Compromise', acronym: 'BEC', definition: 'A sophisticated email scam targeting businesses that work with foreign suppliers or regularly perform wire transfers. Attackers impersonate executives or trusted partners to redirect payments.', source: 'SANS', roles: ['soc','ciso','threat-intel'] },
            { letter: 'B', name: 'Business Impact Analysis', acronym: 'BIA', definition: 'A process that identifies and evaluates the potential effects of natural and man-made events on business operations. Determines recovery priorities and objectives.', source: 'SANS', roles: ['ciso','grc'] },
            { letter: 'B', name: 'Business Logic Vulnerability', acronym: '', definition: 'A flaw in the design or implementation of an application that allows an attacker to manipulate legitimate business processes for malicious purposes.', source: 'SANS', roles: ['appsec-devsecops','pentest-red'] },
            { letter: 'B', name: 'BYOD Policy', acronym: 'Bring Your Own Device', definition: 'An organizational policy that allows employees to use personal devices for work. Requires security controls to protect corporate data on personal devices.', source: 'Threatpedia', roles: ['ciso','grc'] },
            { letter: 'C', name: 'Cache Poisoning', acronym: '', definition: 'An attack that corrupts cached data to serve malicious content to multiple users. Can affect DNS caches, web caches, or application caches.', source: 'Threatpedia', roles: ['grc'] },
            { letter: 'C', name: 'Callback', acronym: '', definition: 'Communication initiated by malware to contact its command and control server. Detecting callbacks is a key indicator of compromise in network monitoring.', source: 'Huntress', roles: ['soc','threat-hunter'] },
            { letter: 'C', name: 'Canary Token', acronym: '', definition: 'A digital tripwire that alerts defenders when accessed. Similar to honeytokens, can be files, URLs, DNS entries, or credentials designed to detect unauthorized access.', source: 'Huntress', roles: ['threat-hunter','soc'] },
            { letter: 'C', name: 'Capability', acronym: '', definition: 'The means to accomplish a mission, function, or objective.', source: 'NICCS/CISA', roles: ['ciso','soc'], related: 'intent' },
            { letter: 'C', name: 'CAPTCHA', acronym: '', definition: 'Completely Automated Public Turing test to tell Computers and Humans Apart. A challenge-response test to determine whether a user is human, protecting against automated attacks.', source: 'SANS', roles: ['appsec-devsecops','network-infra'] },
            { letter: 'C', name: 'Captive Portal', acronym: '', definition: 'A web page that a user is required to view and interact with before being granted broader access to a network. Commonly used in public Wi-Fi networks for authentication.', source: 'SANS', roles: ['network-infra'] },
            { letter: 'C', name: 'Catphish', acronym: '', definition: 'the fabrication of a false online identity by a cybercriminal for the purposes of deception, fraud, or exploitation', source: 'NICCS/CISA', roles: ['soc','threat-hunter'] },
            { letter: 'C', name: 'CCPA', acronym: 'California Consumer Privacy Act', definition: 'A California state law that gives consumers rights over their personal information and requires businesses to implement data protection measures.', source: 'Threatpedia', roles: ['grc'] },
            { letter: 'C', name: 'Certificate Authority', acronym: 'CA', definition: 'A trusted entity that issues and manages digital certificates. Verifies the identity of certificate requestors before issuing certificates.', source: 'Threatpedia', roles: ['network-infra','appsec-devsecops'] },
            { letter: 'C', name: 'Certificate Pinning', acronym: '', definition: 'A security mechanism that associates a host with its expected X.509 certificate or public key. Prevents man-in-the-middle attacks using forged certificates.', source: 'SANS', roles: ['appsec-devsecops','network-infra'] },
            { letter: 'C', name: 'Certificate Transparency', acronym: 'CT', definition: 'A framework for monitoring and auditing the issuance of TLS certificates. Publicly logs all certificates to detect fraudulently or mistakenly issued certificates.', source: 'SANS', roles: ['network-infra','appsec-devsecops'] },
            { letter: 'C', name: 'Chain of Custody', acronym: '', definition: 'A documented process that tracks the handling and transfer of evidence to maintain its integrity and admissibility in legal proceedings.', source: 'Threatpedia', roles: ['ir-forensics'] },
            { letter: 'C', name: 'Chain of Exploits', acronym: '', definition: 'A sequence of multiple exploits chained together to achieve a goal that no single exploit could accomplish alone. Common in sophisticated attacks against hardened targets.', source: 'SANS', roles: ['pentest-red','threat-hunter'] },
            { letter: 'C', name: 'Change Management', acronym: '', definition: 'A systematic approach to managing changes in IT systems to minimize risk and ensure security controls remain effective during transitions.', source: 'SANS', roles: ['ciso','grc'] },
            { letter: 'C', name: 'CIA Triad', acronym: 'CIA', definition: 'The foundational model of information security consisting of Confidentiality (preventing unauthorized access), Integrity (ensuring data accuracy and consistency), and Availability (ensuring systems are accessible when needed). These three principles form the basis of most security policies and frameworks.', source: 'Threatpedia', roles: ['ciso','network-infra'] },
            { letter: 'C', name: 'CIEM', acronym: 'Cloud Infrastructure Entitlement Management', definition: 'Security solutions that manage and govern identities, access rights, and permissions across multi-cloud environments to enforce least privilege.', source: 'SANS', roles: ['cloud-sec'] },
            { letter: 'C', name: 'Cipher', acronym: '', definition: 'An algorithm used for the encryption and decryption of data. The strength of encryption depends on the cipher algorithm and key length used.', source: 'Allot', roles: ['network-infra'] },
            { letter: 'C', name: 'Cipher Block Chaining', acronym: 'CBC', definition: 'A mode of operation for block ciphers where each block of plaintext is XORed with the previous ciphertext block before being encrypted, providing better security than ECB mode.', source: 'SANS', roles: ['network-infra','appsec-devsecops'] },
            { letter: 'C', name: 'Cipher Suite', acronym: '', definition: 'A set of cryptographic algorithms used together to secure network communications. Typically includes key exchange, bulk encryption, and message authentication algorithms.', source: 'SANS', roles: ['network-infra','appsec-devsecops'] },
            { letter: 'C', name: 'Ciphertext', acronym: '', definition: 'Data or information in its encrypted form.', source: 'NICCS/CISA', roles: ['network-infra','appsec-devsecops'], related: 'plaintext' },
            { letter: 'C', name: 'CIS Controls', acronym: '', definition: 'A set of prioritized best practices for defending against cyber attacks, developed by the Center for Internet Security. Includes 18 controls organized by implementation group.', source: 'Threatpedia', roles: ['soc','threat-hunter'] },
            { letter: 'C', name: 'Cladding', acronym: '', definition: 'The outer layer of fiber optic cable that confines light within the core. Damage to cladding can allow data interception through fiber tapping.', source: 'SANS', roles: ['network-infra'] },
            { letter: 'C', name: 'Clean Desk Policy', acronym: '', definition: 'A corporate directive that specifies how employees should leave their working space when they leave the office. Requires securing sensitive documents and locking computers to prevent unauthorized access.', source: 'SANS', roles: ['ciso','grc'] },
            { letter: 'C', name: 'Cleanup', acronym: '', definition: 'The final phase of incident response involving restoring systems to normal operation, removing malware artifacts, and implementing preventive measures against similar incidents.', source: 'SANS', roles: ['ir-forensics'] },
            { letter: 'C', name: 'Clickjacking', acronym: '', definition: 'A web application attack that tricks users into clicking hidden elements by overlaying invisible frames or buttons over legitimate content.', source: 'Threatpedia', roles: ['soc','threat-hunter'] },
            { letter: 'C', name: 'Clientside', acronym: '', definition: 'refers to everything in a web application that is displayed or takes place on the client (end user device) This includes what the user sees, such as text, images, and the rest of the UI, along with any actions that an application performs within the user\'s browser.', source: 'NICCS/CISA', roles: ['ciso','soc'] },
            { letter: 'C', name: 'Cloud Access Security Broker', acronym: 'CASB', definition: 'A security solution that sits between users and cloud services to monitor activity, enforce policies, and prevent data exfiltration. Provides visibility into cloud usage.', source: 'Threatpedia', roles: ['cloud-sec'] },
            { letter: 'C', name: 'Cloud Computing', acronym: '', definition: 'A model for enabling on-demand network access to a shared pool of configurable computing capabilities or resources (e.g., networks, servers, storage, applications, and services) that can be rapidly provisioned and released with minimal management effort or service provider interaction.', source: 'NICCS/CISA', roles: ['cloud-sec','ciso'] },
            { letter: 'C', name: 'Cloud Detection and Response', acronym: 'CDR', definition: 'A cloud-native security solution that provides real-time threat detection, investigation, and response across cloud workloads, identities, APIs, and services by correlating signals from cloud-native telemetry, audit trails, and identity systems.', source: 'Threatpedia', roles: ['cloud-sec','soc','ir-forensics'] },
            { letter: 'C', name: 'Cloud Encryption', acronym: '', definition: 'Encrypting data before uploading it to the cloud to ensure confidentiality even if the cloud provider is compromised. Includes encryption in transit and at rest.', source: 'Threatpedia', roles: ['cloud-sec'] },
            { letter: 'C', name: 'Cloud Infrastructure Entitlement Management', acronym: 'CIEM', definition: 'A security solution that manages and governs identities, access rights, and permissions across cloud and multi-cloud environments. Detects over-provisioned access and enforces least-privilege policies at scale.', source: 'SANS', roles: ['cloud-sec','appsec-devsecops','ciso'] },
            { letter: 'C', name: 'Cloud Migration Security', acronym: '', definition: 'The security considerations and practices involved in moving applications, data, and infrastructure from on-premises to cloud environments while maintaining security posture.', source: 'SANS', roles: ['cloud-sec','ciso'] },
            { letter: 'C', name: 'Cloud Security Alliance', acronym: 'CSA', definition: 'A non-profit organization that defines best practices for securing cloud computing environments. Publishes the Cloud Controls Matrix and STAR certification program.', source: 'SANS', roles: ['cloud-sec','grc'] },
            { letter: 'C', name: 'Cloud Security Posture Management', acronym: 'CSPM', definition: 'A security solution that continuously monitors cloud configurations and identifies misconfigurations, compliance violations, and security risks in cloud environments.', source: 'Threatpedia', roles: ['ciso','cloud-sec'] },
            { letter: 'C', name: 'Cloud Workload Protection Platform', acronym: 'CWPP', definition: 'A security solution that protects cloud workloads (VMs, containers, serverless) from vulnerabilities and threats. Provides runtime protection and compliance monitoring.', source: 'Threatpedia', roles: ['cloud-sec'] },
            { letter: 'C', name: 'Cloud-Native Application Protection Platform', acronym: 'CNAPP', definition: 'An integrated platform that provides comprehensive protection for cloud-native applications, including code scanning, runtime protection, and incident response.', source: 'Threatpedia', roles: ['cloud-sec','network-infra'] },
            { letter: 'C', name: 'COBIT', acronym: 'Control Objectives for Information and Related Technology', definition: 'A framework for IT governance and management that helps organizations align IT with business objectives. Covers governance, strategy, risk, performance, and resource management.', source: 'Threatpedia', roles: ['ciso'] },
            { letter: 'C', name: 'Code Injection', acronym: '', definition: 'An attack technique where an attacker introduces malicious code into a vulnerable application. Includes SQL injection, command injection, and LDAP injection variants.', source: 'SANS', roles: ['pentest-red','appsec-devsecops'] },
            { letter: 'C', name: 'Code Review', acronym: '', definition: 'The process of examining source code for security vulnerabilities, logic errors, and coding standard violations. Part of secure development practices.', source: 'Threatpedia', roles: ['appsec-devsecops'] },
            { letter: 'C', name: 'Code Signing', acronym: '', definition: 'The practice of digitally signing software code to verify its authenticity and integrity. Assures users that code comes from a trusted source and has not been modified.', source: 'Threatpedia', roles: ['ciso','soc'] },
            { letter: 'C', name: 'Collect & Operate', acronym: '', definition: 'A NICE Framework category consisting of specialty areas responsible for specialized denial and deception operations and collection of cybersecurity information that may be used to develop intelligence.', source: 'NICCS/CISA', roles: ['ciso','soc'] },
            { letter: 'C', name: 'Collection Operations', acronym: '', definition: 'In the NICE Framework, cybersecurity work where a person: Executes collection using appropriate strategies and within the priorities established through the collection management process.', source: 'NICCS/CISA', roles: ['ciso','soc'] },
            { letter: 'C', name: 'Collective Defense', acronym: '', definition: 'A collaborative security approach where organizations share threat information and defensive techniques to strengthen defense against adversaries affecting all parties.', source: 'Threatpedia', roles: ['soc','threat-hunter'] },
            { letter: 'C', name: 'Collision', acronym: '', definition: 'In cryptography, a situation where two different inputs produce the same hash output. Hash collisions can be exploited to forge digital signatures or bypass integrity checks.', source: 'SANS', roles: ['appsec-devsecops'] },
            { letter: 'C', name: 'Command and Control', acronym: 'C2', definition: 'Infrastructure used by attackers to communicate with and control compromised systems. Can use HTTP, DNS, or custom protocols to evade detection.', source: 'SANS', roles: ['threat-hunter','soc','ir-forensics','threat-intel'] },
            { letter: 'C', name: 'Command Injection', acronym: '', definition: 'An attack that exploits vulnerabilities in applications that pass unsanitized user input to system commands, allowing execution of arbitrary commands on the host OS.', source: 'SANS', roles: ['pentest-red','appsec-devsecops'] },
            { letter: 'C', name: 'Commodity Malware', acronym: '', definition: 'Widely available, off-the-shelf malware that is used by many threat actors. Includes tools like Cobalt Strike, Mimikatz, and various RATs available on underground forums.', source: 'Huntress', roles: ['threat-intel','soc','ir-forensics'] },
            { letter: 'C', name: 'Common Criteria', acronym: 'CC', definition: 'An international standard (ISO/IEC 15408) for evaluating the security properties of IT products. Provides assurance levels (EAL1-7) for evaluated products.', source: 'SANS', roles: ['grc','ciso'] },
            { letter: 'C', name: 'Common Vulnerabilities and Exposures', acronym: 'CVE', definition: 'A publicly disclosed vulnerability assigned a unique identifier. Enables tracking and discussion of security issues across tools and databases.', source: 'Threatpedia', roles: ['soc','threat-hunter'] },
            { letter: 'C', name: 'Common Vulnerability Scoring System', acronym: 'CVSS', definition: 'A framework for rating the severity of vulnerabilities from 0 to 10 based on factors like attack vector, complexity, and impact.', source: 'Threatpedia', roles: ['pentest-red'] },
            { letter: 'C', name: 'Common Weakness Enumeration', acronym: 'CWE', definition: 'A list of software and hardware weaknesses that can lead to vulnerabilities. Helps developers and security professionals understand and prevent common flaws.', source: 'Threatpedia', roles: ['pentest-red'] },
            { letter: 'C', name: 'Compensating Control', acronym: '', definition: 'An alternative security measure employed when a primary control cannot be implemented. Must provide an equivalent level of protection to meet security requirements.', source: 'SANS', roles: ['grc','ciso'] },
            { letter: 'C', name: 'Compliance', acronym: '', definition: 'The state of adhering to security policies, standards, frameworks, and regulations applicable to an organization.', source: 'Threatpedia', roles: ['ciso','grc'] },
            { letter: 'C', name: 'Compliance Framework', acronym: '', definition: 'A structured set of guidelines and best practices that organizations follow to meet regulatory requirements and industry standards for security and data protection.', source: 'SANS', roles: ['grc','ciso'] },
            { letter: 'C', name: 'Computer Network Defense', acronym: '', definition: 'The actions taken to defend against unauthorized activity within computer networks.', source: 'NICCS/CISA', roles: ['network-infra'] },
            { letter: 'C', name: 'Computer Network Defense Analysis', acronym: '', definition: 'In the NICE Framework, cybersecurity work where a person: Uses defensive measures and information collected from a variety of sources to identify, analyze, and report events that occur or might occur within the network in order to protect information, information systems, and networks from threats.', source: 'NICCS/CISA', roles: ['network-infra'] },
            { letter: 'C', name: 'Computer Network Defense Infrastructure Support', acronym: '', definition: 'In the NICE Framework, cybersecurity work where a person: Tests, implements, deploys, maintains, reviews, and administers the infrastructure hardware and software that are required to effectively manage the computer network defense service provider network and resources; monitors network to actively remediate unauthorized activities.', source: 'NICCS/CISA', roles: ['grc','network-infra'] },
            { letter: 'C', name: 'Conditional Access', acronym: '', definition: 'A security model that grants access based on real-time evaluation of contextual conditions such as device health, location, and risk level.', source: 'Threatpedia', roles: ['ciso','network-infra'] },
            { letter: 'C', name: 'Confidentiality', acronym: '', definition: 'A security principle ensuring that information is accessible only to authorized individuals and protected from disclosure.', source: 'Threatpedia', roles: ['ciso','network-infra'], related: 'availability, integrity' },
            { letter: 'C', name: 'Configuration Drift', acronym: '', definition: 'The gradual divergence of system configurations from their documented or intended state over time. A common cause of security vulnerabilities and compliance failures.', source: 'SANS', roles: ['cloud-sec','grc'] },
            { letter: 'C', name: 'Configuration Management', acronym: '', definition: 'The process of documenting, tracking, and controlling changes to systems and software. Essential for maintaining security baselines and compliance.', source: 'Threatpedia', roles: ['ciso','soc'] },
            { letter: 'C', name: 'Consequence', acronym: '', definition: 'The effect of an event, incident, or occurrence. In cybersecurity, the effect of a loss of confidentiality, integrity or availability of information or an information system on an organization\'s operations, its assets, on individuals, other organizations, or on national interests.', source: 'NICCS/CISA', roles: ['soc'] },
            { letter: 'C', name: 'Container Image Scanning', acronym: '', definition: 'The process of analyzing container images for known vulnerabilities and misconfigurations before deployment. Part of container security strategy.', source: 'Threatpedia', roles: ['cloud-sec','appsec-devsecops'] },
            { letter: 'C', name: 'Container Security', acronym: '', definition: 'The practice of securing containerized applications through image scanning, runtime protection, and orchestration security. Addresses unique threats in container environments.', source: 'Threatpedia', roles: ['cloud-sec'] },
            { letter: 'C', name: 'Containerization', acronym: '', definition: 'A method of virtualization where applications run in isolated user spaces called containers, sharing the host OS kernel. Introduces unique security challenges around image integrity and orchestration.', source: 'SANS', roles: ['cloud-sec','appsec-devsecops'] },
            { letter: 'C', name: 'Containment', acronym: '', definition: 'An incident response phase focused on limiting the scope and impact of a security incident. Includes isolating affected systems and blocking attacker access.', source: 'SANS', roles: ['ir-forensics','soc'] },
            { letter: 'C', name: 'Content Filtering', acronym: '', definition: 'The process of monitoring and restricting access to web content based on predefined policies. Used to block malicious websites, inappropriate content, and data exfiltration attempts.', source: 'SANS', roles: ['network-infra','soc'] },
            { letter: 'C', name: 'Content Security Policy', acronym: 'CSP', definition: 'An HTTP response header that allows website administrators to control resources the browser is allowed to load. Mitigates XSS and data injection attacks.', source: 'SANS', roles: ['appsec-devsecops'] },
            { letter: 'C', name: 'Continuity Of Operations Plan', acronym: '', definition: 'A document that sets forth procedures for the continued performance of core capabilities and critical operations during any disruption or potential disruption.', source: 'NICCS/CISA', roles: ['ciso','soc'], related: 'Business Continuity Plan, Disaster Recovery Plan, Contingency Plan' },
            { letter: 'C', name: 'Continuous Integration Security', acronym: '', definition: 'Security practices integrated into CI/CD pipelines, including automated code scanning, dependency checking, container image scanning, and security testing at each build stage.', source: 'SANS', roles: ['appsec-devsecops'] },
            { letter: 'C', name: 'Continuous Monitoring', acronym: '', definition: 'The ongoing surveillance of an organization\'s security posture through automated tools and processes. Provides real-time visibility into threats and vulnerabilities.', source: 'Huntress', roles: ['soc','grc','ciso'] },
