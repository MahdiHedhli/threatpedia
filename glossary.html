            { letter: 'P', name: 'Port Scanning', acronym: '', definition: 'The technique of probing a host for open ports to discover running services and potential vulnerabilities. Common tools include Nmap and Masscan.', source: 'SANS', roles: ['pentest-red','soc'] },
            { letter: 'P', name: 'Post-Exploitation', acronym: '', definition: 'Activities performed after successfully exploiting a vulnerability, including privilege escalation, persistence, data collection, and lateral movement.', source: 'SANS', roles: ['pentest-red','threat-hunter'] },
            { letter: 'P', name: 'Post-Incident Review', acronym: 'PIR', definition: 'A meeting held after an incident to discuss what happened, what was handled well, and what could be improved. Also called a "lessons learned" session.', source: 'Threatpedia', roles: ['soc'] },
            { letter: 'P', name: 'Post-Quantum Cryptography', acronym: 'PQC', definition: 'Cryptographic algorithms designed to resist attacks from quantum computers. Being standardized by NIST as quantum computers become more practical.', source: 'Threatpedia', roles: ['grc'] },
            { letter: 'P', name: 'PowerShell Attack', acronym: '', definition: 'Malicious use of Microsoft PowerShell for executing payloads, downloading malware, and performing post-exploitation activities. Leverages PowerShell\'s deep system access and scripting capabilities.', source: 'Huntress', roles: ['threat-hunter','soc'] },
            { letter: 'P', name: 'Precursor', acronym: '', definition: 'An observable occurrence or sign that an attacker may be preparing to cause an incident.', source: 'NICCS/CISA', roles: ['soc','threat-hunter'], related: 'indicator' },
            { letter: 'P', name: 'Preparedness', acronym: '', definition: 'The activities to build, sustain, and improve readiness capabilities to prevent, protect against, respond to, and recover from natural or manmade incidents.', source: 'NICCS/CISA', roles: ['soc'] },
            { letter: 'P', name: 'Principle of Defense in Depth', acronym: '', definition: 'A security philosophy that implements multiple layers of controls throughout an information system. If one mechanism fails, another is in place to thwart an attack.', source: 'SANS', roles: ['ciso','network-infra'] },
            { letter: 'P', name: 'Principle of Least Authority', acronym: 'POLA', definition: 'A security design principle that grants each module, process, or user the minimum authority needed to perform their function. Reduces the blast radius of compromise.', source: 'SANS', roles: ['ciso','appsec-devsecops','cloud-sec'] },
            { letter: 'P', name: 'Privacy', acronym: '', definition: 'The right of individuals to control information about themselves and protection of personal data from unauthorized use.', source: 'Threatpedia', roles: ['grc'] },
            { letter: 'P', name: 'Privacy Impact Assessment', acronym: 'PIA', definition: 'An analysis of how personally identifiable information is collected, used, shared, and maintained. Required by many privacy regulations to assess privacy risks.', source: 'SANS', roles: ['grc'] },
            { letter: 'P', name: 'Private Cloud', acronym: '', definition: 'A cloud infrastructure dedicated exclusively to a single organization, providing greater control and privacy than public clouds. Can be on-premises or hosted.', source: 'Threatpedia', roles: ['cloud-sec'] },
            { letter: 'P', name: 'Private Key', acronym: '', definition: 'A cryptographic key that must be kept confidential and is used to enable the operation of an asymmetric (public key) cryptographic algorithm. The secret part of an asymmetric key pair that is uniquely associated with an entity.', source: 'NICCS/CISA', roles: ['network-infra','appsec-devsecops'], related: 'public key, asymmetric cryptography' },
            { letter: 'P', name: 'Privilege Escalation', acronym: '', definition: 'The act of exploiting a vulnerability or misconfiguration to gain elevated access rights. Includes horizontal (accessing other users\' resources) and vertical (gaining admin access) escalation.', source: 'SANS', roles: ['pentest-red','threat-hunter','ir-forensics'] },
            { letter: 'P', name: 'Privileged Access Management', acronym: 'PAM', definition: 'A security solution that manages and monitors access to privileged accounts and credentials. Includes password vaults, session recording, and access controls.', source: 'Threatpedia', roles: ['ciso','network-infra'] },
            { letter: 'P', name: 'Process Hollowing', acronym: '', definition: 'A code injection technique where an attacker creates a process in a suspended state, replaces its code with malicious code, and then resumes execution. Used to evade detection.', source: 'SANS', roles: ['threat-hunter','ir-forensics'] },
            { letter: 'P', name: 'Prompt Injection', acronym: '', definition: 'An attack that manipulates LLM behavior by injecting malicious instructions into prompts. Can bypass safety measures and cause unintended outputs.', source: 'Threatpedia', roles: ['pentest-red'] },
            { letter: 'P', name: 'Proof of Concept', acronym: 'PoC', definition: 'A demonstration that a vulnerability can be exploited. Often used in bug reports and security research to show technical feasibility.', source: 'Threatpedia', roles: ['pentest-red'] },
            { letter: 'P', name: 'Protect & Defend', acronym: '', definition: 'A NICE Framework category consisting of specialty areas responsible for the identification, analysis, and mitigation of threats to internal IT systems or networks.', source: 'NICCS/CISA', roles: ['soc','threat-hunter'] },
            { letter: 'P', name: 'Protocol Analysis', acronym: '', definition: 'The process of examining network protocol behavior and communications to identify anomalies, vulnerabilities, or malicious activity.', source: 'SANS', roles: ['network-infra','soc','ir-forensics'] },
            { letter: 'P', name: 'Proxy', acronym: '', definition: 'A network intermediary that stands between clients and servers, forwarding requests and responses. Used for filtering, caching, and security monitoring.', source: 'Threatpedia', roles: ['network-infra'] },
            { letter: 'P', name: 'Proxy Server', acronym: '', definition: 'An intermediary server that separates end users from the websites they browse. Provides security, privacy, and caching functions. Can be forward or reverse proxy.', source: 'SANS', roles: ['network-infra'] },
            { letter: 'P', name: 'Proxyjacking', acronym: '', definition: 'a malicious technique where an attacker gains control over a target\'s proxy server, allowing them to intercept and manipulate the targets internet traffic', source: 'NICCS/CISA', roles: ['network-infra'] },
            { letter: 'P', name: 'PTaaS', acronym: 'Pentest as a Service', definition: 'a hybrid solution that combines the breadth of automation with the depth of human assessment, while integrated with advanced vulnerability management and analytics', source: 'NICCS/CISA', roles: ['soc','threat-hunter'] },
            { letter: 'P', name: 'PTES', acronym: 'Penetration Testing Execution Standard', definition: 'A comprehensive framework for conducting authorized penetration tests, covering seven phases: pre-engagement, intelligence gathering, threat modeling, vulnerability analysis, exploitation, post-exploitation, and reporting.', source: 'Threatpedia', roles: ['pentest-red'] },
            { letter: 'P', name: 'Public Key', acronym: '', definition: 'A cryptographic key that may be widely published and is used to enable the operation of an asymmetric (public key) cryptographic algorithm. The public part of an asymmetric key pair that is uniquely associated with an entity and that may be made public.', source: 'NICCS/CISA', roles: ['network-infra','appsec-devsecops'], related: 'private key, asymmetric cryptography' },
            { letter: 'P', name: 'Public Key Cryptography', acronym: '', definition: 'A branch of cryptography in which a cryptographic system or algorithms use two uniquely linked keys: a public key and a private key (a key pair).', source: 'NICCS/CISA', roles: ['network-infra','appsec-devsecops'], synonyms: 'asymmetric cryptography, public key encryption' },
            { letter: 'P', name: 'Public Key Infrastructure', acronym: 'PKI', definition: 'A system for managing digital certificates and public keys. Enables secure communication, digital signatures, and authentication in public networks.', source: 'Threatpedia', roles: ['network-infra','grc'] },
            { letter: 'P', name: 'Purple Team', acronym: '', definition: 'A collaborative security approach where red team (offensive) and blue team (defensive) work together to improve security. Focuses on maximizing the value of security testing.', source: 'SANS', roles: ['pentest-red','soc','ciso'] },
            { letter: 'Q', name: 'Quantum Computing Security', acronym: '', definition: 'Security considerations for protecting systems against future quantum computers, including post-quantum cryptography and quantum-resistant algorithms.', source: 'Threatpedia', roles: ['network-infra','appsec-devsecops'] },
            { letter: 'Q', name: 'Quantum Computing Threat', acronym: '', definition: 'The potential future risk that quantum computers could break current encryption algorithms, particularly RSA and ECC. Driving development of post-quantum cryptography standards.', source: 'SANS', roles: ['ciso','network-infra'] },
            { letter: 'Q', name: 'Quantum Key Distribution', acronym: 'QKD', definition: 'A method of securely distributing encryption keys using quantum mechanics principles. Theoretically provides unconditional security for key exchange.', source: 'SANS', roles: ['network-infra'] },
            { letter: 'R', name: 'RaaS', acronym: 'Ransomware as a Service', definition: 'a cybercrime business model in which ransomware developers sell ransomware code or malware to other hackers, called “affiliates,” who then use the code to initiate their own ransomware attacks.', source: 'NICCS/CISA', roles: ['soc','threat-hunter'] },
            { letter: 'R', name: 'Race Condition', acronym: '', definition: 'A security vulnerability that occurs when multiple processes access shared resources concurrently, and the final result depends on the timing of execution. Attackers can exploit timing windows to bypass security checks or manipulate critical operations.', source: 'Threatpedia', roles: ['pentest-red'] },
            { letter: 'R', name: 'RADIUS', acronym: 'Remote Authentication Dial-In User Service', definition: 'A networking protocol that provides centralized authentication, authorization, and accounting management for users connecting to a network service.', source: 'SANS', roles: ['network-infra'] },
            { letter: 'R', name: 'Rainbow Table', acronym: '', definition: 'A precomputed table of hash values used for reversing cryptographic hash functions, primarily for cracking password hashes. Countered by salting passwords.', source: 'SANS', roles: ['pentest-red'] },
            { letter: 'R', name: 'Ransomware', acronym: '', definition: 'Malware that encrypts a victim\'s files or locks their system, demanding payment for decryption or restoration. Notable variants include WannaCry, NotPetya, and LockBit.', source: 'Threatpedia', roles: ['soc','threat-hunter'] },
            { letter: 'R', name: 'Ransomware Negotiation', acronym: '', definition: 'The process of communicating with ransomware operators to reduce payment demands, extend deadlines, or obtain proof of data deletion. Often handled by specialized firms.', source: 'Huntress', roles: ['ir-forensics','ciso'] },
            { letter: 'R', name: 'Ransomware-as-a-Service', acronym: 'RaaS', definition: 'A cybercrime business model where ransomware operators lease their malware and infrastructure to affiliates in exchange for a share of ransom payments.', source: 'SANS', roles: ['threat-intel','ciso','soc'] },
            { letter: 'R', name: 'RDP Compromise', acronym: '', definition: 'Unauthorized access gained through Remote Desktop Protocol, often via brute force attacks, credential stuffing, or exploiting unpatched vulnerabilities. A common initial access vector.', source: 'Huntress', roles: ['soc','pentest-red'] },
            { letter: 'R', name: 'Reconnaissance', acronym: '', definition: 'The first phase of a cyber attack where the attacker gathers information about the target. Includes passive (OSINT) and active (scanning, probing) methods.', source: 'SANS', roles: ['pentest-red','threat-hunter','threat-intel'] },
            { letter: 'R', name: 'Recovery', acronym: '', definition: 'The activities after an incident or event to restore essential services and operations in the short and medium term and fully restore all capabilities in the longer term.', source: 'NICCS/CISA', roles: ['soc','ir-forensics'] },
            { letter: 'R', name: 'Recovery Point Objective', acronym: 'RPO', definition: 'The maximum acceptable amount of data loss measured in time. Determines backup frequency and data replication requirements.', source: 'SANS', roles: ['ciso','grc'] },
            { letter: 'R', name: 'Recovery Time Objective', acronym: 'RTO', definition: 'The maximum acceptable time to restore a system or service after a disaster or disruption. Drives investment in redundancy and failover capabilities.', source: 'SANS', roles: ['ciso','grc'] },
            { letter: 'R', name: 'Red Team', acronym: '', definition: 'A group authorized and organized to emulate a potential adversary’s attack or exploitation capabilities against an enterprise’s cybersecurity posture.', source: 'NICCS/CISA', roles: ['pentest-red','ciso'], related: 'Blue Team, White Team' },
            { letter: 'R', name: 'Red Team Assessment', acronym: '', definition: 'A comprehensive, goal-oriented adversarial assessment that simulates real-world attacks. More thorough than penetration testing, includes social engineering and physical access attempts.', source: 'SANS', roles: ['pentest-red'] },
            { letter: 'R', name: 'Red Team Exercise', acronym: '', definition: 'An exercise, reflecting real-world conditions, that is conducted as a simulated attempt by an adversary to attack or exploit vulnerabilities in an enterprise\'s information systems.', source: 'NICCS/CISA', roles: ['pentest-red'], related: 'cyber exercise' },
            { letter: 'R', name: 'Redundancy', acronym: '', definition: 'Additional or alternative systems, sub-systems, assets, or processes that maintain a degree of overall functionality in case of loss or failure of another system, sub-system, asset, or process.', source: 'NICCS/CISA', roles: ['ciso','soc'] },
            { letter: 'R', name: 'Reflected XSS', acronym: '', definition: 'A type of cross-site scripting where the malicious script is reflected off a web server in the URL or form submission, executing in the victim\'s browser when they click a crafted link.', source: 'SANS', roles: ['pentest-red','appsec-devsecops'] },
            { letter: 'R', name: 'Regulatory Compliance', acronym: '', definition: 'The process of adhering to laws, regulations, guidelines, and specifications relevant to an organization\'s business operations and data handling practices.', source: 'SANS', roles: ['grc','ciso'] },
            { letter: 'R', name: 'Remediation', acronym: '', definition: 'The process of addressing and fixing identified security vulnerabilities or incidents. Includes patching, configuration changes, and process improvements.', source: 'SANS', roles: ['soc','ir-forensics','grc'] },
            { letter: 'R', name: 'Remote Access Trojan', acronym: 'RAT', definition: 'Malware that provides unauthorized remote access and control of an infected system. Commonly used by threat actors for espionage, theft, and lateral movement.', source: 'Threatpedia', roles: ['soc','threat-hunter'] },
            { letter: 'R', name: 'Remote Code Execution', acronym: 'RCE', definition: 'A vulnerability that allows an attacker to execute arbitrary code on a target machine or in a target process from a remote location. Among the most severe vulnerability types.', source: 'SANS', roles: ['pentest-red','soc'] },
            { letter: 'R', name: 'Remote Monitoring and Management', acronym: 'RMM', definition: 'Software used by IT providers to remotely manage client systems. Increasingly exploited by attackers for persistence and remote access.', source: 'Huntress', roles: ['soc','network-infra'] },
            { letter: 'R', name: 'Remoting', acronym: '', definition: 'A technology that allows a program to interact with the internals of another program running on a different machine', source: 'NICCS/CISA', roles: ['ciso','soc'] },
            { letter: 'R', name: 'Replay Attack', acronym: '', definition: 'An attack where valid data transmissions are captured and retransmitted to trick the receiver into unauthorized actions. Mitigated by timestamps and nonces.', source: 'SANS', roles: ['network-infra','pentest-red'] },
            { letter: 'R', name: 'Repojacking', acronym: '', definition: 'intentionally taking over the account of an owner or maintainer who hosts a repository', source: 'NICCS/CISA', roles: ['ciso','soc'] },
            { letter: 'R', name: 'Reputation-Based Security', acronym: '', definition: 'Security mechanisms that evaluate the trustworthiness of entities (IPs, domains, files) based on historical behavior and community intelligence to make access decisions.', source: 'SANS', roles: ['soc','network-infra'] },
            { letter: 'R', name: 'Resilience', acronym: '', definition: 'The ability to adapt to changing conditions and prepare for, withstand, and rapidly recover from disruption.', source: 'NICCS/CISA', roles: ['ciso','soc'] },
            { letter: 'R', name: 'Response', acronym: '', definition: 'The activities that address the short-term, direct effects of an incident and may also support short-term recovery. In cybersecurity, response encompasses both automated and manual activities.', source: 'NICCS/CISA', roles: ['ciso','soc'], related: 'recovery' },
            { letter: 'R', name: 'Responsible Disclosure', acronym: '', definition: 'A vulnerability disclosure model where researchers report findings privately to the vendor and allow time for a fix before public disclosure, balancing security and transparency.', source: 'SANS', roles: ['ciso','appsec-devsecops'] },
            { letter: 'R', name: 'Retro Hunt', acronym: '', definition: 'The process of applying new threat intelligence indicators to historical data to identify previously undetected compromises or threat activity.', source: 'SANS', roles: ['threat-hunter','threat-intel'] },
            { letter: 'R', name: 'Reverse Engineering', acronym: '', definition: 'The process of analyzing software or hardware to understand its design, architecture, and functionality. Used in malware analysis and vulnerability research.', source: 'SANS', roles: ['ir-forensics','threat-intel','pentest-red'] },
            { letter: 'R', name: 'Reverse Shell', acronym: '', definition: 'A type of shell where the target machine connects back to the attacker\'s machine, bypassing firewall rules that block incoming connections. Common in post-exploitation.', source: 'SANS', roles: ['pentest-red','ir-forensics','threat-hunter'] },
            { letter: 'R', name: 'Risk', acronym: '', definition: 'The potential for loss or damage calculated as the probability of a threat being exploited multiplied by the impact of exploitation.', source: 'Threatpedia', roles: ['soc','threat-hunter','pentest-red'] },
            { letter: 'R', name: 'Risk Analysis', acronym: '', definition: 'The systematic examination of the components and characteristics of risk.', source: 'NICCS/CISA', roles: ['ciso','soc'], related: 'risk assessment, risk' },
            { letter: 'R', name: 'Risk Appetite', acronym: '', definition: 'The amount and type of risk an organization is willing to accept in pursuit of its objectives. Determines the overall approach to risk management.', source: 'SANS', roles: ['ciso','grc'] },
            { letter: 'R', name: 'Risk Assessment', acronym: '', definition: 'A systematic process of identifying threats, vulnerabilities, and calculating risks to prioritize security investments.', source: 'Threatpedia', roles: ['ciso'], related: 'risk analysis, risk' },
            { letter: 'R', name: 'Risk Management', acronym: '', definition: 'The process of identifying, analyzing, assessing, and communicating risk and accepting, avoiding, transferring or controlling it to an acceptable level considering associated costs and benefits of any actions taken. Includes: 1) conducting a risk assessment; 2) implementing strategies to mitigate risks; 3) continuous monitoring of risk over time; and 4) documenting the overall risk management program.', source: 'NICCS/CISA', roles: ['ciso'], related: 'enterprise risk management, integrated risk management, risk' },
            { letter: 'R', name: 'Risk Mitigation', acronym: '', definition: 'The process of reducing risk through security controls, process improvements, or acceptance of remaining risk.', source: 'Threatpedia', roles: ['ciso'] },
            { letter: 'R', name: 'Risk Quantification', acronym: '', definition: 'The process of assigning monetary values to cyber risks using frameworks like FAIR. Enables business-aligned prioritization and ROI-based security investment decisions.', source: 'SANS', roles: ['ciso','grc'] },
            { letter: 'R', name: 'Risk Register', acronym: '', definition: 'A document that records identified risks, their severity, likelihood, and the measures taken to mitigate them. A fundamental tool for risk management programs.', source: 'SANS', roles: ['grc','ciso'] },
            { letter: 'R', name: 'Risk-Based Data Management', acronym: '', definition: 'A structured approach to managing risks to data and information by which an organization selects and applies appropriate security controls in compliance with policy and commensurate with the sensitivity and value of the data.', source: 'NICCS/CISA', roles: ['ciso','grc'] },
            { letter: 'R', name: 'Rogue Access Point', acronym: '', definition: 'An unauthorized wireless access point installed on a network, either maliciously by an attacker or unknowingly by an employee. Creates a backdoor into the corporate network.', source: 'SANS', roles: ['network-infra','pentest-red'] },
            { letter: 'R', name: 'Role-Based Access Control', acronym: 'RBAC', definition: 'An access control model that grants permissions based on user roles rather than individual identities. Simplifies access management in large organizations.', source: 'Threatpedia', roles: ['ciso','network-infra'] },
            { letter: 'R', name: 'Root Cause Analysis', acronym: 'RCA', definition: 'A systematic investigation to identify the fundamental cause of a security incident rather than addressing only symptoms. Used to prevent recurrence.', source: 'Threatpedia', roles: ['soc','ir-forensics'] },
            { letter: 'R', name: 'Rootkit', acronym: '', definition: 'Malware that gains root or administrative access to a system and attempts to hide its presence from detection. Provides persistent backdoor access and can be extremely difficult to remove.', source: 'Threatpedia', roles: ['soc','threat-hunter','ciso','network-infra'] },
            { letter: 'R', name: 'RSA', acronym: '', definition: 'An asymmetric encryption algorithm that uses a pair of public and private keys. Commonly used for digital signatures, key exchange, and public-key encryption.', source: 'Threatpedia', roles: ['network-infra','appsec-devsecops'] },
            { letter: 'R', name: 'RTOS', acronym: '', definition: 'A real-time operating system (RTOS) is an OS that guarantees real-time applications a certain capability within a specified deadline. In an RTOS, repeated tasks are performed within a tight time boundary, while in a general-purpose operating system, this is not necessarily so', source: 'NICCS/CISA', roles: ['ciso','soc'] },
            { letter: 'R', name: 'Rubber Ducky', acronym: '', definition: 'A USB device that appears as a keyboard to the target computer and rapidly types pre-programmed keystrokes to execute attacks. A popular physical penetration testing tool.', source: 'SANS', roles: ['pentest-red'] },
            { letter: 'R', name: 'Runbook', acronym: '', definition: 'A compiled set of procedures and operations that system administrators or security analysts follow to handle routine tasks or incident response scenarios.', source: 'SANS', roles: ['soc','ir-forensics'] },
            { letter: 'R', name: 'Runtime Application Self-Protection', acronym: 'RASP', definition: 'A security technology that runs within an application to detect and prevent real-time attacks by analyzing application behavior and context.', source: 'SANS', roles: ['appsec-devsecops'] },
            { letter: 'S', name: 'Salt', acronym: '', definition: 'Random data added to a password before hashing to ensure that the same password produces different hash values. Defends against rainbow table and precomputation attacks.', source: 'SANS', roles: ['appsec-devsecops'] },
            { letter: 'S', name: 'Salting', acronym: '', definition: 'Adding random data to passwords before hashing to prevent rainbow table attacks. Each password gets a unique salt, ensuring identical passwords produce different hashes.', source: 'SANS', roles: ['appsec-devsecops','ir-forensics'] },
            { letter: 'S', name: 'SAML', acronym: 'Security Assertion Markup Language', definition: 'A standard for exchanging authentication and authorization information between identity providers and service providers. Commonly used in enterprise SSO solutions.', source: 'Threatpedia', roles: ['ciso','network-infra'] },
            { letter: 'S', name: 'Sandbox', acronym: '', definition: 'An isolated testing environment that mimics a real system to safely execute suspicious files and observe behavior without risking production systems. Key for malware analysis.', source: 'SANS', roles: ['soc','ir-forensics'] },
            { letter: 'S', name: 'Sandboxing', acronym: '', definition: 'A security mechanism that isolates running programs in a restricted environment to prevent them from affecting other parts of the system. Used for malware analysis and application security.', source: 'SANS', roles: ['soc','ir-forensics','appsec-devsecops'] },
            { letter: 'S', name: 'SBOM', acronym: 'Software Bill of Materials', definition: 'A formal inventory of software components, dependencies, and licenses used in an application. Critical for tracking and managing software supply chain risks.', source: 'Threatpedia', roles: ['appsec-devsecops'] },
            { letter: 'S', name: 'SCADA Security', acronym: '', definition: 'Security measures protecting Supervisory Control and Data Acquisition systems used in industrial environments. Critical for utilities, manufacturing, and infrastructure.', source: 'SANS', roles: ['network-infra','ciso'] },
            { letter: 'S', name: 'Scanning', acronym: '', definition: 'The process of probing a network or system to identify active hosts, open ports, running services, and potential vulnerabilities. A key phase in penetration testing.', source: 'SANS', roles: ['pentest-red','network-infra'] },
            { letter: 'S', name: 'SCAP', acronym: 'Security Content Automation Protocol', definition: 'A suite of specifications for standardizing the format and nomenclature for communicating software flaw and security configuration information.', source: 'SANS', roles: ['grc','soc'] },
            { letter: 'S', name: 'Scareware', acronym: '', definition: 'a cyberattack tactic that frightens people into visiting spoofed or infected websites or downloading malicious software (malware)', source: 'NICCS/CISA', roles: ['appsec-devsecops'] },
            { letter: 'S', name: 'SCIM', acronym: 'System for Cross-domain Identity Management', definition: 'An open standard for automating the exchange of user identity information between identity domains or IT systems, simplifying user provisioning and deprovisioning.', source: 'SANS', roles: ['cloud-sec','ciso'] },
            { letter: 'S', name: 'SECaaS', acronym: 'Security as a Service', definition: 'a cloud-based method of outsourcing your cybersecurity', source: 'NICCS/CISA', roles: ['ciso','soc'] },
            { letter: 'S', name: 'SecDevOps', acronym: '', definition: 'a software development methodology that places security concerns first in planning and development', source: 'NICCS/CISA', roles: ['ciso','soc'] },
            { letter: 'S', name: 'SecOps', acronym: '', definition: 'a combination of the terms security and operations, is a methodology that IT managers implement to enhance the connection, collaboration and communication between IT security and IT operations teams', source: 'NICCS/CISA', roles: ['ciso','soc'] },
            { letter: 'S', name: 'Secret Key', acronym: '', definition: 'A cryptographic key that is used for both encryption and decryption, enabling the operation of a symmetric key cryptography scheme. Also, a cryptographic algorithm that uses a single key (i.e., a secret key) for both encryption of plaintext and decryption of ciphertext.', source: 'NICCS/CISA', roles: ['network-infra','appsec-devsecops'], related: 'symmetric key' },
            { letter: 'S', name: 'Secret Management', acronym: '', definition: 'The practice of securely storing and controlling access to sensitive credentials such as API keys, passwords, certificates, and encryption keys in a centralized vault.', source: 'SANS', roles: ['appsec-devsecops','cloud-sec'] },
            { letter: 'S', name: 'Secrets Management', acronym: '', definition: 'The practice of securely storing, managing, and rotating sensitive credentials like API keys, passwords, and tokens. Prevents accidental exposure.', source: 'Threatpedia', roles: ['network-infra','appsec-devsecops'] },
            { letter: 'S', name: 'Secrets Sprawl', acronym: '', definition: 'The uncontrolled proliferation of credentials, API keys, tokens, and other secrets across code repositories, CI/CD pipelines, configuration files, and cloud services, creating an expanding attack surface when secrets are not centrally managed or rotated.', source: 'Threatpedia', roles: ['cloud-sec','appsec-devsecops','ciso'] },
            { letter: 'S', name: 'Secure Access Service Edge', acronym: 'SASE', definition: 'A cloud-delivered network architecture that converges SD-WAN, secure web gateway, CASB, firewall-as-a-service, and zero trust network access into a single platform, providing consistent security policy enforcement for users regardless of location.', source: 'Threatpedia', roles: ['cloud-sec','network-infra','ciso'] },
            { letter: 'S', name: 'Secure Boot', acronym: '', definition: 'A security standard that ensures a device boots using only software trusted by the manufacturer. Protects against boot-level malware such as rootkits and bootkits.', source: 'SANS', roles: ['network-infra'] },
            { letter: 'S', name: 'Secure Development Lifecycle', acronym: 'SDL', definition: 'A software development process that integrates security activities at every phase, from requirements gathering through design, implementation, testing, and deployment.', source: 'SANS', roles: ['appsec-devsecops'] },
            { letter: 'S', name: 'Secure Shell', acronym: 'SSH', definition: 'A cryptographic network protocol for secure remote login, command execution, and file transfer. Provides encrypted communication over unsecured networks.', source: 'SANS', roles: ['network-infra','cloud-sec'] },
            { letter: 'S', name: 'Secure Socket Layer', acronym: 'SSL', definition: 'A deprecated cryptographic protocol for securing communications over a network. Replaced by TLS but the term SSL is still commonly used colloquially to refer to TLS.', source: 'SANS', roles: ['network-infra'] },
            { letter: 'S', name: 'Secure Software Development Framework', acronym: 'SSDF', definition: 'A NIST framework (SP 800-218) providing a set of fundamental, sound, and secure software development practices. Covers preparing the organization, protecting software, producing well-secured software, and responding to vulnerabilities.', source: 'NIST', roles: ['appsec-devsecops','grc'] },
            { letter: 'S', name: 'Secure Software Development Lifecycle', acronym: 'SSDLC', definition: 'A development methodology that integrates security practices throughout all phases of software development from design to deployment.', source: 'Threatpedia', roles: ['ciso','soc'] },
            { letter: 'S', name: 'Securely Provision', acronym: '', definition: 'A NICE Framework category consisting of specialty areas concerned with conceptualizing, designing, and building secure IT systems, with responsibility for some aspect of the systems\' development.', source: 'NICCS/CISA', roles: ['ciso','soc'] },
            { letter: 'S', name: 'Security Architecture', acronym: '', definition: 'The design and structure of an organization\'s security systems, policies, and processes. Defines how security components work together to protect assets.', source: 'SANS', roles: ['ciso','network-infra'] },
            { letter: 'S', name: 'Security Assertion Markup Language', acronym: 'SAML', definition: 'An XML-based open standard for exchanging authentication and authorization data between an identity provider and a service provider. Widely used for enterprise SSO.', source: 'SANS', roles: ['cloud-sec','ciso'] },
            { letter: 'S', name: 'Security Audit', acronym: '', definition: 'A systematic evaluation of an organization\'s security policies, procedures, and controls. Verifies compliance with standards and identifies areas for improvement.', source: 'SANS', roles: ['grc','ciso'] },
            { letter: 'S', name: 'Security Automation', acronym: '', definition: 'The use of information technology in place of manual processes for cyber incident response and management.', source: 'NICCS/CISA', roles: ['soc'] },
            { letter: 'S', name: 'Security Awareness', acronym: '', definition: 'The process of educating users and employees about security risks, best practices, and their role in protecting the organization.', source: 'Threatpedia', roles: ['ciso'] },
            { letter: 'S', name: 'Security Awareness Training', acronym: 'SAT', definition: 'Educational programs designed to teach employees about cybersecurity threats and best practices. Covers phishing recognition, password hygiene, and secure data handling.', source: 'SANS', roles: ['ciso','grc'] },
            { letter: 'S', name: 'Security Baseline', acronym: '', definition: 'A documented set of minimum security requirements that systems must meet. Provides a standard security posture.', source: 'Threatpedia', roles: ['ciso','soc'] },
            { letter: 'S', name: 'Security by Design', acronym: '', definition: 'An approach to software and system development that integrates security considerations from the beginning rather than as an afterthought. Security is built into the architecture, design, and development processes rather than patched on afterward.', source: 'Threatpedia', roles: ['ciso','soc'] },
            { letter: 'S', name: 'Security Control', acronym: '', definition: 'A safeguard or countermeasure designed to protect the confidentiality, integrity, and availability of information. Can be technical, administrative, or physical.', source: 'SANS', roles: ['ciso','grc'] },
            { letter: 'S', name: 'Security Culture', acronym: '', definition: 'An organizational environment where security is valued and integrated into decision-making and daily practices.', source: 'Threatpedia', roles: ['ciso'] },
            { letter: 'S', name: 'Security Incident', acronym: '', definition: 'An event that potentially compromises the confidentiality, integrity, or availability of an information asset. Requires investigation and may trigger incident response.', source: 'Allot', roles: ['soc','ir-forensics','ciso'] },
            { letter: 'S', name: 'Security Information and Event Management', acronym: 'SIEM', definition: 'A platform that aggregates, correlates, and analyzes security logs and events from across an organization\'s IT infrastructure. Provides real-time threat detection and investigation.', source: 'Threatpedia', roles: ['soc'] },
            { letter: 'S', name: 'Security Operations Center', acronym: 'SOC', definition: 'A centralized facility where security analysts monitor, detect, analyze, and respond to cybersecurity incidents using technology and processes.', source: 'SANS', roles: ['soc','ciso'] },
            { letter: 'S', name: 'Security Orchestration, Automation, and Response', acronym: 'SOAR', definition: 'A platform that automates security incident response by orchestrating tools and playbooks to detect, investigate, and respond to threats faster.', source: 'Threatpedia', roles: ['soc'] },
            { letter: 'S', name: 'Security Policy', acronym: '', definition: 'A formal document that defines an organization\'s security objectives, principles, and requirements. Forms the foundation for security programs.', source: 'Threatpedia', roles: ['ciso','grc'] },
            { letter: 'S', name: 'Security Posture', acronym: '', definition: 'The overall security status of an organization\'s networks, information, and systems based on resources, capabilities, and readiness to manage threats.', source: 'Huntress', roles: ['ciso','grc'] },
            { letter: 'S', name: 'Security Program Management', acronym: '', definition: 'In the NICE Framework, cybersecurity work where a person: Manages information security (e.g., information security) implications within the organization, specific program, or other area of responsibility, to include strategic, personnel, infrastructure, policy enforcement, emergency planning, security awareness, and other resources (e.g., the role of a Chief Information Security Officer).', source: 'NICCS/CISA', roles: ['ciso','grc'] },
            { letter: 'S', name: 'Separation of Duties', acronym: 'SoD', definition: 'A security principle requiring that critical tasks be divided among multiple individuals to prevent fraud and errors. No single person should control all aspects of a critical process.', source: 'SANS', roles: ['grc','ciso'] },
            { letter: 'S', name: 'Server-Side Request Forgery', acronym: 'SSRF', definition: 'A vulnerability that allows an attacker to induce the server-side application to make requests to unintended locations, potentially accessing internal services or cloud metadata.', source: 'SANS', roles: ['pentest-red','appsec-devsecops'] },
            { letter: 'S', name: 'Server-Side Template Injection', acronym: 'SSTI', definition: 'A web application vulnerability that allows attackers to inject template code into server-side templating engines. This can lead to remote code execution or information disclosure if the injected template is evaluated.', source: 'Threatpedia', roles: ['pentest-red'] },
            { letter: 'S', name: 'Serverless Security', acronym: '', definition: 'Security practices for protecting serverless computing environments and functions. Focuses on application security, access control, and monitoring.', source: 'Threatpedia', roles: ['cloud-sec'] },
            { letter: 'S', name: 'Service Level Agreement', acronym: 'SLA', definition: 'A commitment between a service provider and client that defines expected performance metrics including uptime, response time, and security incident handling procedures.', source: 'SANS', roles: ['ciso','grc'] },
            { letter: 'S', name: 'Service Mesh', acronym: '', definition: 'A dedicated infrastructure layer for handling service-to-service communication in microservices architectures. Provides security features like mTLS, access control, and observability.', source: 'SANS', roles: ['cloud-sec','appsec-devsecops'] },
            { letter: 'S', name: 'Session Fixation', acronym: '', definition: 'An attack that exploits a vulnerability in how web applications manage session identifiers, allowing an attacker to fixate a session ID and then hijack the user\'s session.', source: 'SANS', roles: ['appsec-devsecops','pentest-red'] },
            { letter: 'S', name: 'Session Hijacking', acronym: '', definition: 'An attack where an attacker steals or predicts a valid session token to impersonate a legitimate user. Often combined with MITM or cookie theft techniques.', source: 'Threatpedia', roles: ['soc','threat-hunter'] },
            { letter: 'S', name: 'SHA-256', acronym: '', definition: 'A cryptographic hash function that produces a 256-bit hash value. Commonly used for digital signatures, password hashing, and data integrity verification.', source: 'Threatpedia', roles: ['network-infra','appsec-devsecops'] },
            { letter: 'S', name: 'Shadow AI', acronym: '', definition: 'The unauthorized or unmonitored use of AI models, APIs, and tools within an organization, operating outside IT governance and security oversight. Shadow AI deployments may expose sensitive data through model training, prompt injection, or uncontrolled API integrations.', source: 'Threatpedia', roles: ['cloud-sec','ciso','grc'], related: 'shadow IT' },
            { letter: 'S', name: 'Shadow IT', acronym: '', definition: 'Information technology systems and solutions used within an organization without explicit IT department approval. Creates unmanaged security risks.', source: 'SANS', roles: ['ciso','cloud-sec','grc'] },
            { letter: 'S', name: 'Shared Responsibility Model', acronym: '', definition: 'A cloud security principle that divides security responsibilities between cloud providers and customers based on service model (IaaS, PaaS, SaaS).', source: 'Threatpedia', roles: ['cloud-sec'] },
            { letter: 'S', name: 'Shift-Smart Security', acronym: '', definition: 'An evolution of the shift-left approach that emphasizes intelligent, contextual security feedback within developer workflows rather than simply moving all security testing earlier. Uses AI-driven risk prioritization to reduce alert fatigue and surface only actionable findings.', source: 'Threatpedia', roles: ['appsec-devsecops'] },
            { letter: 'S', name: 'Shoulder Surfing', acronym: '', definition: 'A social engineering technique where an attacker observes a user\'s screen or keyboard to capture sensitive information such as passwords, PINs, or confidential data.', source: 'SANS', roles: ['pentest-red'] },
            { letter: 'S', name: 'Sidecar Proxy', acronym: '', definition: 'A pattern in service mesh architecture where a proxy container runs alongside each application container to handle security, observability, and traffic management.', source: 'SANS', roles: ['cloud-sec'] },
            { letter: 'S', name: 'SIEM', acronym: 'Security information and event management', definition: 'a security solution that helps organizations detect threats before they disrupt business', source: 'NICCS/CISA', roles: ['soc'] },
            { letter: 'S', name: 'Sigma', acronym: '', definition: 'A generic signature format for describing detection patterns in log events. Allows sharing of detection methods independent of specific SIEM products.', source: 'SANS', roles: ['soc','threat-hunter'] },
            { letter: 'S', name: 'Sigma Rules', acronym: '', definition: 'A generic and open signature format for SIEM systems. Allows writing detection rules once and converting them to multiple SIEM query languages.', source: 'Huntress', roles: ['soc','threat-hunter'] },
            { letter: 'S', name: 'Signature', acronym: '', definition: 'A recognizable, distinguishing pattern. Types of signatures: attack signature, digital signature, electronic signature.', source: 'NICCS/CISA', roles: ['network-infra'] },
            { letter: 'S', name: 'Silver Ticket', acronym: '', definition: 'A forged Kerberos TGS (Ticket Granting Service) ticket created using a stolen service account hash, providing access to a specific service without communicating with the domain controller.', source: 'SANS', roles: ['pentest-red','threat-hunter'] },
            { letter: 'S', name: 'Silver Ticket Attack', acronym: '', definition: 'A Kerberos attack where an attacker forges a service ticket using a service account\'s password hash, gaining access to that specific service without contacting the domain controller.', source: 'SANS', roles: ['pentest-red','ir-forensics','threat-hunter'] },
            { letter: 'S', name: 'Single Sign-On', acronym: 'SSO', definition: 'An authentication system that allows users to log in once and access multiple applications without reauthentication. Common in enterprise environments.', source: 'Threatpedia', roles: ['ciso','network-infra'] },
            { letter: 'S', name: 'Situational Awareness', acronym: '', definition: 'Comprehending information about the current and developing security posture and risks, based on information gathered, observation and analysis, and knowledge or experience. In cybersecurity, comprehending the current status and security posture with respect to availability, confidentiality, and integrity of networks, systems, users, and data, as well as projecting future states of these.', source: 'NICCS/CISA', roles: ['ciso','soc'] },
            { letter: 'S', name: 'Skimming', acronym: '', definition: 'The illegal copying of information from the magnetic stripe of a credit or debit card. Digital skimming (Magecart attacks) targets online payment forms.', source: 'SANS', roles: ['soc','threat-intel'] },
            { letter: 'S', name: 'SlowLoris', acronym: '', definition: 'an attack tool designed to take down a server by flooding it with incomplete HTTP requests, without using much of bandwidth', source: 'NICCS/CISA', roles: ['soc','threat-hunter'] },
            { letter: 'S', name: 'Smishing', acronym: '', definition: 'the fraudulent practice of sending text messages purporting to be from reputable companies in order to induce individuals to reveal personal information Similar to Phishing, and Vishing', source: 'NICCS/CISA', roles: ['ciso','soc','pentest-red'], related: 'Phishing' },
            { letter: 'S', name: 'Sniffing', acronym: '', definition: 'The practice of capturing and analyzing network packets as they travel across a network. Used legitimately for troubleshooting and by attackers for credential theft.', source: 'SANS', roles: ['network-infra','pentest-red'] },
            { letter: 'S', name: 'Snort', acronym: '', definition: 'An open-source network intrusion detection and prevention system capable of real-time traffic analysis and packet logging. One of the most widely deployed IDS/IPS technologies.', source: 'SANS', roles: ['soc','network-infra'] },
            { letter: 'S', name: 'SoC', acronym: 'Security Operations Center', definition: 'an intelligence hub for the company, gathering data from across the organization\'s networks, servers, endpoints and other digital assets and using intelligent automation to identify, prioritize and respond to potential cybersecurity threats', source: 'NICCS/CISA', roles: ['soc','threat-hunter'] },
            { letter: 'S', name: 'SOC 2', acronym: 'Service Organization Control 2', definition: 'An audit standard that verifies service organizations meet security, availability, processing integrity, confidentiality, and privacy criteria. Commonly required for SaaS providers.', source: 'Threatpedia', roles: ['grc'] },
            { letter: 'S', name: 'Social Engineering', acronym: '', definition: 'the use of deception to manipulate individuals into divulging confidential or personal information that may be used for fraudulent purposes', source: 'NICCS/CISA', roles: ['pentest-red','soc','ciso'] },
            { letter: 'S', name: 'SoD', acronym: 'Segregation of Duties', definition: 'an internal control designed to prevent error and fraud by ensuring that at least two individuals are responsible for the separate parts of any task.', source: 'NICCS/CISA', roles: ['ciso','soc'] },
            { letter: 'S', name: 'Software as a Service', acronym: 'SaaS', definition: 'A cloud service model delivering applications over the internet on a subscription basis. Cloud provider manages security of the application and infrastructure.', source: 'Threatpedia', roles: ['ciso','soc'] },
            { letter: 'S', name: 'Software Assurance', acronym: '', definition: 'The level of confidence that software is free from vulnerabilities, either intentionally designed into the software or accidentally inserted at any time during its lifecycle, and that the software functions in the intended manner.', source: 'NICCS/CISA', roles: ['ciso','soc'] },
            { letter: 'S', name: 'Software Assurance And Security Engineering', acronym: '', definition: 'In the NICE Framework, cybersecurity work where a person: Develops and writes/codes new (or modifies existing) computer applications, software, or specialized utility programs following software assurance best practices.', source: 'NICCS/CISA', roles: ['ciso','soc'] },
            { letter: 'S', name: 'Software Bill of Materials', acronym: 'SBOM', definition: 'A comprehensive inventory of all components, libraries, and dependencies used in a software application. Essential for supply chain security and vulnerability management.', source: 'SANS', roles: ['appsec-devsecops','grc'] },
            { letter: 'S', name: 'Software Composition Analysis', acronym: 'SCA', definition: 'An automated approach to identifying open-source components, licenses, and vulnerabilities in software applications. Manages supply chain risks.', source: 'Threatpedia', roles: ['ciso','soc'] },
            { letter: 'S', name: 'Software Defined Networking', acronym: 'SDN', definition: 'A network architecture approach that enables centralized, programmatic network control by separating the control plane from the data plane. Enables dynamic security policy enforcement.', source: 'SANS', roles: ['network-infra','cloud-sec'] },
            { letter: 'S', name: 'Software Supply Chain Attack', acronym: '', definition: 'An attack targeting the supply chain to compromise software before it reaches end users. Can affect thousands of organizations through a single compromised component.', source: 'Threatpedia', roles: ['pentest-red','appsec-devsecops'] },
            { letter: 'S', name: 'Software Supply Chain Failures', acronym: '', definition: 'An OWASP Top 10:2025 category (evolved from Vulnerable and Outdated Components) that broadens scope to include unknown vulnerabilities introduced by third-party dependencies, compromised build pipelines, and integrity failures throughout the software supply chain.', source: 'OWASP', roles: ['appsec-devsecops','grc','ciso'] },
            { letter: 'S', name: 'SolarWinds Attack', acronym: '', definition: 'A sophisticated supply chain attack discovered in December 2020 where threat actors compromised the SolarWinds Orion software update mechanism to distribute malware to thousands of organizations.', source: 'SANS', roles: ['threat-intel','ciso'] },
            { letter: 'S', name: 'Spam', acronym: '', definition: 'The abuse of electronic messaging systems to indiscriminately send unsolicited bulk messages.', source: 'NICCS/CISA', roles: ['ciso','soc','network-infra'] },
            { letter: 'S', name: 'Spear Phishing', acronym: '', definition: 'A targeted phishing attack directed at specific individuals or organizations, using personalized information to increase the likelihood of success. The attacker researches the target to make the attack more convincing and relevant.', source: 'Threatpedia', roles: ['soc','threat-hunter'] },
            { letter: 'S', name: 'Spearphish', acronym: '', definition: 'a malicious attack, spear phishing is a targeted form of phishing that uses personalized emails or messages to trick a specific individual or organization into revealing sensitive information or downloading malware', source: 'NICCS/CISA', roles: ['soc','threat-hunter'], related: 'phishing, phish, catphish, smishing' },
            { letter: 'S', name: 'Spectre', acronym: '', definition: 'A class of hardware vulnerabilities that exploit speculative execution in modern processors to leak sensitive data. Affects nearly all modern CPUs.', source: 'SANS', roles: ['network-infra'] },
            { letter: 'S', name: 'SPF', acronym: 'Sender Policy Framework', definition: 'An email authentication protocol that allows domain owners to specify which mail servers are authorized to send email on behalf of their domain. Prevents email spoofing.', source: 'SANS', roles: ['network-infra'] },
            { letter: 'S', name: 'Spidering', acronym: '', definition: 'the process where hackers familiarize themselves with their targets in order to obtain credentials based on their activity', source: 'NICCS/CISA', roles: ['ciso','soc'], related: 'phishing, smishing, vishing, social engineering' },
            { letter: 'S', name: 'Split Tunneling', acronym: '', definition: 'A VPN configuration that routes some traffic through the VPN tunnel while allowing other traffic to directly access the internet. Introduces security risks by bypassing corporate controls.', source: 'SANS', roles: ['network-infra'] },
            { letter: 'S', name: 'Spoofing', acronym: '', definition: 'Faking the sending address of a transmission to gain illegal [unauthorized] entry into a secure system. The deliberate inducement of a user or resource to take incorrect action. Note: Impersonating, masquerading, piggybacking, and mimicking are forms of spoofing.', source: 'NICCS/CISA', roles: ['ciso','soc','network-infra','pentest-red'] },
            { letter: 'S', name: 'Spyware', acronym: '', definition: 'Malware designed to collect information about users and their activities without their knowledge. Can monitor browsing, capture screenshots, or exfiltrate sensitive data.', source: 'Threatpedia', roles: ['soc','threat-hunter','ciso'], related: 'keylogger' },
            { letter: 'S', name: 'SQL Injection', acronym: 'SQLi', definition: 'A code injection attack that inserts malicious SQL statements into input fields to manipulate database queries. Attackers can extract, modify, or delete sensitive data by exploiting vulnerable database interfaces.', source: 'Threatpedia', roles: ['pentest-red'] },
            { letter: 'S', name: 'SSL Certificate', acronym: '', definition: 'A digital document that binds a public key to an entity\'s identity and is used to establish secure HTTPS connections. Issued and verified by a Certificate Authority.', source: 'Threatpedia', roles: ['network-infra','appsec-devsecops'] },
            { letter: 'S', name: 'STaaS', acronym: 'Storage as a Service', definition: 'a practice of using public cloud storage resources to store your data', source: 'NICCS/CISA', roles: ['ciso','soc'] },
            { letter: 'S', name: 'Standard Operating Procedure', acronym: 'SOP', definition: 'A detailed set of instructions for performing specific security tasks consistently and repeatably.', source: 'Threatpedia', roles: ['grc'] },
            { letter: 'S', name: 'Stateful Inspection', acronym: '', definition: 'A firewall technology that monitors the full state of active network connections and makes decisions based on the context of the traffic, not just individual packets.', source: 'SANS', roles: ['network-infra'] },
            { letter: 'S', name: 'Static Analysis', acronym: 'SAST', definition: 'The process of analyzing source code without executing it to identify potential security vulnerabilities, coding errors, and compliance issues. Performed early in the development lifecycle.', source: 'SANS', roles: ['appsec-devsecops'] },
            { letter: 'S', name: 'Static Application Security Testing', acronym: 'SAST', definition: 'An automated security testing approach that analyzes source code without executing it to identify vulnerabilities. Finds issues early in development.', source: 'Threatpedia', roles: ['appsec-devsecops'] },
            { letter: 'S', name: 'Stealware', acronym: '', definition: 'Malware that steals credentials, financial information, or personal data for unauthorized access or sale. Often uses keystroke logging, form grabbing, or screen capture.', source: 'Threatpedia', roles: ['soc','threat-hunter'] },
            { letter: 'S', name: 'Steganography', acronym: '', definition: 'The practice of hiding secret data within ordinary files or messages to avoid detection. Can embed data in images, audio, video, or text files.', source: 'SANS', roles: ['threat-hunter','ir-forensics','threat-intel'] },
            { letter: 'S', name: 'STIX', acronym: 'Structured Threat Information Expression', definition: 'A standardized XML language for describing cyber threat information, enabling organizations to share threat intelligence in a structured, machine-readable format.', source: 'Threatpedia', roles: ['threat-intel'] },
            { letter: 'S', name: 'Stored XSS', acronym: '', definition: 'A type of cross-site scripting where the malicious script is permanently stored on the target server and executed whenever a user views the affected page.', source: 'SANS', roles: ['pentest-red','appsec-devsecops'] },
            { letter: 'S', name: 'Strategic Planning And Policy Development', acronym: '', definition: 'In the NICE Framework, cybersecurity work where a person: Applies knowledge of priorities to define an entity.', source: 'NICCS/CISA', roles: ['ciso','grc'] },
            { letter: 'S', name: 'Stream Cipher', acronym: '', definition: 'A symmetric encryption algorithm that encrypts plaintext one bit or byte at a time, typically faster than block ciphers. Examples include RC4 and ChaCha20.', source: 'SANS', roles: ['network-infra'] },
            { letter: 'S', name: 'Subject', acronym: '', definition: 'An individual, process, or device causing information to flow among objects or a change to the system state. An active entity.', source: 'NICCS/CISA', roles: ['ciso','soc'], related: 'object, access, access control' },
            { letter: 'S', name: 'Subresource Integrity', acronym: 'SRI', definition: 'A security feature that enables browsers to verify that resources fetched from CDNs or external sources have not been tampered with, using cryptographic hashes.', source: 'SANS', roles: ['appsec-devsecops'] },
            { letter: 'S', name: 'Supervisory Control And Data Acquisition', acronym: '', definition: 'A generic name for a computerized system that is capable of gathering and processing data and applying operational controls to geographically dispersed assets over long distances.', source: 'NICCS/CISA', roles: ['grc'], related: 'Industrial Control System' },
            { letter: 'S', name: 'Supply Chain', acronym: '', definition: 'A system of organizations, people, activities, information and resources, for creating and moving products including product components and/or services from suppliers through to their customers.', source: 'NICCS/CISA', roles: ['appsec-devsecops'], related: 'supply chain risk management' },
            { letter: 'S', name: 'Supply Chain Attack', acronym: 'SCA', definition: 'An attack targeting a supply chain to compromise the primary target, affecting vendors, manufacturers, and distributors. SolarWinds and 3CX are notable examples where attackers compromised software updates to reach downstream customers.', source: 'Threatpedia', roles: ['pentest-red','appsec-devsecops'] },
            { letter: 'S', name: 'Supply Chain Risk Management', acronym: '', definition: 'The process of identifying, analyzing, and assessing supply chain risk and accepting, avoiding, transferring or controlling it to an acceptable level considering associated costs and benefits of any actions taken.', source: 'NICCS/CISA', roles: ['ciso','appsec-devsecops','grc'], related: 'supply chain' },
            { letter: 'S', name: 'Suricata', acronym: '', definition: 'An open-source intrusion detection and prevention engine that supports multi-threaded processing and multiple input methods. Alternative to Snort for network security monitoring.', source: 'SANS', roles: ['soc','network-infra'] },
            { letter: 'S', name: 'Surveilling', acronym: '', definition: 'the practice of monitoring computer networks and systems for threats, while surveillance is the act of observing them. In the context of cybersecurity, "surveillance" refers to the continuous monitoring of a network to detect and respond to cyberattacks', source: 'NICCS/CISA', roles: ['soc','threat-hunter'] },
            { letter: 'S', name: 'Switchport', acronym: '', definition: 'the physical opening where a data cable can be plugged in', source: 'NICCS/CISA', roles: ['network-infra'] },
            { letter: 'S', name: 'Symlink', acronym: '', definition: 'a symbolic is a Linux/UNIX link that points to another file or folder on your computer, or a connected file system. Windows has a similar functionality called Shortcut', source: 'NICCS/CISA', roles: ['ciso','soc'] },
            { letter: 'S', name: 'Symmetric Cryptography', acronym: '', definition: 'A branch of cryptography in which a cryptographic system or algorithms use the same secret key (a shared secret key).', source: 'NICCS/CISA', roles: ['network-infra','appsec-devsecops'] },
            { letter: 'S', name: 'Symmetric Encryption', acronym: '', definition: 'An encryption method using the same key for both encryption and decryption. Faster than asymmetric encryption but requires secure key distribution.', source: 'Threatpedia', roles: ['network-infra','appsec-devsecops'] },
            { letter: 'S', name: 'Symmetric Key', acronym: '', definition: 'A cryptographic key that is used to perform both the cryptographic operation and its inverse, for example to encrypt plaintext and decrypt ciphertext, or create a message authentication code and to verify the code. Also, a cryptographic algorithm that uses a single key (i.e., a secret key) for both encryption of plaintext and decryption of ciphertext.', source: 'NICCS/CISA', roles: ['network-infra','appsec-devsecops'], related: 'secret key' },
            { letter: 'S', name: 'SYN Flood', acronym: '', definition: 'A denial-of-service attack that exploits the TCP handshake by sending a flood of SYN requests without completing the handshake, exhausting server resources.', source: 'SANS', roles: ['network-infra','soc'] },
            { letter: 'S', name: 'Synthetic Identity Fraud', acronym: '', definition: 'A type of fraud using synthetic identities created with a mix of real and fake information to circumvent identity verification. Increasingly used in account takeover attacks.', source: 'Threatpedia', roles: ['soc','threat-hunter'] },
            { letter: 'S', name: 'SysOp', acronym: 'System Operator', definition: 'Responsible for the upkeep and maintenance of servers, networks, and other IT infrastructure.', source: 'NICCS/CISA', roles: ['ciso','soc'], related: 'DevOp' },
            { letter: 'S', name: 'System Administration', acronym: '', definition: 'In the NICE Framework, cybersecurity work where a person: Installs, configures, troubleshoots, and maintains server configurations (hardware and software) to ensure their confidentiality, integrity, and availability; also manages accounts, firewalls, and patches; responsible for access control, passwords, and account creation and administration.', source: 'NICCS/CISA', roles: ['grc'] },
            { letter: 'S', name: 'System Integrity', acronym: '', definition: 'The attribute of an information system when it performs its intended function in an unimpaired manner, free from deliberate or inadvertent unauthorized manipulation of the system.', source: 'NICCS/CISA', roles: ['ciso','soc'], related: 'integrity, data integrity' },
            { letter: 'S', name: 'System Prompt Leakage', acronym: '', definition: 'A vulnerability in LLM applications where an attacker extracts the system prompt or hidden instructions through crafted inputs, potentially revealing sensitive business logic, security controls, or access credentials embedded in the prompt.', source: 'OWASP', roles: ['appsec-devsecops','pentest-red'] },
            { letter: 'S', name: 'Systems Development', acronym: '', definition: 'In the NICE Framework, cybersecurity work where a person: Works on the development phases of the systems development lifecycle.', source: 'NICCS/CISA', roles: ['ciso','soc'] },
            { letter: 'S', name: 'Systems Requirements Planning', acronym: '', definition: 'In the NICE Framework, cybersecurity work where a person: Consults with customers to gather and evaluate functional requirements and translates these requirements into technical solutions; provides guidance to customers about applicability of information systems to meet business needs.', source: 'NICCS/CISA', roles: ['ciso','soc'] },
            { letter: 'S', name: 'Systems Security Analysis', acronym: '', definition: 'In the NICE Framework, cybersecurity work where a person: Conducts the integration/testing, operations, and maintenance of systems security.', source: 'NICCS/CISA', roles: ['ciso','soc'] },
            { letter: 'S', name: 'Systems Security Architecture', acronym: '', definition: 'In the NICE Framework, cybersecurity work where a person: Develops system concepts and works on the capabilities phases of the systems development lifecycle; translates technology and environmental conditions (e.g., law and regulation) into system and security designs and processes.', source: 'NICCS/CISA', roles: ['grc'] },
            { letter: 'T', name: 'Tabletop Exercise', acronym: '', definition: 'A simulated incident response exercise where team members discuss and respond to a hypothetical security scenario without actual systems.', source: 'Threatpedia', roles: ['ciso','soc','ir-forensics'] },
            { letter: 'T', name: 'Tactics, Techniques, and Procedures', acronym: 'TTP', definition: 'The behaviors and patterns used by threat actors to conduct attacks, including attack methods (tactics), specific actions (techniques), and detailed implementations (procedures).', source: 'Threatpedia', roles: ['threat-hunter'] },
            { letter: 'T', name: 'Tailored Trustworthy Space', acronym: '', definition: 'A cyberspace environment that provides a user with confidence in its security, using automated mechanisms to ascertain security conditions and adjust the level of security based on the user\'s context and in the face of an evolving range of threats.', source: 'NICCS/CISA', roles: ['soc','threat-hunter'] },
            { letter: 'T', name: 'Targets', acronym: '', definition: 'In the NICE Framework, cybersecurity work where a person: Applies current knowledge of one or more regions, countries, non-state entities, and/or technologies.', source: 'NICCS/CISA', roles: ['ciso','soc'] },
            { letter: 'T', name: 'TAXII', acronym: 'Trusted Automated Exchange of Indicator Information', definition: 'A protocol for exchanging cyber threat intelligence in a standard, automated manner. Works in conjunction with STIX to facilitate threat information sharing.', source: 'Threatpedia', roles: ['threat-intel'] },
            { letter: 'T', name: 'TCP/IP', acronym: 'Transmission Control Protocol/Internet Protocol', definition: 'The foundational communication protocol suite of the internet. Defines how data should be packetized, addressed, transmitted, routed, and received at the destination.', source: 'SANS', roles: ['network-infra'] },
            { letter: 'T', name: 'Technical Intelligence', acronym: 'TECHINT', definition: 'Intelligence gathered through technical means such as signals intelligence, imagery, and network analysis. Includes monitoring of attacker infrastructure and communications.', source: 'Threatpedia', roles: ['threat-intel'] },
            { letter: 'T', name: 'Technology Research And Development', acronym: '', definition: 'In the NICE Framework, cybersecurity work where a person: Conducts technology assessment and integration processes; provides and supports a prototype capability and/or evaluates its utility.', source: 'NICCS/CISA', roles: ['soc'] },
            { letter: 'T', name: 'Test And Evaluation', acronym: '', definition: 'In the NICE Framework, cybersecurity work where a person: Develops and conducts tests of systems to evaluate compliance with specifications and requirements by applying principles and methods for cost-effective planning, evaluating, verifying, and validating of technical, functional, and performance characteristics (including interoperability) of systems or elements of systems incorporating information technology.', source: 'NICCS/CISA', roles: ['ciso','grc'] },
            { letter: 'T', name: 'Third-Party Risk Management', acronym: '', definition: 'The process of assessing and managing security risks posed by vendors, partners, and service providers. Includes vendor assessments and contract requirements.', source: 'Threatpedia', roles: ['ciso'] },
            { letter: 'T', name: 'Threat', acronym: '', definition: 'An adversary, capability, or vulnerability that could potentially cause harm to an organization or system.', source: 'Threatpedia', roles: ['soc','threat-hunter'] },
            { letter: 'T', name: 'Threat Actor', acronym: '', definition: 'An individual or group responsible for cyber attacks. Categories include nation-states, cybercriminals, hacktivists, insider threats, and script kiddies.', source: 'SANS', roles: ['threat-intel','soc','ciso'] },
            { letter: 'T', name: 'Threat Agent', acronym: '', definition: 'An individual, group, organization, or government that conducts or has the intent to conduct detrimental activities.', source: 'NICCS/CISA', roles: ['soc','threat-hunter'], related: 'adversary, attacker' },
            { letter: 'T', name: 'Threat Analysis', acronym: '', definition: 'The detailed evaluation of the characteristics of individual threats. In the NICE Framework, cybersecurity work where a person: Identifies and assesses the capabilities and activities of cyber criminals or foreign intelligence entities; produces findings to help initialize or support law enforcement and counterintelligence investigations or activities.', source: 'NICCS/CISA', roles: ['soc','threat-hunter'] },
            { letter: 'T', name: 'Threat Assessment', acronym: '', definition: 'The product or process of identifying or evaluating entities, actions, or occurrences, whether natural or man-made, that have or indicate the potential to harm life, information, operations, and/or property.', source: 'NICCS/CISA', roles: ['soc','threat-hunter'], related: 'threat analysis' },
            { letter: 'T', name: 'Threat Feed', acronym: '', definition: 'A continuous stream of threat intelligence data including indicators of compromise, malicious IPs, domains, and file hashes from external sources.', source: 'Huntress', roles: ['threat-intel','soc'] },
            { letter: 'T', name: 'Threat Hunting', acronym: '', definition: 'A proactive cybersecurity activity that involves searching networks and systems for evidence of ongoing attacks or indicators of compromise not detected by automated tools.', source: 'Threatpedia', roles: ['threat-hunter'] },
            { letter: 'T', name: 'Threat Intelligence Platform', acronym: 'TIP', definition: 'A technology solution that aggregates, correlates, and analyzes threat intelligence data from multiple sources to provide actionable security insights.', source: 'SANS', roles: ['threat-intel','soc'] },
            { letter: 'T', name: 'Threat Intelligence Sharing', acronym: '', definition: 'The coordinated exchange of threat information between organizations, government agencies, and security vendors to improve collective defense.', source: 'Threatpedia', roles: ['threat-intel'] },
            { letter: 'T', name: 'Threat Landscape', acronym: '', definition: 'The overall view of current and emerging cyber threats facing an organization or industry. Includes threat actors, attack vectors, and trending vulnerabilities.', source: 'SANS', roles: ['threat-intel','ciso'] },
            { letter: 'T', name: 'Threat Modeling', acronym: '', definition: 'A structured approach to identifying, quantifying, and addressing security risks in a system or application. Common methodologies include STRIDE, PASTA, and VAST.', source: 'SANS', roles: ['appsec-devsecops','ciso','pentest-red'] },
            { letter: 'T', name: 'Threat Surface', acronym: '', definition: 'The complete set of possible security risk exposures including all hardware, software, network connections, and human factors that could be exploited.', source: 'Allot', roles: ['ciso','pentest-red'] },
            { letter: 'T', name: 'Threatscape', acronym: '', definition: 'the spectrum of possible cybersecurity threats', source: 'NICCS/CISA', roles: ['appsec-devsecops'] },
            { letter: 'T', name: 'Threatware', acronym: '', definition: 'a general term encompassing all types of malicious software on computers and electronic devices', source: 'NICCS/CISA', roles: ['soc','threat-hunter'], related: 'disruptionware' },
            { letter: 'T', name: 'Ticket', acronym: '', definition: 'In access control, data that authenticates the identity of a client or a service and, together with a temporary encryption key (a session key), forms a credential.', source: 'NICCS/CISA', roles: ['network-infra','appsec-devsecops'] },
            { letter: 'T', name: 'Time-Based One-Time Password', acronym: 'TOTP', definition: 'An algorithm that generates a one-time password using the current time as a source of uniqueness. Used in two-factor authentication apps like Google Authenticator.', source: 'SANS', roles: ['network-infra','appsec-devsecops'] },
            { letter: 'T', name: 'Time-of-Check to Time-of-Use', acronym: 'TOCTOU', definition: 'A race condition vulnerability where a security check is performed, but the resource is modified before it is actually used. The attacker exploits the window between verification and utilization to compromise security.', source: 'Threatpedia', roles: ['pentest-red'] },
            { letter: 'T', name: 'Timestomping', acronym: '', definition: 'a technique used in cybersecurity and digital forensics, where attackers modify the timestamps of files and directories on a computer system to hide their actions or impede investigations', source: 'NICCS/CISA', roles: ['soc','threat-hunter'] },
            { letter: 'T', name: 'TLS', acronym: 'Transport Layer Security', definition: 'A cryptographic protocol that provides end-to-end security for data sent between applications over the Internet. Successor to SSL and the standard for encrypted web communications.', source: 'SANS', roles: ['network-infra'] },
            { letter: 'T', name: 'Token', acronym: '', definition: 'A digital object that represents a user\'s authentication state and permissions. Used in authentication protocols to maintain session state without repeated credential entry.', source: 'SANS', roles: ['appsec-devsecops','network-infra'] },
            { letter: 'T', name: 'Tokenization', acronym: '', definition: 'The process of replacing sensitive data with non-sensitive placeholder tokens. Unlike encryption, the original data cannot be derived from the token.', source: 'SANS', roles: ['grc','appsec-devsecops','cloud-sec'] },
            { letter: 'T', name: 'Traffic Analysis', acronym: '', definition: 'The process of examining network traffic patterns to identify anomalies, potential threats, or unauthorized communications. A key capability in network security monitoring.', source: 'SANS', roles: ['network-infra','soc','threat-hunter'] },
            { letter: 'T', name: 'Traffic Light Protocol', acronym: '', definition: 'A set of designations employing four colors (RED, AMBER, GREEN, and WHITE) used to ensure that sensitive information is shared with the correct audience.', source: 'NICCS/CISA', roles: ['network-infra'] },
            { letter: 'T', name: 'Transport Layer', acronym: '', definition: 'Layer 4 of the OSI model responsible for end-to-end communication and data transfer between processes. Protocols include TCP and UDP. Key focus for network security.', source: 'SANS', roles: ['network-infra'] },
            { letter: 'T', name: 'Transport Layer Security', acronym: 'TLS', definition: 'A cryptographic protocol that provides secure communication over the internet. Replaces SSL and is used for HTTPS, email encryption, and VPN connections.', source: 'Threatpedia', roles: ['network-infra'] },
            { letter: 'T', name: 'Triage', acronym: '', definition: 'The initial assessment and prioritization of security incidents based on severity, impact, and urgency. Determines incident response priority and allocation of resources.', source: 'Threatpedia', roles: ['soc','ir-forensics'] },
            { letter: 'T', name: 'Triple Extortion', acronym: '', definition: 'An evolution of ransomware tactics adding a third layer of pressure beyond encryption and data leak threats, such as DDoS attacks or contacting victims\' customers directly.', source: 'SANS', roles: ['threat-intel','ciso'] },
            { letter: 'T', name: 'Trojan', acronym: '', definition: 'Malware disguised as legitimate software that performs malicious functions when installed. Unlike worms, trojans do not self-replicate and require user action to execute.', source: 'Threatpedia', roles: ['soc','threat-hunter'], related: 'Trojan Horse, Trojanize, Trojaning' },
            { letter: 'T', name: 'Trojan Horse', acronym: '', definition: 'A computer program that appears to have a useful function, but also has a hidden and potentially malicious function that evades security mechanisms, sometimes by exploiting legitimate authorizations of a system entity that invokes the program.', source: 'NICCS/CISA', roles: ['soc','threat-hunter'] },
            { letter: 'T', name: 'Trojanize', acronym: '', definition: 'To convert into a Trojan', source: 'NICCS/CISA', roles: ['ciso','soc'] },
            { letter: 'T', name: 'Trusted Platform Module', acronym: 'TPM', definition: 'A specialized chip on a device that stores RSA encryption keys specific to the host system for hardware authentication. Supports secure boot and disk encryption.', source: 'SANS', roles: ['network-infra'] },
            { letter: 'T', name: 'Two-Factor Authentication', acronym: '2FA', definition: 'A form of MFA requiring exactly two factors for authentication. Common implementations include password plus SMS code or password plus authenticator app.', source: 'Threatpedia', roles: ['ciso','network-infra'] },
            { letter: 'T', name: 'Two-Person Integrity', acronym: 'TPI', definition: 'A security control requiring two authorized individuals to perform critical actions, preventing a single person from compromising sensitive operations.', source: 'Allot', roles: ['grc','ciso'] },
            { letter: 'T', name: 'Typosquatting', acronym: '', definition: 'An attack that registers domain names similar to legitimate ones, exploiting users who mistype URLs to distribute malware or conduct phishing.', source: 'Threatpedia', roles: ['pentest-red','ciso','soc'], related: 'DNS Twist' },
            { letter: 'U', name: 'UAC Bypass', acronym: '', definition: 'A privilege escalation technique that circumvents Windows User Account Control to execute code with elevated privileges without triggering the UAC consent prompt, commonly used by malware during post-exploitation.', source: 'Threatpedia', roles: ['pentest-red','ir-forensics','threat-hunter'], related: 'privilege escalation, User Account Control' },
