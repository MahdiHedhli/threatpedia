            { letter: 'C', name: 'Counter-Biometrics', acronym: '', definition: 'refers to the methods used to bypass or spoof biometric security systems', source: 'NICCS/CISA', roles: ['ciso','soc'], related: 'deepfake' },
            { letter: 'C', name: 'CounterIntel', acronym: 'Counter Intelligence', definition: 'monitoring other competitor organizations and nations to gather information', source: 'NICCS/CISA', roles: ['ciso','soc'] },
            { letter: 'C', name: 'Countermeasure', acronym: '', definition: 'An action, device, procedure, or technique that reduces a threat, vulnerability, or attack by eliminating or preventing it, or by minimizing the harm it can cause.', source: 'SANS', roles: ['ciso','soc'] },
            { letter: 'C', name: 'Covert Channel', acronym: '', definition: 'An unauthorized communication path that allows the transfer of information in a manner that violates the system\'s security policy. Can be timing-based or storage-based.', source: 'SANS', roles: ['threat-hunter','pentest-red'] },
            { letter: 'C', name: 'Credential Dumping', acronym: '', definition: 'The technique of extracting credentials from operating system memory, registry, or files. Tools like Mimikatz can dump passwords, hashes, and Kerberos tickets.', source: 'Huntress', roles: ['pentest-red','ir-forensics','threat-hunter'] },
            { letter: 'C', name: 'Credential Harvesting', acronym: '', definition: 'The process of collecting user credentials through phishing, keylogging, or other techniques. Harvested credentials are used for account takeover or sold on dark markets.', source: 'SANS', roles: ['threat-intel','pentest-red','soc'] },
            { letter: 'C', name: 'Credential Rotation', acronym: '', definition: 'The practice of regularly changing passwords, API keys, certificates, and other credentials to limit the window of opportunity for compromised credentials to be exploited.', source: 'SANS', roles: ['cloud-sec','ciso'] },
            { letter: 'C', name: 'Credential Stuffing', acronym: '', definition: 'An attack that uses previously compromised username and password pairs to gain unauthorized access to accounts. Relies on password reuse across multiple services.', source: 'Threatpedia', roles: ['soc','threat-hunter'] },
            { letter: 'C', name: 'Crimeware', acronym: '', definition: 'a class of malware designed specifically to automate cybercrime', source: 'NICCS/CISA', roles: ['soc','threat-hunter'] },
            { letter: 'C', name: 'Critical Infrastructure', acronym: '', definition: 'The systems and assets, whether physical or virtual, so vital to society that the incapacity or destruction of such may have a debilitating impact on the security, economy, public health or safety, environment, or any combination of these matters.', source: 'NICCS/CISA', roles: ['ciso','soc'], related: 'key resource' },
            { letter: 'C', name: 'CRL', acronym: 'Certificate Revocation List', definition: 'A list maintained by a Certificate Authority of digital certificates that have been revoked before their scheduled expiration date and should no longer be trusted.', source: 'SANS', roles: ['network-infra'] },
            { letter: 'C', name: 'Cross-Origin Resource Sharing', acronym: 'CORS', definition: 'A browser security mechanism that controls how web pages from one origin can request resources from another origin. Misconfiguration can lead to data exposure.', source: 'SANS', roles: ['appsec-devsecops'] },
            { letter: 'C', name: 'Cross-Site Request Forgery', acronym: 'CSRF', definition: 'An attack that tricks authenticated users into performing unwanted actions on websites where they are logged in. The attacker crafts requests that execute with the victim\'s privileges without their knowledge.', source: 'Threatpedia', roles: ['soc','threat-hunter'] },
            { letter: 'C', name: 'Cross-Site Scripting', acronym: 'XSS', definition: 'A web application vulnerability that allows attackers to inject malicious scripts into web pages viewed by other users. The injected code executes in the victim\'s browser, potentially stealing session cookies or credentials.', source: 'Threatpedia', roles: ['pentest-red'] },
            { letter: 'C', name: 'Cross-Zone Scripting', acronym: '', definition: 'A browser vulnerability that allows scripts from a less privileged zone to execute in a more privileged zone, potentially gaining access to local system resources.', source: 'SANS', roles: ['appsec-devsecops'] },
            { letter: 'C', name: 'Crowdsourced', acronym: '', definition: 'obtain (information or input into a particular task or project) by enlisting the services of a large number of people, either paid or unpaid, typically via the internet. The best-known example of a crowdsourcing project in which crowd workers are not paid is the online encyclopedia Wikipedia', source: 'NICCS/CISA', roles: ['ciso','soc'] },
            { letter: 'C', name: 'Crowdstrike Falcon', acronym: '', definition: 'A cloud-native endpoint security platform that combines EDR, threat intelligence, and managed threat hunting capabilities. One of the leading enterprise EDR solutions.', source: 'Huntress', roles: ['soc'] },
            { letter: 'C', name: 'Cryptanalysis', acronym: '', definition: 'The operations performed in defeating or circumventing cryptographic protection of information by applying mathematical techniques and without an initial knowledge of the key employed in providing the protection. The study of mathematical techniques for attempting to defeat or circumvent cryptographic techniques and/or information systems security.', source: 'NICCS/CISA', roles: ['network-infra','appsec-devsecops'] },
            { letter: 'C', name: 'Cryptocurrrency', acronym: '', definition: 'a digital currency in which transactions are verified and records maintained by a decentralized system using cryptography, rather than by a centralized authority.', source: 'NICCS/CISA', roles: ['network-infra','appsec-devsecops'] },
            { letter: 'C', name: 'Cryptographic Algorithm', acronym: '', definition: 'A well-defined computational procedure that takes variable inputs, including a cryptographic key, and produces an output.', source: 'NICCS/CISA', roles: ['network-infra','appsec-devsecops'], related: 'key, encryption, decryption, symmetric key, asymmetric key' },
            { letter: 'C', name: 'Cryptographic Hash', acronym: '', definition: 'A fixed-size output produced by a hash function that uniquely represents input data. Used for data integrity verification, password storage, and digital signatures. Examples include SHA-256 and SHA-3.', source: 'SANS', roles: ['appsec-devsecops','ir-forensics'] },
            { letter: 'C', name: 'Cryptography', acronym: '', definition: 'The use of mathematical techniques to provide security services, such as confidentiality, data integrity, entity authentication, and data origin authentication. The art or science concerning the principles, means, and methods for converting plaintext into ciphertext and for restoring encrypted ciphertext to plaintext.', source: 'NICCS/CISA', roles: ['network-infra','appsec-devsecops'], related: 'plaintext, ciphertext, encryption, decryption' },
            { letter: 'C', name: 'Cryptojacking', acronym: '', definition: 'Malware or code that hijacks computing resources to mine cryptocurrencies without the user\'s knowledge or consent.', source: 'Threatpedia', roles: ['soc','threat-hunter','ciso'] },
            { letter: 'C', name: 'Cryptology', acronym: '', definition: 'The mathematical science that deals with cryptanalysis and cryptography.', source: 'NICCS/CISA', roles: ['soc'], related: 'cryptanalysis, cryptography' },
            { letter: 'C', name: 'Cryptomalware', acronym: '', definition: 'is malware that encrypts data on the targets device and demands a ransom to restore it', source: 'NICCS/CISA', roles: ['soc','threat-hunter'] },
            { letter: 'C', name: 'Cryptominers', acronym: '', definition: 'Cryptomining is an online threat that hides on a computer or mobile device and uses the machine’s resources to “mine” cryptocurrencies.', source: 'NICCS/CISA', roles: ['soc','threat-hunter'], related: 'Cryptojacking' },
            { letter: 'C', name: 'Customer Service And Technical Support', acronym: '', definition: 'In the NICE Framework, cybersecurity work where a person: Addresses problems, installs, configures, troubleshoots, and provides maintenance and training in response to customer requirements or inquiries (e.g., tiered-level customer support).', source: 'NICCS/CISA', roles: ['network-infra'] },
            { letter: 'C', name: 'Cyber Attack', acronym: '', definition: 'A deliberate attempt to breach the security of a computer system, network, or application to steal data, cause damage, or disrupt operations.', source: 'Allot', roles: ['soc','ciso'] },
            { letter: 'C', name: 'Cyber Attribution', acronym: '', definition: 'The process of identifying the perpetrator of a cyber attack based on technical evidence, behavioral patterns, and intelligence analysis. Often challenging due to false flags and proxies.', source: 'SANS', roles: ['threat-intel'] },
            { letter: 'C', name: 'Cyber Deception', acronym: '', definition: 'A proactive defense strategy that uses decoys, honeypots, and deceptive data to mislead attackers, detect their presence, and gather intelligence about their methods.', source: 'SANS', roles: ['threat-hunter','soc'] },
            { letter: 'C', name: 'Cyber Ecosystem', acronym: '', definition: 'The interconnected information infrastructure of interactions among persons, processes, data, and information and communications technologies, along with the environment and conditions that influence those interactions.', source: 'NICCS/CISA', roles: ['ciso','soc'] },
            { letter: 'C', name: 'Cyber Exercise', acronym: '', definition: 'A planned event during which an organization simulates a cyber disruption to develop or test capabilities such as preventing, detecting, mitigating, responding to or recovering from the disruption.', source: 'NICCS/CISA', roles: ['ciso','soc'] },
            { letter: 'C', name: 'Cyber Hygiene', acronym: '', definition: 'The fundamental practices and steps users and organizations take to maintain system health and improve online security. Includes patching, strong passwords, MFA, and backup procedures.', source: 'SANS', roles: ['ciso','soc'] },
            { letter: 'C', name: 'Cyber Infrastructure', acronym: '', definition: 'An electronic information and communications systems and services and the information contained therein. The information and communications systems and services composed of all hardware and software that process, store, and communicate information, or any combination of all of these elements: • Processing includes the creation, access, modification, and destruction of information. • Storage includes paper, magnetic, electronic, and all other media types. • Communications include sharing and distribution of information.', source: 'NICCS/CISA', roles: ['ciso','network-infra'] },
            { letter: 'C', name: 'Cyber Insurance', acronym: '', definition: 'Insurance coverage designed to help organizations mitigate financial losses from cyber incidents including data breaches, ransomware, and business interruption.', source: 'Huntress', roles: ['ciso','grc'] },
            { letter: 'C', name: 'Cyber Kill Chain', acronym: '', definition: 'A framework developed by Lockheed Martin that describes the stages of a cyber attack: Reconnaissance, Weaponization, Delivery, Exploitation, Installation, Command & Control, and Actions on Objectives.', source: 'Threatpedia', roles: ['pentest-red'] },
            { letter: 'C', name: 'Cyber Kill Chain Analysis', acronym: '', definition: 'The process of mapping observed attacker activity to the phases of the Cyber Kill Chain framework to understand attack progression and identify defensive gaps.', source: 'Huntress', roles: ['threat-hunter','soc','threat-intel'] },
            { letter: 'C', name: 'Cyber Operations', acronym: '', definition: 'In the NICE Framework, cybersecurity work where a person: Performs activities to gather evidence on criminal or foreign intelligence entities in order to mitigate possible or real-time threats, protect against espionage or insider threats, foreign sabotage, international terrorist activities, or to support other intelligence activities.', source: 'NICCS/CISA', roles: ['network-infra'] },
            { letter: 'C', name: 'Cyber Operations Planning', acronym: '', definition: 'in the NICE Framework, cybersecurity work where a person: Performs in-depth joint targeting and cyber planning process. Gathers information and develops detailed Operational Plans and Orders supporting requirements. Conducts strategic and operational-level planning across the full range of operations for integrated information and cyberspace operations.', source: 'NICCS/CISA', roles: ['ciso','soc'] },
            { letter: 'C', name: 'Cyber Range', acronym: '', definition: 'A virtual environment used for cybersecurity training, testing, and exercises. Simulates real-world network conditions to practice defensive and offensive techniques safely.', source: 'SANS', roles: ['pentest-red','soc'] },
            { letter: 'C', name: 'Cyber Resilience', acronym: '', definition: 'An organization\'s ability to continuously deliver intended outcomes despite adverse cyber events. Combines cybersecurity, business continuity, and enterprise resilience.', source: 'Allot', roles: ['ciso','grc'] },
            { letter: 'C', name: 'Cyber Security', acronym: '', definition: 'The practice of protecting computer systems and networks from digital attacks. A subset of information security.', source: 'Threatpedia', roles: ['soc','threat-hunter'] },
            { letter: 'C', name: 'Cyber Threat', acronym: '', definition: 'Any potential malicious attack that seeks to unlawfully access data, disrupt digital operations, or damage information systems.', source: 'Allot', roles: ['ciso','soc'] },
            { letter: 'C', name: 'Cyber Threat Intelligence', acronym: 'CTI', definition: 'Evidence-based knowledge about existing or emerging threats to an organization\'s assets. Includes context, mechanisms, indicators, implications, and actionable advice.', source: 'SANS', roles: ['threat-intel','ciso','soc'] },
            { letter: 'C', name: 'cyber threat intelligence (CTI)', acronym: '', definition: 'The collecting, processing, organizing, and analyzing data into actionable information that relates to capabilities, opportunities, actions, and intent of adversaries in the cyber domain to meet a specific requirement determined by and informing decision-makers.', source: 'NICCS/CISA', roles: ['threat-intel'] },
            { letter: 'C', name: 'Cyber-biosecurity', acronym: '', definition: 'an emerging field that addresses the intersection of cybersecurity and biosecurity, focusing on protecting biological data, processes, and systems from cyber threats and malicious activities', source: 'NICCS/CISA', roles: ['soc','threat-hunter'] },
            { letter: 'C', name: 'Cyberattack', acronym: '', definition: 'a malicious and deliberate attempt to breach the information system', source: 'NICCS/CISA', roles: ['pentest-red'] },
            { letter: 'C', name: 'Cyberespionage', acronym: '', definition: 'or cyber spying, is a type of cyberattack in which an unauthorized user attempts to access sensitive or classified data or intellectual property (IP) for economic gain, competitive advantage or political reasons', source: 'NICCS/CISA', roles: ['soc','threat-hunter'] },
            { letter: 'C', name: 'Cyberforensic', acronym: '', definition: 'the process of collecting, analyzing, and preserving digital evidence to investigate cybercrimes and other incidents', source: 'NICCS/CISA', roles: ['ir-forensics'], related: 'Digital forensic, Computer forensic' },
            { letter: 'C', name: 'Cybersecuring', acronym: '', definition: 'the process of hardening technologies, processes, and controls to protect systems, networks, programs, devices and data from cyber attacks', source: 'NICCS/CISA', roles: ['soc','threat-hunter'] },
            { letter: 'C', name: 'Cybersecurity', acronym: '', definition: 'The activity or process, ability or capability, or state whereby information and communications systems and the information contained therein are protected from and/or defended against damage, unauthorized use or modification, or exploitation. Strategy, policy, and standards regarding the security of and operations in cyberspace, and encompass[ing] the full range of threat reduction, vulnerability reduction, deterrence, international engagement, incident response, resiliency, and recovery policies and activities, including computer network operations, information assurance, law enforcement, diplomacy, military, and intelligence missions as they relate to the security and stability of the global information and communications infrastructure.', source: 'NICCS/CISA', roles: ['ciso','ir-forensics','pentest-red','grc'] },
            { letter: 'C', name: 'Cybersecurity adjacent', acronym: '', definition: 'a number of roles that have cybersecurity responsibilities which typically form only part of their overall responsibilities within an organization.', source: 'NICCS/CISA', roles: ['ciso','soc'] },
            { letter: 'C', name: 'Cybersecurity-Aware', acronym: '', definition: 'knowing what security threats are and acting responsibly to avoid potential risks.', source: 'NICCS/CISA', roles: ['soc','threat-hunter'] },
            { letter: 'C', name: 'Cyberthreats', acronym: '', definition: 'refers to anything that has the potential to cause serious harm to a computer system A cyberthreat is something that may or may not happen, but has the potential to cause serious damage. Cyberthreats can lead to attacks on computer systems, networks and more.', source: 'NICCS/CISA', roles: ['soc','threat-hunter'] },
            { letter: 'C', name: 'Cyberwarfare', acronym: '', definition: 'typically defined as a set of actions by a nation or organization to attack countries or institutions\' computer network systems with the intention of disrupting, damaging, or destroying infrastructure by computer viruses or denial-of-service attacks', source: 'NICCS/CISA', roles: ['network-infra'] },
            { letter: 'C', name: 'CyberWarrior', acronym: '', definition: 'an individual who participates in cyberwarfare, motivated either by personal, patriotic, or religious reasons, but not due to professional requirement', source: 'NICCS/CISA', roles: ['ciso','soc'] },
            { letter: 'D', name: 'Dark Net', acronym: '', definition: 'An overlay network that requires specific software or authorization to access. Hosts hidden services used for both legitimate privacy needs and illicit activities.', source: 'SANS', roles: ['threat-intel'] },
            { letter: 'D', name: 'Dark Web', acronym: '', definition: 'A part of the internet that requires special software (like Tor) to access and is often associated with illegal activities, including trading stolen data and hacking tools.', source: 'Allot', roles: ['threat-intel','ciso'] },
            { letter: 'D', name: 'Data Administration', acronym: '', definition: 'In the NICE Framework, cybersecurity work where a person: Develops and administers databases and/or data management systems that allow for the storage, query, and utilization of data.', source: 'NICCS/CISA', roles: ['grc'] },
            { letter: 'D', name: 'Data Aggregation', acronym: '', definition: 'The process of gathering and combining data from different sources, so that the combined data reveals new information. The new information is more sensitive than the individual data elements themselves and the person who aggregates the data was not granted access to the totality of the information.', source: 'NICCS/CISA', roles: ['ciso','network-infra'], related: 'data mining' },
            { letter: 'D', name: 'Data at Rest', acronym: '', definition: 'Data stored on physical media such as hard drives, databases, or cloud storage. Requires encryption and access controls to protect against unauthorized access.', source: 'SANS', roles: ['grc','cloud-sec'] },
            { letter: 'D', name: 'Data at Rest Encryption', acronym: '', definition: 'Encryption applied to data stored on disk, in databases, or in cloud storage to protect it from unauthorized access if physical security is compromised.', source: 'SANS', roles: ['grc','cloud-sec'] },
            { letter: 'D', name: 'Data Backup', acronym: '', definition: 'The process of creating copies of data that can be restored in case of data loss, corruption, or ransomware attack. Critical for business continuity and disaster recovery.', source: 'Huntress', roles: ['ciso','grc'] },
            { letter: 'D', name: 'Data Breach', acronym: '', definition: 'The unauthorized movement or disclosure of sensitive information to a party, usually outside the organization, that is not authorized to have or see the information.', source: 'NICCS/CISA', roles: ['ciso','soc','grc','ir-forensics'], related: 'data loss, data theft, exfiltration' },
            { letter: 'D', name: 'Data Classification', acronym: '', definition: 'The process of organizing data into categories based on sensitivity and criticality. Enables appropriate security controls based on data value and regulatory requirements.', source: 'SANS', roles: ['grc','ciso'] },
            { letter: 'D', name: 'Data Custodian', acronym: '', definition: 'The individual or department responsible for implementing security controls and maintaining data on behalf of the data owner. Handles backups, restoration, and technical safeguards.', source: 'SANS', roles: ['grc','ciso'] },
            { letter: 'D', name: 'Data Diode', acronym: '', definition: 'A network appliance that allows data to travel in only one direction, physically preventing data exfiltration from protected networks while allowing information to flow in.', source: 'SANS', roles: ['network-infra'] },
            { letter: 'D', name: 'Data Encryption at Rest', acronym: '', definition: 'The process of encoding stored data so it cannot be read without the proper decryption key. Protects against data exposure from stolen devices or unauthorized storage access.', source: 'SANS', roles: ['grc','cloud-sec'] },
            { letter: 'D', name: 'Data Encryption Standard', acronym: 'DES', definition: 'A symmetric-key algorithm for encryption published by NIST. Now considered insecure for most applications and replaced by AES.', source: 'Allot', roles: ['network-infra'] },
            { letter: 'D', name: 'Data Exfiltration', acronym: '', definition: 'The unauthorized transfer of data from an organization\'s systems. Attackers may use encrypted channels, steganography, or covert protocols to avoid detection.', source: 'SANS', roles: ['soc','threat-hunter','ir-forensics'] },
            { letter: 'D', name: 'Data Governance', acronym: '', definition: 'The overall management of data availability, usability, integrity, and security in an organization. Establishes processes, roles, and policies for data handling.', source: 'SANS', roles: ['grc','ciso'] },
            { letter: 'D', name: 'Data in Transit', acronym: '', definition: 'Data actively moving from one location to another, such as across the internet or through a private network. Must be encrypted to prevent interception.', source: 'SANS', roles: ['network-infra','grc'] },
            { letter: 'D', name: 'Data Integrity', acronym: '', definition: 'The property that data is complete, intact, and trusted and has not been modified or destroyed in an unauthorized or accidental manner.', source: 'NICCS/CISA', roles: ['ciso','soc'], related: 'integrity, system integrity' },
            { letter: 'D', name: 'Data Lake Security', acronym: '', definition: 'Security controls and practices for protecting large repositories of raw data stored in their native format. Addresses access control, encryption, and data classification challenges.', source: 'SANS', roles: ['cloud-sec','grc'] },
            { letter: 'D', name: 'Data Loss', acronym: '', definition: 'The result of unintentionally or accidentally deleting data, forgetting where it is stored, or exposure to an unauthorized party.', source: 'NICCS/CISA', roles: ['ciso','soc'], related: 'data leakage, data theft' },
            { letter: 'D', name: 'Data Loss Prevention', acronym: 'DLP', definition: 'A security solution that detects and prevents unauthorized transmission or storage of sensitive data. Monitors data in motion, at rest, and in use.', source: 'Threatpedia', roles: ['soc'], related: 'data loss, data theft, data leak' },
            { letter: 'D', name: 'Data Masking', acronym: '', definition: 'The process of obscuring specific data within a database to protect it from unauthorized access while maintaining its usability for testing or development.', source: 'SANS', roles: ['appsec-devsecops','grc'] },
            { letter: 'D', name: 'Data Mining', acronym: '', definition: 'The process or techniques used to analyze large sets of existing information to discover previously unrevealed patterns or correlations.', source: 'NICCS/CISA', roles: ['ciso','soc'], related: 'data aggregation' },
            { letter: 'D', name: 'Data Owner', acronym: '', definition: 'The individual or entity with the authority and responsibility for specifying the security controls for data they manage and determining who has access.', source: 'SANS', roles: ['grc','ciso'] },
            { letter: 'D', name: 'Data Poisoning', acronym: '', definition: 'An adversarial attack that manipulates training data to compromise the integrity of a machine learning model. Can introduce backdoors, degrade model accuracy, or cause targeted misclassifications in AI-powered security tools.', source: 'NIST', roles: ['appsec-devsecops','threat-intel','threat-hunter'] },
            { letter: 'D', name: 'Data Protection', acronym: '', definition: 'The process of safeguarding data from loss, theft, and corruption through various security controls and best practices.', source: 'Threatpedia', roles: ['grc'] },
            { letter: 'D', name: 'Data Residency', acronym: '', definition: 'Requirements specifying that data must be stored and processed within a specific geographic location or jurisdiction, driven by regulatory compliance and sovereignty concerns.', source: 'SANS', roles: ['grc','cloud-sec'] },
            { letter: 'D', name: 'Data Security Posture Management', acronym: 'DSPM', definition: 'A security discipline that continuously discovers, classifies, and monitors sensitive data across cloud, hybrid, and multi-cloud environments, assessing data risk through analysis of access permissions, encryption status, configuration weaknesses, and exposure paths.', source: 'Threatpedia', roles: ['cloud-sec','grc','ciso'] },
            { letter: 'D', name: 'Data Sovereignty', acronym: '', definition: 'The concept that data is subject to the laws and governance of the country where it is collected or stored. Impacts cloud storage decisions and cross-border data transfers.', source: 'SANS', roles: ['grc','ciso'] },
            { letter: 'D', name: 'Data Theft', acronym: '', definition: 'The deliberate or intentional act of stealing of information.', source: 'NICCS/CISA', roles: ['ciso','soc'], related: 'data aggregation, data leakage, data loss' },
            { letter: 'D', name: 'Database Activity Monitoring', acronym: 'DAM', definition: 'A security technology that monitors and analyzes database activity to identify unauthorized or suspicious actions, independent of native database audit functions.', source: 'SANS', roles: ['soc','grc'] },
            { letter: 'D', name: 'DataOps', acronym: '', definition: 'a collaborative data management practice focused on improving the communication, integration and automation of data flows between data managers and data consumers across an organization', source: 'NICCS/CISA', roles: ['ciso','soc'] },
            { letter: 'D', name: 'DBaaS', acronym: 'Database as a service', definition: 'a cloud database offering that provides customers with access to a database without having to deploy and manage the underlying infrastructure', source: 'NICCS/CISA', roles: ['ciso','network-infra'] },
            { letter: 'D', name: 'DDoS', acronym: 'Distributed Denial-of-Service', definition: 'a cybercrime in which the attacker floods a target with internet traffic to prevent users from accessing connected online services and sites', source: 'NICCS/CISA', roles: ['soc','threat-hunter'] },
            { letter: 'D', name: 'DDoS Attack', acronym: 'DDoS', definition: 'Distributed Denial of Service attack that floods a target with traffic from multiple sources to overwhelm its capacity and make it unavailable. Common variants include volumetric attacks, protocol attacks, and application layer attacks.', source: 'Threatpedia', roles: ['pentest-red','network-infra'] },
            { letter: 'D', name: 'DDoS Mitigation', acronym: '', definition: 'The techniques and technologies used to resist or reduce the impact of distributed denial-of-service attacks, including traffic scrubbing, rate limiting, and content delivery networks.', source: 'SANS', roles: ['network-infra'] },
            { letter: 'D', name: 'De-Perimeterization', acronym: '', definition: 'an information security strategy to strengthens an organization\'s security posture by implementing multiple levels of protection, including inherently secure computer systems and protocols, high-level encryption, and authentication', source: 'NICCS/CISA', roles: ['ciso'] },
            { letter: 'D', name: 'Dead Drop', acronym: '', definition: 'In cybersecurity, a legitimate web service used by threat actors to exchange information covertly, such as storing C2 instructions in public blogs, paste sites, or cloud storage.', source: 'SANS', roles: ['threat-intel','threat-hunter'] },
            { letter: 'D', name: 'Deauthentication', acronym: '', definition: 'To revoke the authentication of; to cause no longer to be authenticated. A deauthentication attack is a type of Denial of Service (DoS) attack and refers to an unauthorized disruption of the connection between a wireless device and its access point.', source: 'NICCS/CISA', roles: ['soc','threat-hunter'] },
            { letter: 'D', name: 'Deauthentication Attack', acronym: '', definition: 'A type of denial-of-service attack targeting wireless networks by sending forged deauthentication frames, forcing devices to disconnect from the access point.', source: 'SANS', roles: ['pentest-red','network-infra'] },
            { letter: 'D', name: 'Deception Technology', acronym: '', definition: 'Security tools that deploy decoy systems, credentials, and data to detect and deflect attackers. Includes honeypots, honeytokens, and decoy networks.', source: 'SANS', roles: ['threat-hunter','soc'] },
            { letter: 'D', name: 'Decipher', acronym: '', definition: 'To convert enciphered text to plain text by means of a cryptographic system.', source: 'NICCS/CISA', roles: ['network-infra','appsec-devsecops'], synonyms: 'decode, decrypt' },
            { letter: 'D', name: 'Decode', acronym: '', definition: 'To convert encoded text to plain text by means of a code.', source: 'NICCS/CISA', roles: ['ciso','soc'], synonyms: 'decipher, decrypt' },
            { letter: 'D', name: 'Decrypt', acronym: '', definition: 'A generic term encompassing decode and decipher.', source: 'NICCS/CISA', roles: ['ciso','soc'], synonyms: 'decipher, decode' },
            { letter: 'D', name: 'Decryption', acronym: '', definition: 'The process of converting encrypted ciphertext back to plaintext using a decryption key. Only possible with the correct key.', source: 'Threatpedia', roles: ['network-infra','appsec-devsecops'], synonyms: 'decode, decrypt, decipher' },
            { letter: 'D', name: 'Decryptor', acronym: '', definition: 'A tool, or set of tools, used to decrypt encrypted files. Either for recovery or anti-ransomware purposes.', source: 'NICCS/CISA', roles: ['network-infra','appsec-devsecops'] },
            { letter: 'D', name: 'Deep Packet Inspection', acronym: 'DPI', definition: 'A form of network packet filtering that examines the data payload of packets as they pass through a checkpoint, enabling detailed traffic analysis and threat detection.', source: 'SANS', roles: ['network-infra','soc'] },
            { letter: 'D', name: 'Deepfake', acronym: '', definition: 'Synthetic media created using deep learning techniques to create realistic but fake video or audio. Used for social engineering and misinformation.', source: 'Threatpedia', roles: ['ciso','soc'] },
            { letter: 'D', name: 'Defense in Depth', acronym: '', definition: 'A security strategy that employs multiple layers of defensive measures to protect critical information and systems. If one layer is compromised, additional layers remain in place to prevent complete system failure or data breach.', source: 'Threatpedia', roles: ['ciso','soc'] },
            { letter: 'D', name: 'Demilitarized Zone', acronym: 'DMZ', definition: 'A physical or logical network segment that contains external-facing services while protecting internal networks. Also called a screened subnet.', source: 'Threatpedia', roles: ['ciso','soc'] },
            { letter: 'D', name: 'Demilitarized Zone Network', acronym: 'DMZ', definition: 'A perimeter network segment that separates an organization\'s internal network from untrusted external networks. Contains public-facing services while protecting internal resources.', source: 'SANS', roles: ['network-infra'] },
            { letter: 'D', name: 'Denial Of Service', acronym: '', definition: 'An attack that prevents or impairs the authorized use of information system resources or services.', source: 'NICCS/CISA', roles: ['soc','threat-hunter'] },
            { letter: 'D', name: 'Dependency Confusion', acronym: '', definition: 'A supply chain attack that exploits how package managers resolve dependencies, tricking build systems into downloading malicious packages from public repositories instead of private ones.', source: 'SANS', roles: ['appsec-devsecops'] },
            { letter: 'D', name: 'Dependency Management', acronym: '', definition: 'The process of tracking, updating, and managing third-party libraries and dependencies used in software projects. Critical for managing supply chain risk.', source: 'Threatpedia', roles: ['appsec-devsecops'] },
            { letter: 'D', name: 'Detection Engineering', acronym: '', definition: 'The practice of designing, building, and maintaining detection logic and rules to identify threats. Combines threat intelligence with security monitoring expertise.', source: 'Huntress', roles: ['soc','threat-hunter'] },
            { letter: 'D', name: 'Device Code Phishing', acronym: '', definition: 'A phishing technique that abuses the OAuth 2.0 Device Authorization Grant flow (RFC 8628) to intercept authentication tokens, routing victims through legitimate MFA challenges while attackers capture the resulting session tokens.', source: 'Threatpedia', roles: ['threat-intel','soc','pentest-red'] },
            { letter: 'D', name: 'DevOps', acronym: '', definition: 'the combination of cultural philosophies, practices, and tools that increases an organization\'s ability to deliver applications and services', source: 'NICCS/CISA', roles: ['ciso','soc'] },
            { letter: 'D', name: 'DevOps Security', acronym: '', definition: 'The integration of security practices into the DevOps methodology, ensuring that security is considered at every stage of the software development and deployment lifecycle.', source: 'SANS', roles: ['appsec-devsecops'] },
            { letter: 'D', name: 'DevSecOps', acronym: 'development, security, and operations', definition: 'an approach to culture, automation, and platform design that integrates security as a shared responsibility throughout the entire IT lifecycle', source: 'NICCS/CISA', roles: ['appsec-devsecops'] },
            { letter: 'D', name: 'DevSecOps as a Service', acronym: 'DaaS', definition: 'A cloud-delivered model that provides integrated security tooling, automated code scanning, vulnerability management, and compliance checks as a managed service within CI/CD pipelines. Reduces the barrier to adopting security-first development practices.', source: 'Threatpedia', roles: ['appsec-devsecops','ciso'] },
            { letter: 'D', name: 'Diamond Model', acronym: '', definition: 'A threat analysis framework that examines adversary, capability, infrastructure, and victim in relation to each other. Helps identify patterns and attributes of cyber attacks.', source: 'Threatpedia', roles: ['cloud-sec'] },
            { letter: 'D', name: 'Dictionary Attack', acronym: '', definition: 'A password cracking technique that systematically enters every word in a dictionary as a password. More efficient than brute force when users choose common words.', source: 'SANS', roles: ['pentest-red'] },
            { letter: 'D', name: 'Diffie-Hellman', acronym: 'DH', definition: 'A cryptographic algorithm for secure key exchange over insecure channels. Allows two parties to establish a shared secret for encryption.', source: 'Threatpedia', roles: ['network-infra','appsec-devsecops'] },
            { letter: 'D', name: 'Digital Certificate', acronym: '', definition: 'An electronic document that uses a digital signature to bind a public key with an identity. Issued by a Certificate Authority and used for secure communications.', source: 'SANS', roles: ['network-infra','appsec-devsecops'] },
            { letter: 'D', name: 'Digital Forensics', acronym: '', definition: 'The processes and specialized techniques for gathering, retaining, and analyzing system-related data (digital evidence) for investigative purposes. In the NICE Framework, cybersecurity work where a person: Collects, processes, preserves, analyzes, and presents computer-related evidence in support of network vulnerability, mitigation, and/or criminal, fraud, counterintelligence or law enforcement investigations.', source: 'NICCS/CISA', roles: ['ir-forensics','network-infra'], synonyms: 'computer forensics, forensics' },
            { letter: 'D', name: 'Digital Forensics and Incident Response', acronym: 'DFIR', definition: 'A discipline combining digital forensics investigation with incident response procedures to detect, investigate, and remediate cyber attacks.', source: 'Threatpedia', roles: ['soc','ir-forensics'] },
            { letter: 'D', name: 'Digital Rights Management', acronym: '', definition: 'A form of access control technology to protect and manage use of digital content or devices in accordance with the content or device provider\'s intentions.', source: 'NICCS/CISA', roles: ['ciso','network-infra'] },
            { letter: 'D', name: 'Digital Signature', acronym: '', definition: 'A cryptographic technique that verifies the authenticity and integrity of a message or document. Uses asymmetric encryption to prove the signer\'s identity.', source: 'Threatpedia', roles: ['network-infra'], related: 'electronic signature' },
            { letter: 'D', name: 'Digital Twin', acronym: '', definition: 'A virtual replica of a physical system used for simulation and analysis. In security, used to model and test attacks on critical infrastructure without risking real systems.', source: 'SANS', roles: ['network-infra','ciso'] },
            { letter: 'D', name: 'Directory Traversal', acronym: '', definition: 'A web vulnerability that allows attackers to access files outside the intended directory by manipulating file path references. Also known as path traversal or dot-dot-slash attack.', source: 'SANS', roles: ['pentest-red','appsec-devsecops'] },
            { letter: 'D', name: 'Disaster Recovery', acronym: 'DR', definition: 'A set of policies and procedures for recovering from a major failure or disaster. Includes RTO (Recovery Time Objective) and RPO (Recovery Point Objective).', source: 'Threatpedia', roles: ['ciso','ir-forensics','appsec-devsecops'] },
            { letter: 'D', name: 'Disaster Recovery Plan', acronym: 'DRP', definition: 'A documented set of procedures to recover and protect IT infrastructure in the event of a disaster. Includes RPO and RTO definitions for critical systems.', source: 'SANS', roles: ['ciso','grc'] },
            { letter: 'D', name: 'Disinformationists', acronym: '', definition: 'One who propagates disinformation', source: 'NICCS/CISA', roles: ['grc'] },
            { letter: 'D', name: 'Disk Encryption', acronym: '', definition: 'Full disk encryption technology that encrypts every bit of data on a disk drive. Protects data at rest from unauthorized access if the physical device is lost or stolen.', source: 'SANS', roles: ['grc','network-infra'] },
            { letter: 'D', name: 'Disk Forensics', acronym: '', definition: 'Forensic analysis of storage devices to recover deleted files, unallocated space data, and evidence of system activity.', source: 'Threatpedia', roles: ['ir-forensics'] },
            { letter: 'D', name: 'Disruption', acronym: '', definition: 'An event which causes unplanned interruption in operations or functions for an unacceptable length of time.', source: 'NICCS/CISA', roles: ['ciso','soc'] },
            { letter: 'D', name: 'Disruptionware', acronym: '', definition: 'a category of malware designed to suspend operations within a target through the compromise of the availability, integrity, and confidentiality of the systems, networks, and data', source: 'NICCS/CISA', roles: ['soc','threat-hunter'], related: 'Threatware' },
            { letter: 'D', name: 'Distributed Denial Of Service', acronym: '', definition: 'A denial of service technique that uses numerous systems to perform the attack simultaneously.', source: 'NICCS/CISA', roles: ['soc','threat-hunter'], related: 'denial of service, botnet' },
            { letter: 'D', name: 'Distros', acronym: '', definition: 'A Linux distribution is an operating system made from a software collection that includes the Linux kernel and often a package management system.', source: 'NICCS/CISA', roles: ['ciso','soc'], related: 'Distro' },
            { letter: 'D', name: 'DKIM', acronym: 'DomainKeys Identified Mail', definition: 'An email authentication method that uses digital signatures to verify that an email was sent from an authorized server and has not been modified in transit.', source: 'SANS', roles: ['network-infra'] },
            { letter: 'D', name: 'DLL Sideloading', acronym: '', definition: 'An attack technique where adversaries place a malicious DLL alongside a legitimate executable that loads it due to the Windows DLL search order, allowing code execution in the context of a trusted application to evade security controls.', source: 'Threatpedia', roles: ['ir-forensics','threat-hunter','pentest-red'], related: 'DLL hijacking, DLL injection' },
            { letter: 'D', name: 'DMARC', acronym: 'Domain-based Message Authentication Reporting and Conformance', definition: 'An email authentication protocol that builds on SPF and DKIM to protect email domains from unauthorized use, including phishing and email spoofing.', source: 'SANS', roles: ['network-infra','soc'] },
            { letter: 'D', name: 'DNS Cache Poisoning', acronym: '', definition: 'An attack that corrupts a DNS resolver\'s cache, causing it to return incorrect IP addresses and redirecting users to malicious websites without their knowledge.', source: 'SANS', roles: ['network-infra','pentest-red'] },
            { letter: 'D', name: 'DNS Exfiltration', acronym: '', definition: 'A technique where attackers encode stolen data in DNS queries to bypass traditional security controls. Hard to detect because DNS traffic is typically allowed through firewalls.', source: 'SANS', roles: ['threat-hunter','soc'] },
            { letter: 'D', name: 'DNS Over HTTPS', acronym: 'DoH', definition: 'A protocol that encrypts DNS queries using HTTPS to prevent eavesdropping and manipulation of DNS data. Enhances privacy but can complicate network security monitoring.', source: 'SANS', roles: ['network-infra'] },
            { letter: 'D', name: 'DNS Sinkhole', acronym: '', definition: 'A DNS server configured to supply false information to prevent the use of domain names associated with malicious activity. Used to redirect malware C2 traffic.', source: 'SANS', roles: ['soc','network-infra'] },
            { letter: 'D', name: 'DNS Spoofing', acronym: '', definition: 'An attack that corrupts DNS cache or responses to redirect users to attacker-controlled IP addresses. Used in phishing and credential harvesting attacks.', source: 'Threatpedia', roles: ['network-infra'] },
            { letter: 'D', name: 'DNS Tunneling', acronym: '', definition: 'A technique that encodes data within DNS queries and responses to bypass network security controls. Used by malware for command and control communication.', source: 'SANS', roles: ['threat-hunter','network-infra','soc'] },
            { letter: 'D', name: 'DNSSEC', acronym: 'Domain Name System Security Extensions', definition: 'A suite of extensions to DNS that adds authentication to DNS responses, protecting against DNS spoofing and cache poisoning attacks.', source: 'SANS', roles: ['network-infra'] },
            { letter: 'D', name: 'DNSTwist', acronym: '', definition: 'generates a list of similarly looking domain names for a given domain name and performs DNS queries for them (A, AAAA, NS and MX) which can be used to intercept misdirected traffic.', source: 'NICCS/CISA', roles: ['network-infra'] },
            { letter: 'D', name: 'Domain Controller', acronym: 'DC', definition: 'A server that responds to authentication requests and verifies users on a Windows domain network. Stores user account information and enforces security policies.', source: 'SANS', roles: ['network-infra','pentest-red'] },
            { letter: 'D', name: 'Domain Fronting', acronym: '', definition: 'A technique that uses different domain names at different layers of communication to hide the true destination of a connection. Used by both privacy tools and malware.', source: 'SANS', roles: ['threat-intel','threat-hunter'] },
            { letter: 'D', name: 'Domain Generation Algorithm', acronym: 'DGA', definition: 'An algorithm used by malware to periodically generate a large number of domain names for use as command and control rendezvous points. Makes blocking C2 infrastructure difficult.', source: 'SANS', roles: ['threat-intel','threat-hunter','soc'] },
            { letter: 'D', name: 'Domain Name System', acronym: 'DNS', definition: 'The system that translates human-readable domain names into IP addresses. A critical internet infrastructure component that is frequently targeted by attackers.', source: 'Allot', roles: ['network-infra'] },
            { letter: 'D', name: 'Dorking', acronym: '', definition: 'Using search techniques to hack into vulnerable sites or search for information that is not available in public search results.', source: 'NICCS/CISA', roles: ['ciso','soc'] },
            { letter: 'D', name: 'Double Extortion', acronym: '', definition: 'A ransomware tactic where attackers both encrypt data and exfiltrate it, threatening to publish stolen data if the ransom is not paid.', source: 'Huntress', roles: ['threat-intel','ir-forensics','ciso'] },
            { letter: 'D', name: 'Downgrade Attack', acronym: '', definition: 'An attack that forces a system to use a less secure version of a protocol or weaker cipher suite, making it easier for the attacker to exploit known vulnerabilities.', source: 'SANS', roles: ['pentest-red','network-infra'] },
            { letter: 'D', name: 'Downtime', acronym: '', definition: 'The period during which a system, network, or service is unavailable. Can result from attacks, failures, or maintenance. Measured as part of SLA compliance.', source: 'Allot', roles: ['ciso'] },
            { letter: 'D', name: 'Dox', acronym: '', definition: 'the act of publicly providing personally identifiable information about an individual or organization, usually via the Internet and without their consent The aggregation and provision of previously published material is generally legal, though it may be subject to laws concerning stalking and intimidation.[4] Doxing may be carried out for reasons such as online shaming, extortion, and vigilante aid to law enforcement', source: 'NICCS/CISA', roles: ['ciso','soc'], related: 'Doxxing' },
            { letter: 'D', name: 'Doxxing', acronym: '', definition: 'Doxxing can be illegal, but its legality depends on the specific circumstances, such as the intent behind it and the jurisdiction. While doxxing itself isn\'t always explicitly illegal everywhere, it often falls under existing laws like those against harassment, stalking, and incitement to violence, and new anti-doxxing laws are being enacted in various places. The act is often considered a crime when it involves sharing personal information with the intent to cause harm, threats, or incite illegal actions.', source: 'NICCS/CISA', roles: ['soc','threat-hunter'], related: 'Dox' },
            { letter: 'D', name: 'DPIA', acronym: '', definition: 'A Data Protection Impact Assessment (DPIA) describes a process designed to identify risks arising out of the processing of personal data and to minimize these risks as far and as early as possible DPIAs are important tools for negating risk, and for demonstrating compliance with the GDPR.', source: 'NICCS/CISA', roles: ['grc'] },
            { letter: 'D', name: 'Drive-by Download', acronym: '', definition: 'An attack where malware is automatically downloaded and installed on a user\'s system when visiting a compromised website, often without user interaction or knowledge.', source: 'Threatpedia', roles: ['soc','threat-hunter'] },
            { letter: 'D', name: 'Dropper', acronym: '', definition: 'Malware designed to download and install other malware payloads on compromised systems. Often used as the initial infection vector.', source: 'Threatpedia', roles: ['soc','threat-hunter'] },
            { letter: 'D', name: 'Dual-Homed Host', acronym: '', definition: 'A computer with two network interfaces connected to different networks. Can serve as a simple firewall if IP forwarding is disabled.', source: 'SANS', roles: ['network-infra'] },
            { letter: 'D', name: 'Durable Nonce Attack', acronym: '', definition: 'An attack exploiting blockchain durable nonce features to pre-sign transactions that remain valid indefinitely, enabling adversaries to bypass time-based security controls in multisig governance schemes.', source: 'Threatpedia', roles: ['threat-intel','appsec-devsecops'] },
            { letter: 'D', name: 'Dwell Time', acronym: '', definition: 'The time between initial compromise and detection of an intrusion. A key metric for measuring security program effectiveness — shorter dwell times indicate better detection.', source: 'SANS', roles: ['soc','ciso','ir-forensics'] },
            { letter: 'D', name: 'Dynamic Analysis', acronym: '', definition: 'A method of analyzing software by executing programs in real-time to identify vulnerabilities, malicious behavior, or runtime errors. Includes fuzzing and behavioral analysis.', source: 'SANS', roles: ['appsec-devsecops','ir-forensics'] },
            { letter: 'D', name: 'Dynamic Application Security Testing', acronym: 'DAST', definition: 'An automated security testing approach that executes an application and analyzes its behavior to identify vulnerabilities. Tests running applications.', source: 'Threatpedia', roles: ['appsec-devsecops'] },
            { letter: 'D', name: 'Dynamic Attack Surface', acronym: '', definition: 'The automated, on-the-fly changes of an information system\'s characteristics to thwart actions of an adversary.', source: 'NICCS/CISA', roles: ['pentest-red'] },
            { letter: 'E', name: 'East-West Traffic', acronym: '', definition: 'Network traffic that flows laterally between servers or applications within a data center, as opposed to north-south traffic entering or leaving the network. Critical for microsegmentation.', source: 'SANS', roles: ['network-infra','cloud-sec'] },
            { letter: 'E', name: 'eCrime', acronym: '', definition: 'criminal activity that involves the use of computers or networks such as the internet', source: 'NICCS/CISA', roles: ['ciso','soc'] },
            { letter: 'E', name: 'Education And Training', acronym: '', definition: 'In the NICE Framework, cybersecurity work where a person: Conducts training of personnel within pertinent subject domain; develop, plan, coordinate, deliver, and/or evaluate training courses, methods, and techniques as appropriate.', source: 'NICCS/CISA', roles: ['ciso','soc'] },
            { letter: 'E', name: 'Egress Filtering', acronym: '', definition: 'The practice of monitoring and controlling outbound network traffic to prevent data exfiltration, malware communication, and unauthorized connections.', source: 'SANS', roles: ['network-infra','soc'] },
            { letter: 'E', name: 'Elastic Security', acronym: '', definition: 'A security solution built on the Elastic Stack that provides SIEM, endpoint security, and cloud security capabilities with unified visibility across the enterprise.', source: 'SANS', roles: ['soc'] },
            { letter: 'E', name: 'Electronic Signature', acronym: '', definition: 'Any mark in electronic form associated with an electronic document, applied with the intent to sign the document.', source: 'NICCS/CISA', roles: ['network-infra'], related: 'digital signature' },
            { letter: 'E', name: 'Elliptic Curve Cryptography', acronym: 'ECC', definition: 'An asymmetric encryption method based on elliptic curves that provides equivalent security to RSA with smaller key sizes. More efficient for mobile and embedded devices.', source: 'Threatpedia', roles: ['network-infra','appsec-devsecops'] },
            { letter: 'E', name: 'Email Authentication', acronym: '', definition: 'Techniques to verify the legitimacy of email senders, including SPF, DKIM, and DMARC. Prevents email spoofing and phishing.', source: 'SANS', roles: ['network-infra','soc'] },
            { letter: 'E', name: 'Email Bombing', acronym: '', definition: 'A denial-of-service attack that floods a target email address with a massive volume of messages, making the mailbox unusable and potentially crashing the mail server.', source: 'Allot', roles: ['soc','network-infra'] },
            { letter: 'E', name: 'Email Gateway', acronym: '', definition: 'A server or service that filters incoming and outgoing email for spam, malware, phishing attempts, and policy violations before delivery to the recipient.', source: 'SANS', roles: ['network-infra','soc'] },
            { letter: 'E', name: 'Email Security', acronym: '', definition: 'Technologies and practices for protecting email accounts and communications from unauthorized access, phishing, malware, and data loss.', source: 'Allot', roles: ['network-infra','soc'] },
            { letter: 'E', name: 'Embedded System Security', acronym: '', definition: 'Security considerations specific to embedded computing devices such as IoT devices, medical equipment, and industrial controllers. Addresses firmware, update mechanisms, and physical access.', source: 'SANS', roles: ['network-infra','appsec-devsecops'] },
            { letter: 'E', name: 'Encipher', acronym: '', definition: 'To convert plaintext to ciphertext by means of a cryptographic system.', source: 'NICCS/CISA', roles: ['network-infra','appsec-devsecops'], synonyms: 'encode, encrypt' },
            { letter: 'E', name: 'Enclave', acronym: '', definition: 'A protected network segment with defined boundaries and security policies. Contains systems with similar security requirements and trust levels.', source: 'SANS', roles: ['network-infra','cloud-sec'] },
            { letter: 'E', name: 'Encode', acronym: '', definition: 'To convert plaintext to ciphertext by means of a code.', source: 'NICCS/CISA', roles: ['ciso','soc'], synonyms: 'encipher, encrypt' },
            { letter: 'E', name: 'Encrypt', acronym: '', definition: 'The generic term encompassing encipher and encode.', source: 'NICCS/CISA', roles: ['network-infra','appsec-devsecops'], synonyms: 'encipher, encode' },
            { letter: 'E', name: 'Encryption', acronym: '', definition: 'The process of converting plaintext into ciphertext using cryptographic algorithms. Makes data unreadable to unauthorized parties.', source: 'Threatpedia', roles: ['network-infra','appsec-devsecops'], synonyms: 'encode, encrypt, encipher' },
            { letter: 'E', name: 'Encryption Key', acronym: '', definition: 'A piece of information used to encrypt or decrypt data through a cryptographic algorithm. Key security is paramount — compromised keys render encryption useless.', source: 'SANS', roles: ['network-infra'] },
            { letter: 'E', name: 'End-to-End Encryption', acronym: 'E2E', definition: 'An encryption method where only the sender and recipient can read messages, with encryption occurring at the endpoints rather than on intermediate servers.', source: 'Threatpedia', roles: ['network-infra','appsec-devsecops'] },
            { letter: 'E', name: 'Endpoint', acronym: '', definition: 'Any device that connects to a network, including computers, mobile devices, servers, and IoT devices. Endpoints are primary targets for attacks.', source: 'Huntress', roles: ['soc','network-infra'] },
            { letter: 'E', name: 'Endpoint Detection and Response', acronym: 'EDR', definition: 'A security tool that monitors endpoints for suspicious activity and enables rapid response to detected threats. Focuses on detecting and remediating attacks at the endpoint level.', source: 'Threatpedia', roles: ['soc'] },
            { letter: 'E', name: 'Endpoint Hardening', acronym: '', definition: 'The process of securing endpoints by reducing attack surface, disabling unnecessary services, enforcing security configurations, and implementing protective controls.', source: 'SANS', roles: ['soc','network-infra'] },
            { letter: 'E', name: 'Endpoint Protection Platform', acronym: 'EPP', definition: 'An integrated security solution deployed on endpoint devices to prevent file-based malware, detect malicious activity, and provide investigation and remediation capabilities.', source: 'SANS', roles: ['soc'] },
            { letter: 'E', name: 'ENISA', acronym: 'The European Union Agency for Cybersecurity', definition: 'Established in 2004 and strengthened by the EU Cybersecurity Act, the European Union Agency for Cybersecurity contributes to EU cyber policy, enhances the trustworthiness of ICT products, services and processes with cybersecurity certification schemes, cooperates with Member States and EU bodies, and helps Europe prepare for the cyber challenges of tomorrow.', source: 'NICCS/CISA', roles: ['ciso','soc'] },
            { letter: 'E', name: 'Enterprise Mobility Management', acronym: 'EMM', definition: 'A comprehensive approach to securing and managing mobile devices, applications, and content used in enterprise environments. Includes MDM, MAM, and MIM capabilities.', source: 'SANS', roles: ['ciso'] },
            { letter: 'E', name: 'Enterprise Risk Management', acronym: '', definition: 'A comprehensive approach to risk management that engages people, processes, and systems across an organization to improve the quality of decision making for managing risks that may hinder an organization’s ability to achieve its objectives. Involves identifying mission dependencies on enterprise capabilities, identifying and prioritizing risks due to defined threats, implementing countermeasures to provide both a static risk posture and an effective dynamic response to active threats; and assessing enterprise performance against threats and adjusts countermeasures as necessary.', source: 'NICCS/CISA', roles: ['ciso'], related: 'risk management, integrated risk management, risk' },
            { letter: 'E', name: 'Enumeration', acronym: '', definition: 'The process of extracting information about users, shares, services, and configurations from a target system during the reconnaissance phase of an attack.', source: 'SANS', roles: ['pentest-red','threat-hunter'] },
            { letter: 'E', name: 'EoL', acronym: 'End of Life', definition: 'that the app has reached the end of its useful life. It may mean that a new version is available that supersedes the existing product or that the product is no longer supported.', source: 'NICCS/CISA', roles: ['ciso','soc'] },
            { letter: 'E', name: 'Eradication', acronym: '', definition: 'An incident response phase focused on removing the threat from the environment. Includes removing malware, closing vulnerabilities, and resetting compromised credentials.', source: 'SANS', roles: ['ir-forensics','soc'] },
            { letter: 'E', name: 'Escalation of Privilege', acronym: '', definition: 'When an attacker gains higher access rights than authorized, either through vertical escalation (admin access) or horizontal escalation (accessing another user\'s resources).', source: 'SANS', roles: ['pentest-red','soc'] },
            { letter: 'E', name: 'Ethical Hacking', acronym: '', definition: 'Authorized testing of computer systems and networks to identify security vulnerabilities before malicious actors can exploit them. Also known as white hat hacking.', source: 'SANS', roles: ['pentest-red'] },
            { letter: 'E', name: 'Event', acronym: '', definition: 'An observable occurrence in an information system or network. Sometimes provides an indication that an incident is occurring or at least raise the suspicion that an incident may be occurring.', source: 'NICCS/CISA', roles: ['soc'], related: 'incident' },
            { letter: 'E', name: 'Event Correlation', acronym: '', definition: 'The process of analyzing and connecting multiple security events from different sources to identify patterns that indicate a security incident or attack.', source: 'SANS', roles: ['soc'] },
            { letter: 'E', name: 'Evidence Collection', acronym: '', definition: 'The process of gathering and preserving digital artifacts and logs as evidence during incident investigation. Must maintain chain of custody.', source: 'Threatpedia', roles: ['soc','ir-forensics'] },
            { letter: 'E', name: 'Evil Twin', acronym: '', definition: 'A rogue wireless access point that mimics a legitimate network to trick users into connecting. Used to eavesdrop on network traffic or distribute malware.', source: 'Threatpedia', roles: ['network-infra'] },
            { letter: 'E', name: 'Excessive Agency', acronym: '', definition: 'A vulnerability in LLM-powered applications where an AI agent is granted more permissions, autonomy, or capabilities than necessary for its intended function, potentially allowing unintended or harmful actions. Ranked in the OWASP Top 10 for LLM Applications.', source: 'OWASP', roles: ['appsec-devsecops','threat-intel'] },
            { letter: 'E', name: 'Exfiltration', acronym: '', definition: 'The unauthorized transfer of information from an information system.', source: 'NICCS/CISA', roles: ['ciso','soc'], related: 'data breach' },
            { letter: 'E', name: 'Exploit', acronym: '', definition: 'A piece of code or technique used to take advantage of a vulnerability and compromise a system. Can be weaponized for attacks or used in security testing.', source: 'Threatpedia', roles: ['pentest-red'] },
            { letter: 'E', name: 'Exploit Kit', acronym: '', definition: 'A toolkit that automates the exploitation of client-side vulnerabilities, typically targeting web browsers and plugins. Hosted on compromised websites to deliver malware.', source: 'SANS', roles: ['soc','threat-intel'] },
            { letter: 'E', name: 'Exploitation Analysis', acronym: '', definition: 'In the NICE Framework, cybersecurity work where a person: Analyzes collected information to identify vulnerabilities and potential for exploitation.', source: 'NICCS/CISA', roles: ['pentest-red'] },
            { letter: 'E', name: 'Exposure', acronym: '', definition: 'A condition or instance where a system is susceptible to loss or damage. Similar to vulnerability but emphasizes the current state.', source: 'Threatpedia', roles: ['soc','threat-hunter'] },
            { letter: 'E', name: 'Exposure Management', acronym: '', definition: 'A continuous process of identifying, prioritizing, and remediating security exposures across an organization\'s attack surface.', source: 'Huntress', roles: ['ciso','pentest-red','grc'] },
            { letter: 'E', name: 'Extended Detection and Response', acronym: 'XDR', definition: 'An advanced security platform that integrates EDR with network, cloud, and application data to provide comprehensive threat detection and response across the entire attack surface.', source: 'Threatpedia', roles: ['soc'] },
            { letter: 'E', name: 'External Attack Surface Management', acronym: 'EASM', definition: 'The continuous discovery, monitoring, and management of an organization\'s internet-facing assets to identify vulnerabilities and reduce exposure to external threats.', source: 'SANS', roles: ['ciso','soc'] },
            { letter: 'F', name: 'FaaS', acronym: 'Function as a Service', definition: 'a cloud-computing service that allows customers to execute code in response to events, without managing the complex infrastructure', source: 'NICCS/CISA', roles: ['ciso','soc'] },
            { letter: 'F', name: 'Fail-Safe', acronym: '', definition: 'A design principle where system defaults to a secure state in the event of failure. For access control, a fail-safe system denies access when it cannot determine authorization.', source: 'SANS', roles: ['ciso','network-infra'] },
            { letter: 'F', name: 'Failover', acronym: '', definition: 'The automatic switching to a redundant system, server, or network upon failure of the currently active system. Critical for maintaining availability of security services.', source: 'SANS', roles: ['network-infra','ciso'] },
            { letter: 'F', name: 'Failure', acronym: '', definition: 'The inability of a system or component to perform its required functions within specified performance requirements.', source: 'NICCS/CISA', roles: ['ciso','soc'] },
            { letter: 'F', name: 'False Negative', acronym: '', definition: 'A failure to detect an actual security threat. More dangerous than false positives as real attacks go unnoticed and uninvestigated.', source: 'SANS', roles: ['soc','threat-hunter'] },
            { letter: 'F', name: 'False Positive', acronym: '', definition: 'A security alert that incorrectly indicates a threat when none exists. High false positive rates reduce analyst efficiency and can lead to alert fatigue.', source: 'SANS', roles: ['soc','threat-hunter'] },
            { letter: 'F', name: 'Federated Identity', acronym: '', definition: 'A system of trust between multiple organizations that allows users to use the same credentials to access resources across organizational boundaries.', source: 'SANS', roles: ['ciso','cloud-sec'] },
            { letter: 'F', name: 'FedRAMP', acronym: 'Federal Risk and Authorization Management Program', definition: 'A U.S. government program that provides a standardized approach to cloud service assessment, authorization, and continuous monitoring.', source: 'Threatpedia', roles: ['soc','grc'] },
            { letter: 'F', name: 'FedRAMP-compliant', acronym: 'Federal Risk and Authorization Management Program', definition: 'a government-wide program that provides a standardized approach to security assessment, authorization, and continuous monitoring for cloud products and services', source: 'NICCS/CISA', roles: ['soc','grc'] },
            { letter: 'F', name: 'File Integrity Monitoring', acronym: 'FIM', definition: 'A security control that monitors and detects changes to critical system files, configurations, and content. Alerts on unauthorized modifications.', source: 'SANS', roles: ['soc','grc','ir-forensics'] },
            { letter: 'F', name: 'File Transfer Protocol', acronym: 'FTP', definition: 'A standard network protocol used for transferring files between a client and server. Transmits data in plaintext, making it vulnerable to interception. SFTP and FTPS are secure alternatives.', source: 'Allot', roles: ['network-infra'] },
            { letter: 'F', name: 'Fileless Attack', acronym: '', definition: 'An attack that operates entirely in memory without writing malicious files to disk. Leverages legitimate system tools and processes to evade traditional detection.', source: 'Huntress', roles: ['threat-hunter','ir-forensics','soc'] },
            { letter: 'F', name: 'Fileless Malware', acronym: '', definition: 'Malware that operates in system memory without writing files to disk, evading traditional file-based detection methods. Often leverages legitimate tools like PowerShell or WMI.', source: 'Threatpedia', roles: ['ir-forensics'] },
            { letter: 'F', name: 'Firewall', acronym: '', definition: 'A network security device that monitors and controls incoming and outgoing network traffic based on predetermined security rules. Can be hardware or software-based.', source: 'Threatpedia', roles: ['network-infra'] },
            { letter: 'F', name: 'Firmware', acronym: '', definition: 'Low-level software embedded in hardware devices that controls device functions. Firmware vulnerabilities can be particularly dangerous as they persist across OS reinstalls.', source: 'SANS', roles: ['network-infra','pentest-red'] },
            { letter: 'F', name: 'Footprinting', acronym: '', definition: 'an ethical hacking technique used to gather as much data as possible about a specific targeted computer system, an infrastructure and networks to identify opportunities to penetrate them', source: 'NICCS/CISA', roles: ['network-infra','pentest-red','threat-intel'] },
            { letter: 'F', name: 'Forensics', acronym: '', definition: 'The process of collecting, preserving, analyzing, and presenting digital evidence to reconstruct security incidents and support legal proceedings.', source: 'Threatpedia', roles: ['ir-forensics'] },
            { letter: 'F', name: 'Fuzz Testing', acronym: 'Fuzzing', definition: 'An automated software testing technique that provides random, unexpected, or malformed data as input to a program to discover bugs, crashes, and security vulnerabilities.', source: 'SANS', roles: ['appsec-devsecops','pentest-red'] },
            { letter: 'F', name: 'Fuzzer', acronym: '', definition: 'an automated software testing method that injects invalid, malformed, or unexpected inputs into a system to reveal software defects and vulnerabilities', source: 'NICCS/CISA', roles: ['ciso','soc'] },
            { letter: 'F', name: 'Fuzzing', acronym: '', definition: 'An automated software testing technique that provides random, malformed, or unexpected input to discover vulnerabilities. Used in both offensive testing and secure development.', source: 'SANS', roles: ['pentest-red','appsec-devsecops'] },
            { letter: 'G', name: 'Gap Analysis', acronym: '', definition: 'An assessment comparing current security posture against a desired state or framework requirements. Identifies areas needing improvement to achieve compliance or security goals.', source: 'SANS', roles: ['grc','ciso'] },
            { letter: 'G', name: 'Gateway', acronym: '', definition: 'A network node that serves as an access point to another network, often involving protocol conversion. Security gateways filter traffic between networks.', source: 'Allot', roles: ['network-infra'] },
            { letter: 'G', name: 'GDPR', acronym: 'General Data Protection Regulation', definition: 'A European Union regulation that protects personal data and privacy of EU residents. Applies to organizations worldwide that process EU resident data.', source: 'Threatpedia', roles: ['grc'] },
            { letter: 'G', name: 'Geofencing', acronym: '', definition: 'to set up triggers so that when a device such as an internet-connected smartphone enters a defined geographical boundary, the user gets an alert', source: 'NICCS/CISA', roles: ['ciso','soc'] },
            { letter: 'G', name: 'GeoIP', acronym: '', definition: 'a technique allowing to locate a web user based on their IP address', source: 'NICCS/CISA', roles: ['ciso','soc'] },
            { letter: 'G', name: 'Georedundancy', acronym: '', definition: 'the distribution of mission-critical components or infrastructures across multiple geographic locations Geo-redundancy acts as a safety in case of primary site failures or in the event of a disaster or an outage that impacts a region.', source: 'NICCS/CISA', roles: ['ciso','soc'] },
            { letter: 'G', name: 'Golden Ticket', acronym: '', definition: 'A forged Kerberos TGT (Ticket Granting Ticket) created using a stolen KRBTGT account hash, granting the attacker unlimited access to any resource in an Active Directory domain.', source: 'SANS', roles: ['pentest-red','ir-forensics','threat-hunter'] },
            { letter: 'G', name: 'Golden Ticket Attack', acronym: '', definition: 'A Kerberos-based attack where an attacker creates a forged Ticket Granting Ticket using the KRBTGT account hash, enabling unrestricted access to any service in an Active Directory domain.', source: 'SANS', roles: ['pentest-red','ir-forensics','threat-hunter'] },
            { letter: 'G', name: 'Governance', acronym: '', definition: 'The processes and structures for making and enforcing decisions, managing risk, and ensuring compliance with policies.', source: 'Threatpedia', roles: ['ciso'] },
            { letter: 'G', name: 'Grayware', acronym: '', definition: 'Software that falls between legitimate software and malware. Includes adware, spyware, and potentially unwanted programs (PUPs) that may not be explicitly malicious but affect system performance.', source: 'Allot', roles: ['soc'] },
            { letter: 'G', name: 'GRC Platform', acronym: '', definition: 'An integrated technology platform that helps organizations manage governance, risk, and compliance activities in a unified manner. Streamlines audits, risk assessments, and policy management.', source: 'SANS', roles: ['grc','ciso'] },
            { letter: 'G', name: 'Grey Box Testing', acronym: '', definition: 'A testing methodology where the tester has partial knowledge of the target system. Combines elements of black box and white box testing approaches.', source: 'SANS', roles: ['pentest-red'] },
            { letter: 'H', name: 'Hack-for-Hire', acronym: '', definition: 'Commercial services offered by individuals or groups who perform cyber attacks for paying clients. Operates as a shadow economy enabling those without technical skills to launch attacks.', source: 'Huntress', roles: ['threat-intel'] },
            { letter: 'H', name: 'Hackathon', acronym: '', definition: 'A gathering of individuals from various backgrounds and different stages in their careers (hobbyist to professionals) to solve problems of common interest.', source: 'NICCS/CISA', roles: ['ciso','soc'] },
            { letter: 'H', name: 'Hacker', acronym: '', definition: 'An unauthorized user who attempts to or gains access to an information system.', source: 'NICCS/CISA', roles: ['ciso','network-infra','pentest-red','threat-intel'] },
            { letter: 'H', name: 'Hacker Ethic', acronym: '', definition: 'A philosophical approach to computing that emphasizes sharing, openness, decentralization, free access to computers, and world improvement. Distinguishes white hat from black hat motivations.', source: 'SANS', roles: ['pentest-red'] },
            { letter: 'H', name: 'Hardening', acronym: '', definition: 'The process of securing a system by reducing its attack surface through disabling unnecessary services, applying patches, configuring security settings, and removing default accounts.', source: 'SANS', roles: ['network-infra','cloud-sec','soc'] },
            { letter: 'H', name: 'Hardware Security Module', acronym: 'HSM', definition: 'A dedicated crypto processor that manages digital keys, performs encryption and decryption, and provides strong authentication. Tamper-resistant physical device.', source: 'SANS', roles: ['network-infra','cloud-sec'] },
            { letter: 'H', name: 'Hash Function', acronym: '', definition: 'A mathematical function that converts an input into a fixed-size output. Cryptographic hash functions are one-way, deterministic, and collision-resistant.', source: 'SANS', roles: ['appsec-devsecops','ir-forensics'] },
            { letter: 'H', name: 'Hash Value', acronym: '', definition: 'A numeric value resulting from applying a mathematical algorithm against a set of data such as a file.', source: 'NICCS/CISA', roles: ['network-infra','appsec-devsecops'], related: 'hashing', synonyms: 'cryptographic hash value' },
            { letter: 'H', name: 'Hashing', acronym: '', definition: 'A cryptographic process that converts input data into a fixed-size string of characters. Should be one-way and collision-resistant.', source: 'Threatpedia', roles: ['network-infra','appsec-devsecops'], related: 'hash value' },
            { letter: 'H', name: 'Havoc C2', acronym: '', definition: 'An open-source post-exploitation command and control framework used by threat actors as an alternative to Cobalt Strike, providing features such as payload generation, shellcode execution, and encrypted communications.', source: 'Threatpedia', roles: ['threat-hunter','ir-forensics','pentest-red'] },
            { letter: 'H', name: 'Hazard', acronym: '', definition: 'A natural or man-made source or cause of harm or difficulty.', source: 'NICCS/CISA', roles: ['ciso','soc'], related: 'threat' },
            { letter: 'H', name: 'Health Insurance Portability and Accountability Act', acronym: 'HIPAA', definition: 'A US federal law establishing national standards for protecting sensitive patient health information from disclosure without patient consent or knowledge.', source: 'SANS', roles: ['grc'] },
            { letter: 'H', name: 'Heartbleed', acronym: '', definition: 'A critical vulnerability in the OpenSSL cryptographic software library (CVE-2014-0160) that allowed stealing of information protected by TLS encryption. Affected millions of servers worldwide.', source: 'SANS', roles: ['network-infra','appsec-devsecops'] },
            { letter: 'H', name: 'HIDS', acronym: 'Host-Based Intrusion Detection System', definition: 'An intrusion detection system that monitors and analyzes the internals of a computing system, including system calls, file modifications, and log files, rather than network traffic.', source: 'SANS', roles: ['soc','network-infra'] },
            { letter: 'H', name: 'High Availability', acronym: 'HA', definition: 'A system design approach that ensures a certain degree of operational continuity during a given measurement period. Typically measured in nines (99.9%, 99.99%, etc.).', source: 'SANS', roles: ['network-infra','ciso'] },
            { letter: 'H', name: 'HIPAA', acronym: 'Health Insurance Portability and Accountability Act', definition: 'A U.S. law requiring healthcare organizations to protect patient privacy and secure electronic protected health information (ePHI).', source: 'Threatpedia', roles: ['grc'] },
