            { letter: 'H', name: 'Homomorphic Encryption', acronym: '', definition: 'An encryption scheme that allows computations to be performed on encrypted data without decrypting it first, producing results identical to those performed on plaintext.', source: 'SANS', roles: ['cloud-sec','appsec-devsecops'] },
            { letter: 'H', name: 'Honeynetting', acronym: '', definition: 'a network set up with intentional vulnerabilities hosted on a decoy server to attract hackers', source: 'NICCS/CISA', roles: ['ciso','soc'] },
            { letter: 'H', name: 'Honeyport', acronym: '', definition: 'a computer security mechanism set to detect, deflect, or, in some manner, counteract attempts at unauthorized use of information', source: 'NICCS/CISA', roles: ['network-infra'], related: 'Honeypot' },
            { letter: 'H', name: 'Honeypot', acronym: '', definition: 'a computer security mechanism set to detect, deflect, or, in some manner, counteract attempts at unauthorized use of information', source: 'NICCS/CISA', roles: ['ciso','soc','threat-hunter','threat-intel'], related: 'Honeyport' },
            { letter: 'H', name: 'Honeytoken', acronym: '', definition: 'A fake piece of data (credential, file, database record) planted to detect unauthorized access. When accessed, it triggers an alert indicating a potential breach.', source: 'SANS', roles: ['threat-hunter','soc'] },
            { letter: 'H', name: 'Honeytokens', acronym: '', definition: 'is data that looks attractive to cyber criminals but is actually false or of no value a fake IT resource created and positioned in a system or network to appear to a cyber criminals to be of value, but is actually used to allow tracking and detection of hacking attempts', source: 'NICCS/CISA', roles: ['ciso','soc'], related: 'Honeypot' },
            { letter: 'H', name: 'Host Intrusion Prevention System', acronym: 'HIPS', definition: 'A security agent installed on a host that monitors system calls, file system modifications, and network activity to detect and prevent malicious behavior in real-time.', source: 'SANS', roles: ['soc','network-infra'] },
            { letter: 'H', name: 'Host-Based Firewall', acronym: '', definition: 'A software firewall installed on individual computers that filters incoming and outgoing network traffic for that specific host based on a defined set of security rules.', source: 'SANS', roles: ['network-infra'] },
            { letter: 'H', name: 'Host-Based Intrusion Detection', acronym: 'HIDS', definition: 'An intrusion detection system that monitors a single host for suspicious activity by analyzing system logs, file changes, and process behavior.', source: 'SANS', roles: ['soc','network-infra'] },
            { letter: 'H', name: 'HTTP Response Splitting', acronym: '', definition: 'A web application vulnerability that allows attackers to inject arbitrary HTTP response headers by inserting CRLF characters into response data.', source: 'Threatpedia', roles: ['threat-hunter','pentest-red'] },
            { letter: 'H', name: 'HTTP Strict Transport Security', acronym: 'HSTS', definition: 'A web security policy mechanism that forces browsers to interact with websites only over HTTPS connections, protecting against protocol downgrade attacks and cookie hijacking.', source: 'SANS', roles: ['appsec-devsecops','network-infra'] },
            { letter: 'H', name: 'HTTPS', acronym: 'Hypertext Transfer Protocol Secure', definition: 'The secure version of HTTP that uses TLS encryption to protect data exchanged between a web browser and website. Essential for protecting sensitive transactions online.', source: 'Allot', roles: ['network-infra','appsec-devsecops'] },
            { letter: 'H', name: 'HTTPS Inspection', acronym: '', definition: 'The practice of decrypting, inspecting, and re-encrypting HTTPS traffic at a security appliance to detect threats hiding within encrypted communications.', source: 'SANS', roles: ['network-infra','soc'] },
            { letter: 'H', name: 'Human Intelligence', acronym: 'HUMINT', definition: 'Intelligence gathered through human sources such as informants, interviews, and observations. Often combined with technical intelligence for complete threat understanding.', source: 'Threatpedia', roles: ['threat-intel'] },
            { letter: 'H', name: 'Human-Operated Ransomware', acronym: '', definition: 'Ransomware attacks that involve active human involvement by attackers who manually navigate networks, escalate privileges, and deploy ransomware after reconnaissance, rather than automated propagation.', source: 'Huntress', roles: ['ir-forensics','threat-intel'] },
            { letter: 'H', name: 'Hybrid Cloud', acronym: '', definition: 'An IT environment that combines on-premises infrastructure with public cloud services, allowing data and applications to move between environments.', source: 'Threatpedia', roles: ['cloud-sec'] },
            { letter: 'H', name: 'Hypervisor Security', acronym: '', definition: 'Security measures protecting the hypervisor layer in virtualized environments. Vulnerabilities in hypervisors can allow VM escape attacks affecting all hosted virtual machines.', source: 'SANS', roles: ['cloud-sec','network-infra'] },
            { letter: 'I', name: 'IaC', acronym: 'Information Assurance Component\\nInfrastructure as code', definition: 'The process of managing and provisioning an organization’s IT infrastructure using machine-readable configuration files, rather than employing physical hardware configuration or interactive configuration tools.', source: 'NICCS/CISA', roles: ['ciso','soc'] },
            { letter: 'I', name: 'Ict Supply Chain Threat', acronym: '', definition: 'A man-made threat achieved through exploitation of the information and communications technology (ICT) system’s supply chain, including acquisition processes.', source: 'NICCS/CISA', roles: ['appsec-devsecops'], related: 'supply chain, threat' },
            { letter: 'I', name: 'IDaaS', acronym: 'identity as a Service', definition: 'a cloud-based identity and access management (IAM) offered by a third-party provider', source: 'NICCS/CISA', roles: ['cloud-sec'] },
            { letter: 'I', name: 'Identity and Access Management', acronym: 'IAM', definition: 'A security framework that manages user identities and their access to resources. Controls who can access what, when, and under what conditions.', source: 'Threatpedia', roles: ['ciso','network-infra'] },
            { letter: 'I', name: 'Identity Provider', acronym: 'IdP', definition: 'A system that creates, maintains, and manages identity information for principals and provides authentication services to relying applications within a federation or distributed network.', source: 'SANS', roles: ['ciso','cloud-sec'] },
            { letter: 'I', name: 'Identity Theft', acronym: '', definition: 'The fraudulent acquisition and use of another person\'s private identifying information, typically for financial gain. Often enabled by data breaches and phishing.', source: 'Allot', roles: ['ciso','grc'] },
            { letter: 'I', name: 'Identity Threat Detection', acronym: 'ITDR', definition: 'Security solutions focused on detecting and responding to identity-based attacks such as credential theft, privilege escalation, and account takeover.', source: 'Huntress', roles: ['soc','ir-forensics'] },
            { letter: 'I', name: 'IDPS', acronym: 'Intrusion Detection and Prevention System', definition: 'Software that automates the process of monitoring the events occurring in a computer system or network and analyzing them for signs of possible incidents and attempting to stop detected possible incidents', source: 'NICCS/CISA', roles: ['soc'] },
            { letter: 'I', name: 'IEC 62443', acronym: '', definition: 'An international standard for Industrial Control Systems (ICS) security, providing requirements and procedures for securing critical infrastructure systems.', source: 'Threatpedia', roles: ['ciso','soc'] },
            { letter: 'I', name: 'IIoT', acronym: 'Industrial Internet of Things', definition: 'the collection of sensors, instruments and autonomous devices connected through the internet to industrial applications', source: 'NICCS/CISA', roles: ['ciso','soc'] },
            { letter: 'I', name: 'Image Steganography', acronym: '', definition: 'The practice of hiding secret data within an image file. Used by threat actors to conceal malware payloads, C2 communications, or exfiltrated data within seemingly innocent images.', source: 'SANS', roles: ['threat-intel','threat-hunter'] },
            { letter: 'I', name: 'Immutable Backup', acronym: '', definition: 'Backup data that cannot be modified, deleted, or encrypted by ransomware. Ensures recovery capability even if primary and secondary systems are compromised.', source: 'Huntress', roles: ['ciso','ir-forensics'] },
            { letter: 'I', name: 'Immutable Infrastructure', acronym: '', definition: 'An approach where servers and infrastructure components are never modified after deployment. Instead, new versions are built and deployed to replace old ones, reducing configuration drift.', source: 'SANS', roles: ['cloud-sec','appsec-devsecops'] },
            { letter: 'I', name: 'Impersonization', acronym: '', definition: 'An attack type targeted phishing attack where a malicious actor pretends to be someone else or other entities to steal sensitive data', source: 'NICCS/CISA', roles: ['soc','threat-hunter'] },
            { letter: 'I', name: 'Implicit Trust', acronym: '', definition: 'Trust granted automatically based on network location or other static attributes without continuous verification. The antithesis of zero trust architecture.', source: 'SANS', roles: ['ciso','network-infra'] },
            { letter: 'I', name: 'Incident', acronym: '', definition: 'An occurrence that actually or potentially results in adverse consequences to (adverse effects on) (poses a threat to) an information system or the information that the system processes, stores, or transmits and that may require a response action to mitigate the consequences. An occurrence that constitutes a violation or imminent threat of violation of security policies, security procedures, or acceptable use policies.', source: 'NICCS/CISA', roles: ['soc'], related: 'event' },
            { letter: 'I', name: 'Incident Classification', acronym: '', definition: 'The process of categorizing security incidents by type, severity, and priority to ensure appropriate response. Common categories include malware, unauthorized access, and data breach.', source: 'SANS', roles: ['soc','ir-forensics'] },
            { letter: 'I', name: 'Incident Commander', acronym: 'IC', definition: 'The person responsible for overall management of an incident response operation. Coordinates resources, makes critical decisions, and communicates with stakeholders.', source: 'SANS', roles: ['ir-forensics','ciso'] },
            { letter: 'I', name: 'Incident Management', acronym: '', definition: 'The management and coordination of activities associated with an actual or potential occurrence of an event that may result in adverse consequences to information or information systems.', source: 'NICCS/CISA', roles: ['soc'] },
            { letter: 'I', name: 'Incident Playbook', acronym: '', definition: 'A documented procedure for responding to specific types of security incidents. Includes detection, containment, eradication, and recovery steps.', source: 'Threatpedia', roles: ['soc','ir-forensics'] },
            { letter: 'I', name: 'Incident Response', acronym: '', definition: 'The activities that address the short-term, direct effects of an incident and may also support short-term recovery. In the Workforce framework, cybersecurity work where a person: Responds to crisis or urgent situations within the pertinent domain to mitigate immediate and potential threats; uses mitigation, preparedness, and response and recovery approaches, as needed, to maximize survival of life, preservation of property, and information security. Investigates and analyzes all relevant response activities.', source: 'NICCS/CISA', roles: ['soc','ir-forensics'], related: 'recovery', synonyms: 'response' },
            { letter: 'I', name: 'Incident Response Plan', acronym: 'IRP', definition: 'A formal document outlining procedures for detecting, responding to, and recovering from security incidents. Includes roles, responsibilities, and contact information.', source: 'Threatpedia', roles: ['soc','ir-forensics'] },
            { letter: 'I', name: 'Indicator', acronym: '', definition: 'An occurrence or sign that an incident may have occurred or may be in progress.', source: 'NICCS/CISA', roles: ['threat-intel'], related: 'precursor' },
            { letter: 'I', name: 'Indicator of Attack', acronym: 'IOA', definition: 'Proactive indicators that focus on detecting attacker intent and behavior rather than specific artifacts. More difficult to change than IOCs and provide earlier detection.', source: 'SANS', roles: ['threat-hunter','soc','threat-intel'] },
            { letter: 'I', name: 'Indicator of Compromise', acronym: 'IOC', definition: 'Observable artifacts or evidence of a security incident, such as IP addresses, domain names, file hashes, or email addresses. Used to detect and investigate breaches.', source: 'Threatpedia', roles: ['ir-forensics','threat-intel'] },
            { letter: 'I', name: 'Industrial Control System', acronym: '', definition: 'An information system used to control industrial processes such as manufacturing, product handling, production, and distribution or to control infrastructure assets.', source: 'NICCS/CISA', roles: ['ciso','soc'], related: 'Supervisory Control and Data Acquisition, Operations Technology' },
            { letter: 'I', name: 'InfiniBand', acronym: '', definition: 'a high-speed, low-latency interconnect standard used in high-performance computing (HPC), supercomputers, and AI data centers', source: 'NICCS/CISA', roles: ['ciso','soc'] },
            { letter: 'I', name: 'Information And Communication(S) Technology', acronym: '', definition: 'Any information technology, equipment, or interconnected system or subsystem of equipment that processes, transmits, receives, or interchanges data or information.', source: 'NICCS/CISA', roles: ['soc'], related: 'information technology' },
            { letter: 'I', name: 'Information Assurance', acronym: '', definition: 'The measures that protect and defend information and information systems by ensuring their availability, integrity, and confidentiality.', source: 'NICCS/CISA', roles: ['ciso','soc'], related: 'information security' },
            { letter: 'I', name: 'Information Assurance Compliance', acronym: '', definition: 'In the NICE Framework, cybersecurity work where a person: Oversees, evaluates, and supports the documentation, validation, and accreditation processes necessary to assure that new IT systems meet the organization\'s information assurance and security requirements; ensures appropriate treatment of risk, compliance, and assurance from internal and external perspectives.', source: 'NICCS/CISA', roles: ['ciso','grc'] },
            { letter: 'I', name: 'Information Rights Management', acronym: 'IRM', definition: 'Technology that controls how documents and emails can be used by restricting actions such as copying, printing, forwarding, and editing even after distribution.', source: 'SANS', roles: ['grc','ciso'] },
            { letter: 'I', name: 'Information Security', acronym: 'InfoSec', definition: 'The practice of protecting information and systems from unauthorized access, modification, and disruption. Broader than cybersecurity.', source: 'Threatpedia', roles: ['ciso','network-infra'] },
            { letter: 'I', name: 'Information Security Policy', acronym: '', definition: 'An aggregate of directives, regulations, rules, and practices that prescribe how an organization manages, protects, and distributes information.', source: 'NICCS/CISA', roles: ['ciso','grc'], related: 'security policy' },
            { letter: 'I', name: 'Information Sharing', acronym: '', definition: 'An exchange of data, information, and/or knowledge to manage risks or respond to incidents.', source: 'NICCS/CISA', roles: ['threat-intel'] },
            { letter: 'I', name: 'Information Sharing and Analysis Center', acronym: 'ISAC', definition: 'A non-profit organization that provides a central resource for gathering and sharing information on cyber threats within specific industry sectors.', source: 'SANS', roles: ['threat-intel','ciso'] },
            { letter: 'I', name: 'Information System Resilience', acronym: '', definition: 'The ability of an information system to: (1) continue to operate under adverse conditions or stress, even if in a degraded or debilitated state, while maintaining essential operational capabilities; and (2) recover effectively in a timely manner.', source: 'NICCS/CISA', roles: ['ciso','soc'], related: 'resilience' },
            { letter: 'I', name: 'Information Systems Security Operations', acronym: '', definition: 'In the NICE Framework, cybersecurity work where a person: Oversees the information assurance program of an information system in or outside the network environment; may include procurement duties (e.g., Information Systems Security Office', source: 'NICCS/CISA', roles: ['ciso','soc'] },
            { letter: 'I', name: 'Information Technology', acronym: '', definition: 'Any equipment or interconnected system or subsystem of equipment that processes, transmits, receives, or interchanges data or information.', source: 'NICCS/CISA', roles: ['soc'], related: 'information and communication(s) technology' },
            { letter: 'I', name: 'InfoSec', acronym: 'Information Security', definition: 'the processes and tools designed and deployed to protect sensitive business information from modification, disruption, destruction, and inspection', source: 'NICCS/CISA', roles: ['ciso','soc'] },
            { letter: 'I', name: 'Infrastructure as a Service', acronym: 'IaaS', definition: 'A cloud service model providing virtualized computing resources over the internet, including VMs, storage, and networking. Customer is responsible for OS and application security.', source: 'Threatpedia', roles: ['ciso','soc'] },
            { letter: 'I', name: 'Infrastructure as Code', acronym: 'IaC', definition: 'The practice of managing and provisioning infrastructure through machine-readable definition files rather than manual processes. Security includes scanning templates for misconfigurations.', source: 'SANS', roles: ['cloud-sec','appsec-devsecops'] },
            { letter: 'I', name: 'Infrastructure as Code Security', acronym: 'IaC Security', definition: 'Security practices for scanning and securing infrastructure-as-code templates (Terraform, CloudFormation) for misconfigurations and compliance violations.', source: 'Threatpedia', roles: ['ciso','soc'] },
            { letter: 'I', name: 'Ingress Filtering', acronym: '', definition: 'The practice of monitoring and restricting inbound network traffic to block unauthorized or potentially malicious packets from entering the network.', source: 'SANS', roles: ['network-infra'] },
            { letter: 'I', name: 'Initial Access', acronym: '', definition: 'The first technique used by an attacker to gain a foothold in a target environment. Common methods include phishing, exploiting public-facing applications, and valid accounts.', source: 'Huntress', roles: ['threat-hunter','pentest-red','soc'] },
            { letter: 'I', name: 'Initial Access Broker', acronym: 'IAB', definition: 'A cybercriminal who specializes in gaining unauthorized access to corporate networks and selling that access to other threat actors, particularly ransomware operators.', source: 'Huntress', roles: ['threat-intel'] },
            { letter: 'I', name: 'Input Validation', acronym: '', definition: 'The process of ensuring that user-supplied data meets expected criteria before processing. A critical defense against injection attacks and other input-based vulnerabilities.', source: 'SANS', roles: ['appsec-devsecops'] },
            { letter: 'I', name: 'Insecure Deserialization', acronym: '', definition: 'A vulnerability that occurs when untrusted data is deserialized without proper validation, allowing attackers to execute arbitrary code. Commonly found in Java, Python, and PHP applications when handling serialized objects.', source: 'Threatpedia', roles: ['pentest-red'] },
            { letter: 'I', name: 'Inside( R) Threat', acronym: '', definition: 'A person or group of persons within an organization who pose a potential risk through violating security policies. One or more individuals with the access and/or inside knowledge of a company, organization, or enterprise that would allow them to exploit the vulnerabilities of that entity\'s security, systems, services, products, or facilities with the intent to cause harm.', source: 'NICCS/CISA', roles: ['soc','threat-hunter'], related: 'outside( r) threat' },
            { letter: 'I', name: 'Insider Threat', acronym: '', definition: 'A security risk that originates from within the organization — employees, former employees, contractors, or business associates who misuse authorized access.', source: 'SANS', roles: ['ciso','soc','threat-hunter'] },
            { letter: 'I', name: 'Integrated Risk Management', acronym: '', definition: 'The structured approach that enables an enterprise or organization to share risk information and risk analysis and to synchronize independent yet complementary risk management strategies to unify efforts across the enterprise.', source: 'NICCS/CISA', roles: ['ciso'], related: 'risk management, enterprise risk management' },
            { letter: 'I', name: 'Integrity', acronym: '', definition: 'A security principle ensuring that data and systems are accurate, complete, and have not been altered by unauthorized parties.', source: 'Threatpedia', roles: ['ciso','soc'], related: 'availability, confidentiality, data integrity, system integrity' },
            { letter: 'I', name: 'Intelligence-Led Security', acronym: '', definition: 'A security approach that prioritizes actions based on threat intelligence and risk analysis rather than random or firefighting responses.', source: 'Threatpedia', roles: ['threat-intel'] },
            { letter: 'I', name: 'Intent', acronym: '', definition: 'A state of mind or desire to achieve an objective.', source: 'NICCS/CISA', roles: ['ciso','soc'], related: 'capability' },
            { letter: 'I', name: 'Interactive Application Security Testing', acronym: 'IAST', definition: 'A security testing approach that combines SAST and DAST, instrumenting applications to provide detailed insight into vulnerabilities.', source: 'Threatpedia', roles: ['appsec-devsecops'] },
            { letter: 'I', name: 'Internet Key Exchange', acronym: 'IKE', definition: 'A protocol used to set up security associations in the IPSec protocol suite. Negotiates the security parameters and manages the exchange of cryptographic keys.', source: 'SANS', roles: ['network-infra'] },
            { letter: 'I', name: 'Internet of Things', acronym: 'IoT', definition: 'The network of physical devices, vehicles, and appliances embedded with sensors and connectivity. IoT devices often have limited security capabilities.', source: 'Allot', roles: ['network-infra','ciso'] },
            { letter: 'I', name: 'Interoperability', acronym: '', definition: 'The ability of two or more systems or components to exchange information and to use the information that has been exchanged.', source: 'NICCS/CISA', roles: ['ciso','soc'] },
            { letter: 'I', name: 'Intrusion', acronym: '', definition: 'An unauthorized act of bypassing the security mechanisms of a network or information system.', source: 'NICCS/CISA', roles: ['ciso','soc'], synonyms: 'penetration' },
            { letter: 'I', name: 'Intrusion Detection', acronym: '', definition: 'The process and methods for analyzing information from networks and information systems to determine if a security breach or security violation has occurred.', source: 'NICCS/CISA', roles: ['soc'] },
            { letter: 'I', name: 'Intrusion Detection System', acronym: 'IDS', definition: 'A network security device that monitors network traffic for suspicious activity and alerts administrators when potential intrusions are detected. Can be host-based or network-based.', source: 'Threatpedia', roles: ['soc','network-infra'] },
            { letter: 'I', name: 'Intrusion Prevention System', acronym: 'IPS', definition: 'Similar to IDS but capable of automatically blocking or preventing detected attacks. Actively protects the network rather than just detecting threats.', source: 'Threatpedia', roles: ['soc','network-infra'] },
            { letter: 'I', name: 'Investigate', acronym: '', definition: 'a NICE Framework category consisting of specialty areas responsible for the investigation of cyber events and/or crimes of IT systems, networks, and digital evidence', source: 'NICCS/CISA', roles: ['ciso','soc'] },
            { letter: 'I', name: 'Investigation', acronym: '', definition: 'A systematic and formal inquiry into a qualified threat or incident using digital forensics and perhaps other traditional criminal inquiry techniques to determine the events that transpired and to collect evidence. In the NICE Framework, cybersecurity work where a person: Applies tactics, techniques, and procedures for a full range of investigative tools and processes to include but not limited to interview and interrogation techniques, surveillance, counter surveillance, and surveillance detection, and appropriately balances the benefits of prosecution versus intelligence gathering.', source: 'NICCS/CISA', roles: ['soc','threat-hunter','ir-forensics'] },
            { letter: 'I', name: 'IoA', acronym: 'Indicators of Attack', definition: 'a clue that a malicious entity has gained, or is attempting to gain, unauthorised access to the network or assets connected to the network', source: 'NICCS/CISA', roles: ['ciso','network-infra'] },
            { letter: 'I', name: 'IoAs', acronym: 'Indicators of attack', definition: 'refers to the series of behaviors that a cybercriminal exhibits prior to executing a cyberattack. Indicators of attack are not so much a static description of the attacker, but a dynamic profile of how an attacker interacts with your technologies and users.', source: 'NICCS/CISA', roles: ['soc','threat-hunter'] },
            { letter: 'I', name: 'IoC', acronym: 'Indicators of Compromise', definition: 'clues and evidence of a data breach', source: 'NICCS/CISA', roles: ['threat-hunter'] },
            { letter: 'I', name: 'IoT Security', acronym: '', definition: 'Security practices for Internet of Things devices and networks, addressing unique challenges of resource-constrained embedded systems.', source: 'Threatpedia', roles: ['ciso','soc'] },
            { letter: 'I', name: 'IP Address', acronym: '', definition: 'A numerical label assigned to each device connected to a computer network. Used for identification and location addressing in network communications.', source: 'Allot', roles: ['network-infra'] },
            { letter: 'I', name: 'IP Spoofing', acronym: '', definition: 'The creation of IP packets with a forged source address to impersonate another system or hide the origin of an attack. Used in DDoS and MITM attacks.', source: 'SANS', roles: ['network-infra','pentest-red'] },
            { letter: 'I', name: 'IPSec', acronym: 'Internet Protocol Security', definition: 'a set of communication rules or protocols for setting up secure connections over a network Internet Protocol (IP) is the common standard that determines how data travels over the internet. IPSec adds encryption and authentication to make the protocol more secure.', source: 'NICCS/CISA', roles: ['network-infra'] },
            { letter: 'I', name: 'ISO 27001', acronym: '', definition: 'An international standard for information security management systems (ISMS). Specifies requirements for establishing, implementing, maintaining, and improving an ISMS.', source: 'SANS', roles: ['grc','ciso'] },
            { letter: 'I', name: 'ISO/IEC 27001', acronym: '', definition: 'An international standard for establishing, implementing, and maintaining an information security management system (ISMS). Provides comprehensive security requirements and controls for organizations.', source: 'Threatpedia', roles: ['grc'] },
            { letter: 'J', name: 'Jailbreaking', acronym: '', definition: 'The process of removing manufacturer restrictions on mobile devices to gain root access and install unauthorized software. Increases the attack surface of the device.', source: 'SANS', roles: ['pentest-red','soc'] },
            { letter: 'J', name: 'JSON Web Token', acronym: 'JWT', definition: 'A standard for creating digitally signed tokens that assert claims about users. Used for stateless authentication in web and mobile applications.', source: 'Threatpedia', roles: ['ciso','network-infra'] },
            { letter: 'J', name: 'Jump Server', acronym: '', definition: 'A hardened intermediary system used to access and manage devices in a separate security zone. Provides controlled access and audit logging for administrative connections.', source: 'SANS', roles: ['network-infra','cloud-sec'] },
            { letter: 'J', name: 'Just-In-Time Access', acronym: 'JIT', definition: 'A privileged access management approach that grants temporary, time-limited access to resources only when needed, automatically revoking access after the task is completed.', source: 'SANS', roles: ['cloud-sec','ciso'] },
            { letter: 'K', name: 'Kerberoasting', acronym: '', definition: 'An attack technique that extracts service account credential hashes from Active Directory for offline cracking. Targets accounts with Service Principal Names (SPNs).', source: 'SANS', roles: ['pentest-red','threat-hunter'] },
            { letter: 'K', name: 'Kerberos', acronym: '', definition: 'A network authentication protocol that uses tickets to allow nodes to prove their identity securely. The default authentication protocol in Windows Active Directory environments.', source: 'SANS', roles: ['network-infra','pentest-red','ir-forensics'] },
            { letter: 'K', name: 'Key Escrow', acronym: '', definition: 'An arrangement where cryptographic keys are held in escrow by a trusted third party, allowing authorized access to encrypted data under specific circumstances.', source: 'SANS', roles: ['grc','ciso'] },
            { letter: 'K', name: 'Key Management', acronym: '', definition: 'The process of managing cryptographic keys throughout their lifecycle, including generation, distribution, storage, rotation, and destruction.', source: 'SANS', roles: ['ciso','cloud-sec'] },
            { letter: 'K', name: 'Key Management Service', acronym: 'KMS', definition: 'A cloud service that securely generates, stores, and manages cryptographic keys used for encryption. Centralizes key lifecycle management.', source: 'Threatpedia', roles: ['network-infra','appsec-devsecops'] },
            { letter: 'K', name: 'Key Performance Indicator', acronym: 'KPI', definition: 'In security, measurable values used to evaluate the effectiveness of security programs. Includes metrics like MTTD, MTTR, vulnerability remediation time, and patch compliance rates.', source: 'SANS', roles: ['ciso','grc'] },
            { letter: 'K', name: 'Key Risk Indicator', acronym: 'KRI', definition: 'A metric used to provide an early signal of increasing risk exposure. Enables proactive risk management by monitoring leading indicators before incidents occur.', source: 'SANS', roles: ['ciso','grc'] },
            { letter: 'K', name: 'Keylogger', acronym: '', definition: 'Malware or hardware device that records keyboard inputs to capture passwords and sensitive information. Can be hardware-based or software-based.', source: 'Threatpedia', roles: ['soc'] },
            { letter: 'K', name: 'Keystores', acronym: '', definition: 'Repositories that contain cryptographic artifacts like certificates and private keys that are used for cryptographic protocols such as TLS', source: 'NICCS/CISA', roles: ['network-infra','appsec-devsecops'] },
            { letter: 'K', name: 'Kill Chain', acronym: '', definition: 'A military concept adapted for cybersecurity that describes the stages of a cyber attack from reconnaissance to actions on objectives. Breaking any link disrupts the attack.', source: 'SANS', roles: ['threat-hunter','soc','threat-intel'] },
            { letter: 'K', name: 'Kill Switch', acronym: '', definition: 'A mechanism built into software or systems that can immediately disable or shut down functionality. In malware, a domain or condition that stops the malware from executing.', source: 'SANS', roles: ['ir-forensics','soc'] },
            { letter: 'K', name: 'Killware', acronym: '', definition: 'Malware designed to cause physical harm or endanger human life by targeting critical infrastructure such as healthcare, water treatment, or transportation systems.', source: 'SANS', roles: ['threat-intel','ciso'] },
            { letter: 'K', name: 'Knowledge Management', acronym: '', definition: 'In the NICE Framework, cybersecurity work where a person: Manages and administers processes and tools that enable the organization to identify, document, and access intellectual capital and information content.', source: 'NICCS/CISA', roles: ['grc'] },
            { letter: 'K', name: 'Kubernetes Security', acronym: '', definition: 'Security measures for protecting Kubernetes orchestration platforms and containerized workloads. Includes RBAC, network policies, and pod security policies.', source: 'Threatpedia', roles: ['cloud-sec'] },
            { letter: 'K', name: 'Kubernetes Security Posture Management', acronym: 'KSPM', definition: 'A security practice that identifies misconfigurations and compliance violations in Kubernetes clusters by monitoring pods, namespace policies, container registries, Helm charts, and pod security policies against security benchmarks.', source: 'Threatpedia', roles: ['cloud-sec','appsec-devsecops'] },
            { letter: 'L', name: 'LaaS', acronym: 'Logging as a service', definition: 'an IT architectural model for centrally ingesting and collecting any type of log files coming from any given source or location such as servers, applications, and devices', source: 'NICCS/CISA', roles: ['ciso','soc'] },
            { letter: 'L', name: 'LangSec', acronym: 'Language Security', definition: 'a design and programming philosophy that focuses on formally correct and verifiable input handling throughout all phases of the software development lifecycle', source: 'NICCS/CISA', roles: ['ciso','soc'] },
            { letter: 'L', name: 'Large Language Model Security', acronym: 'LLM Security', definition: 'Security considerations for large language models including prompt injection, model extraction, and data leakage. Addresses unique threats in generative AI.', source: 'Threatpedia', roles: ['soc','threat-hunter'] },
            { letter: 'L', name: 'Lateral Movement', acronym: '', definition: 'Techniques used by attackers to move through a network after initial access, pivoting between systems to reach target data or assets. A key phase in advanced attacks.', source: 'SANS', roles: ['threat-hunter','ir-forensics','pentest-red'] },
            { letter: 'L', name: 'LDAP Injection', acronym: '', definition: 'An attack that exploits LDAP query construction vulnerabilities by injecting malicious LDAP syntax. Attackers can authenticate as other users or extract sensitive directory information.', source: 'Threatpedia', roles: ['pentest-red'] },
            { letter: 'L', name: 'Least Privilege', acronym: '', definition: 'A security principle that restricts user and system access rights to the minimum necessary to perform required functions. Users and applications should have only the permissions they need, reducing the attack surface and limiting potential damage from compromised accounts.', source: 'Threatpedia', roles: ['soc','threat-hunter'] },
            { letter: 'L', name: 'Legal Advice And Advocacy', acronym: '', definition: 'In the NICE Framework, cybersecurity work where a person: Provides legally sound advice and recommendations to leadership and staff on a variety of relevant topics within the pertinent subject domain; advocates legal and policy changes and makes a case on behalf of client via a wide range of written and oral work products, including legal briefs and proceedings.', source: 'NICCS/CISA', roles: ['ciso','grc'] },
            { letter: 'L', name: 'Lessons Learned', acronym: '', definition: 'The post-incident review phase where an organization documents what happened, what went well, what could be improved, and action items to strengthen future incident response.', source: 'SANS', roles: ['ir-forensics','ciso'] },
            { letter: 'L', name: 'Living off the Cloud', acronym: 'LotC', definition: 'An attack methodology where adversaries leverage legitimate cloud-native administrative tools, APIs, identity systems, and management consoles to conduct malicious operations, blending attack traffic with normal enterprise cloud usage to evade detection. Also tracked as Living off the XaaS (LotX).', source: 'Threatpedia', roles: ['cloud-sec','threat-hunter','soc'], related: 'living off the land' },
            { letter: 'L', name: 'Living off the Land', acronym: 'LOL', definition: 'An attack technique that uses legitimate system tools and features (PowerShell, WMI, certutil) to carry out malicious activities, avoiding detection by traditional security tools.', source: 'SANS', roles: ['threat-hunter','ir-forensics','soc'] },
            { letter: 'L', name: 'LLM Security', acronym: '', definition: 'The practice of identifying and mitigating security risks specific to Large Language Model applications, including prompt injection, training data poisoning, sensitive information disclosure, and supply chain vulnerabilities in model components.', source: 'OWASP', roles: ['appsec-devsecops','threat-intel','pentest-red'] },
            { letter: 'L', name: 'Log Aggregation', acronym: '', definition: 'The process of collecting log data from multiple sources into a centralized system for analysis, correlation, and retention. Foundation of SIEM and security monitoring.', source: 'SANS', roles: ['soc','network-infra'] },
            { letter: 'L', name: 'Log Management', acronym: '', definition: 'The process of collecting, storing, analyzing, and retaining log data from various sources for security monitoring, compliance, and forensic investigation purposes.', source: 'SANS', roles: ['soc','grc'] },
            { letter: 'L', name: 'Log4Shell', acronym: '', definition: 'A critical remote code execution vulnerability (CVE-2021-44228) in the Apache Log4j logging library. One of the most severe vulnerabilities ever discovered, affecting millions of applications.', source: 'SANS', roles: ['appsec-devsecops','soc'] },
            { letter: 'L', name: 'Logic Bomb', acronym: '', definition: 'Malicious code that remains dormant until a specific trigger condition is met, then executes a harmful action. Often placed by insiders with system access.', source: 'Threatpedia', roles: ['soc'] },
            { letter: 'L', name: 'LOLBAS', acronym: 'Living Off the Land Binaries and Scripts', definition: 'A curated list of legitimate Windows binaries and scripts that can be abused for malicious purposes. Includes tools like PowerShell, certutil, and mshta.', source: 'Huntress', roles: ['threat-hunter','ir-forensics'] },
            { letter: 'M', name: 'MAC Address', acronym: 'Media Access Control', definition: 'A unique hardware identifier assigned to network interfaces. Used for communication within a network segment and can be spoofed to bypass MAC-based access controls.', source: 'SANS', roles: ['network-infra'] },
            { letter: 'M', name: 'MAC Flooding', acronym: '', definition: 'An attack against network switches that floods the MAC address table with fake MAC addresses, causing the switch to operate as a hub and enabling traffic sniffing.', source: 'SANS', roles: ['pentest-red','network-infra'] },
            { letter: 'M', name: 'Machine Learning And Evolution', acronym: '', definition: 'A field concerned with designing and developing artificial intelligence algorithms for automated knowledge discovery and innovation by information systems.', source: 'NICCS/CISA', roles: ['ciso','soc'] },
            { letter: 'M', name: 'Macro Virus', acronym: '', definition: 'A type of malicious code that attaches itself to documents and uses the macro programming capabilities of the document’s application to execute, replicate, and spread or propagate itself.', source: 'NICCS/CISA', roles: ['ciso','soc'], related: 'virus' },
            { letter: 'M', name: 'Malicious Applet', acronym: '', definition: 'A small application program that is automatically downloaded and executed and that performs an unauthorized function on an information system.', source: 'NICCS/CISA', roles: ['ciso','soc'], related: 'malicious code' },
            { letter: 'M', name: 'Malicious Code', acronym: '', definition: 'Program code intended to perform an unauthorized function or process that will have adverse impact on the confidentiality, integrity, or availability of an information system. Includes software, firmware, and scripts.', source: 'NICCS/CISA', roles: ['ciso','soc','appsec-devsecops'], related: 'malicious logic' },
            { letter: 'M', name: 'Malicious Logic', acronym: '', definition: 'Hardware, firmware, or software that is intentionally included or inserted in a system to perform an unauthorized function or process that will have adverse impact on the confidentiality, integrity, or availability of an information system.', source: 'NICCS/CISA', roles: ['soc'], related: 'malicious code' },
            { letter: 'M', name: 'Malvertising', acronym: '', definition: 'a malicious attack that involves injecting harmful code into legitimate online advertising networks', source: 'NICCS/CISA', roles: ['soc','threat-hunter'] },
            { letter: 'M', name: 'Malware', acronym: '', definition: 'Software that compromises the operation of a system by performing an unauthorized function or process.', source: 'NICCS/CISA', roles: ['soc','threat-hunter'], synonyms: 'malicious code, malicious applet, malicious logic' },
            { letter: 'M', name: 'Malware Analysis', acronym: '', definition: 'The process of studying malware behavior, capabilities, and origin through static analysis (examining code) and dynamic analysis (executing in a sandbox).', source: 'SANS', roles: ['ir-forensics','threat-intel','threat-hunter'] },
            { letter: 'M', name: 'Malware Sandbox', acronym: '', definition: 'An isolated virtual environment used to safely execute and analyze suspicious files or URLs without risking infection of production systems.', source: 'SANS', roles: ['soc','ir-forensics','threat-intel'] },
            { letter: 'M', name: 'Man-in-the-Middle', acronym: 'MITM', definition: 'An attack where the attacker intercepts communications between two parties to eavesdrop or modify data without their knowledge. Commonly used on unencrypted connections and in ARP spoofing or DNS hijacking scenarios.', source: 'Threatpedia', roles: ['soc','threat-hunter'] },
            { letter: 'M', name: 'Man-in-the-Middle Attack', acronym: 'MITM', definition: 'An attack where the attacker secretly intercepts and relays messages between two parties who believe they are communicating directly. Can capture or alter data in transit.', source: 'Allot', roles: ['pentest-red','network-infra'] },
            { letter: 'M', name: 'Managed Detection and Response', acronym: 'MDR', definition: 'A cybersecurity service that provides organizations with threat monitoring, detection, and response capabilities through a combination of technology and human expertise.', source: 'Huntress', roles: ['soc','ciso'] },
            { letter: 'M', name: 'Managed Firewall', acronym: '', definition: 'A firewall service operated and maintained by a managed security service provider, including rule management, monitoring, and incident response.', source: 'SANS', roles: ['network-infra'] },
            { letter: 'M', name: 'Managed Security Service Provider', acronym: 'MSSP', definition: 'A third-party company that provides outsourced monitoring and management of security devices and systems. Offers 24/7 security operations.', source: 'Huntress', roles: ['ciso'] },
            { letter: 'M', name: 'Managed Service Provider', acronym: 'MSP', definition: 'A third-party company that remotely manages a customer\'s IT infrastructure and end-user systems. MSP compromise is a major supply chain attack vector.', source: 'Huntress', roles: ['ciso'] },
            { letter: 'M', name: 'Mandatory Access Control', acronym: 'MAC', definition: 'An access control model where the operating system constrains the ability of a subject to access or perform operations on objects based on security labels and clearances.', source: 'SANS', roles: ['grc','ciso'] },
            { letter: 'M', name: 'Maturity Model', acronym: '', definition: 'A framework for assessing the sophistication of an organization\'s security capabilities. Examples include CMMI and the NIST Cybersecurity Framework maturity levels.', source: 'SANS', roles: ['grc','ciso'] },
            { letter: 'M', name: 'MD5', acronym: '', definition: 'A cryptographic hash function that produces a 128-bit hash value. Now considered cryptographically broken and should not be used for sensitive applications.', source: 'Threatpedia', roles: ['network-infra','appsec-devsecops'] },
            { letter: 'M', name: 'Mean Time to Detect', acronym: 'MTTD', definition: 'The average time it takes to discover a security incident after it occurs. A critical metric for evaluating security operations effectiveness.', source: 'SANS', roles: ['soc','ciso'] },
            { letter: 'M', name: 'Mean Time to Respond', acronym: 'MTTR', definition: 'The average time it takes to contain and remediate a security incident after detection. Used to measure incident response team efficiency.', source: 'SANS', roles: ['soc','ciso','ir-forensics'] },
            { letter: 'M', name: 'Meltdown', acronym: '', definition: 'A hardware vulnerability affecting Intel processors that allows unauthorized reading of kernel memory from user space, potentially exposing sensitive data across virtual machine boundaries.', source: 'SANS', roles: ['network-infra'] },
            { letter: 'M', name: 'Memory Forensics', acronym: '', definition: 'Forensic analysis of a system\'s RAM to recover artifacts, running processes, and evidence of malware that may not appear on disk.', source: 'Threatpedia', roles: ['ir-forensics'] },
            { letter: 'M', name: 'Metadata', acronym: '', definition: 'Data that describes other data, including file properties, communication headers, and geolocation information. Can reveal sensitive information even when content is encrypted.', source: 'SANS', roles: ['threat-intel','ir-forensics'] },
            { letter: 'M', name: 'Metamorphic Malware', acronym: '', definition: 'Malware that rewrites its entire code structure with each iteration, creating functionally equivalent but structurally different variants. More sophisticated than polymorphic malware.', source: 'Threatpedia', roles: ['soc','threat-hunter'] },
            { letter: 'M', name: 'Metaverse', acronym: '', definition: 'A shared, immersive, persistent, 3D virtual space where humans experience life in ways they could not in the physical world', source: 'NICCS/CISA', roles: ['ciso','soc'], related: 'virtual reality' },
            { letter: 'M', name: 'Microsegmentation', acronym: '', definition: 'A network security technique that creates fine-grained security zones within data centers or cloud environments, applying policies to individual workloads.', source: 'SANS', roles: ['network-infra','cloud-sec'] },
            { letter: 'M', name: 'Mishandling of Exceptional Conditions', acronym: '', definition: 'An OWASP Top 10:2025 category covering vulnerabilities that arise from improper error handling, failing open, logical errors, and abnormal condition processing. Encompasses 24 CWEs related to how applications respond to unexpected states.', source: 'OWASP', roles: ['appsec-devsecops'] },
            { letter: 'M', name: 'Mitigation', acronym: '', definition: 'The application of one or more measures to reduce the likelihood of an unwanted occurrence and/or lessen its consequences. Implementing appropriate risk-reduction controls based on risk management priorities and analysis of alternatives.', source: 'NICCS/CISA', roles: ['ciso','soc'] },
            { letter: 'M', name: 'MitM', acronym: 'Man in the Middle', definition: 'a man-in-the-middle attack is a cyberattack where the attacker secretly relays and possibly alters the communications between two parties who believe that they are directly communicating', source: 'NICCS/CISA', roles: ['soc','threat-hunter'] },
            { letter: 'M', name: 'MITRE ATT&CK', acronym: '', definition: 'A globally accessible knowledge base of adversary tactics and techniques derived from real-world observations. Provides a structured framework for understanding and categorizing attacker behavior.', source: 'Threatpedia', roles: ['threat-hunter'] },
            { letter: 'M', name: 'MITRE D3FEND', acronym: '', definition: 'A knowledge graph of defensive cybersecurity countermeasures and their relationships to offensive techniques. Complements ATT&CK by mapping defenses.', source: 'Huntress', roles: ['soc','threat-hunter','ciso'] },
            { letter: 'M', name: 'Mobile Device Management', acronym: 'MDM', definition: 'Software that allows IT administrators to control, secure, and enforce policies on smartphones, tablets, and other endpoints. Enables remote wipe, encryption enforcement, and app management.', source: 'SANS', roles: ['ciso'] },
            { letter: 'M', name: 'Mobile Malware', acronym: '', definition: 'Malware specifically designed to compromise mobile devices like smartphones and tablets, often disguised as legitimate applications.', source: 'Threatpedia', roles: ['soc','threat-hunter'] },
            { letter: 'M', name: 'Model Poisoning', acronym: '', definition: 'An attack that introduces malicious data into training datasets to compromise ML model behavior. Results in models that behave unexpectedly or maliciously.', source: 'Threatpedia', roles: ['grc'] },
            { letter: 'M', name: 'Moving Target Defense', acronym: '', definition: 'The presentation of a dynamic attack surface, increasing an adversary\'s work factor necessary to probe, attack, or maintain presence in a cyber target.', source: 'NICCS/CISA', roles: ['soc','threat-hunter'] },
            { letter: 'M', name: 'Multi-Factor Authentication', acronym: 'MFA', definition: 'A security mechanism that requires users to provide two or more verification factors before granting access. Factors include something you know (password), have (phone), or are (biometric).', source: 'Threatpedia', roles: ['ciso','network-infra'] },
            { letter: 'M', name: 'Multi-Tenant', acronym: '', definition: 'A software architecture where a single instance serves multiple customers (tenants) with logical data separation. Raises security concerns about data isolation.', source: 'SANS', roles: ['cloud-sec','appsec-devsecops'] },
            { letter: 'M', name: 'Multi-Vector Attack', acronym: '', definition: 'An attack that uses multiple methods simultaneously or sequentially to compromise a target. Increases complexity for defenders and reduces single-point detection.', source: 'Huntress', roles: ['soc','threat-hunter'] },
            { letter: 'N', name: 'NAC', acronym: 'Network Access Control', definition: 'A security solution that restricts access to a network based on the identity and security posture of the connecting device, enforcing security policies before granting access.', source: 'SANS', roles: ['network-infra'] },
            { letter: 'N', name: 'NCCoE', acronym: 'National Cybersecurity Center of Excellence', definition: 'A NIST public-private partnership that enables the creation of practical cybersecurity solutions for specific industries or broad, cross-sector technology challenges', source: 'NICCS/CISA', roles: ['ciso','soc'] },
            { letter: 'N', name: 'Netflow', acronym: '', definition: 'A network protocol for collecting IP traffic information and monitoring network flow. Used for network traffic analysis, security monitoring, and forensic investigation.', source: 'SANS', roles: ['soc','network-infra'] },
            { letter: 'N', name: 'Network Access Control', acronym: 'NAC', definition: 'A security system that enforces policies for network device access based on device identity, compliance status, and authorization level.', source: 'Threatpedia', roles: ['network-infra'] },
            { letter: 'N', name: 'Network Address Translation', acronym: 'NAT', definition: 'A method of remapping one IP address space to another by modifying network address information in packet headers. Provides a layer of security by hiding internal network addresses.', source: 'Allot', roles: ['network-infra'] },
            { letter: 'N', name: 'Network Detection and Response', acronym: 'NDR', definition: 'A security tool that monitors network traffic and behavior for advanced threats, lateral movement, and data exfiltration that traditional tools may miss.', source: 'Threatpedia', roles: ['soc','network-infra'] },
            { letter: 'N', name: 'Network Forensics', acronym: '', definition: 'The capture, recording, and analysis of network traffic to discover the source of security incidents. Uses packet capture, flow data, and protocol analysis.', source: 'SANS', roles: ['ir-forensics','network-infra'] },
            { letter: 'N', name: 'Network Intrusion Detection', acronym: 'NIDS', definition: 'An intrusion detection system that monitors network traffic for suspicious patterns. Deployed at strategic points to analyze traffic passing through the network.', source: 'SANS', roles: ['network-infra','soc'] },
            { letter: 'N', name: 'Network Resilience', acronym: '', definition: 'The ability of a network to: (1) provide continuous operation (i.e., highly resistant to disruption and able to operate in a degraded mode if damaged); (2) recover effectively if failure does occur; and (3) scale to meet rapid or unpredictable demands.', source: 'NICCS/CISA', roles: ['network-infra'] },
            { letter: 'N', name: 'Network Security', acronym: '', definition: 'The practice of protecting computer networks from threats through hardware, software, and procedural measures. Encompasses access control, monitoring, and threat prevention.', source: 'Allot', roles: ['network-infra','ciso'] },
            { letter: 'N', name: 'Network Segmentation', acronym: '', definition: 'The practice of dividing a network into separate segments or subnets with controlled access between them. Limits the spread of breaches and contains lateral movement.', source: 'Threatpedia', roles: ['network-infra'] },
            { letter: 'N', name: 'Network Services', acronym: '', definition: 'In the NICE Framework, cybersecurity work where a person: Installs, configures, tests, operates, maintains, and manages networks and their firewalls, including hardware (e.g., hubs, bridges, switches, multiplexers, routers, cables, proxy servers, and protective distributor systems) and software that permit the sharing and transmission of all spectrum transmissions of information to support the security of information and information systems.', source: 'NICCS/CISA', roles: ['network-infra'] },
            { letter: 'N', name: 'Network Tap', acronym: '', definition: 'A hardware device placed on a network to passively capture full-duplex traffic without disrupting the network. Used for monitoring, security analysis, and forensics.', source: 'SANS', roles: ['network-infra','soc'] },
            { letter: 'N', name: 'Network Traffic Analysis', acronym: 'NTA', definition: 'The process of intercepting, recording, and analyzing network traffic to detect threats, characterize anomalies, and identify suspicious activity.', source: 'Huntress', roles: ['network-infra','soc','threat-hunter'] },
            { letter: 'N', name: 'Neuroergonomics', acronym: '', definition: 'The emerging field that studies how the brain relates to performance in everyday settings and at work, integrating neuroscience and ergonomics to design safer and more efficient systems and understand brain-performance relationships.', source: 'NICCS/CISA', roles: ['ciso','soc'] },
            { letter: 'N', name: 'Neuromorphic', acronym: '', definition: 'Neuromorphic computing is a method of computing that uses artificial neurons to mimic the human brain\'s structure and function. The word "neuromorphic" means "characteristic of the shape of the brain or neurons"', source: 'NICCS/CISA', roles: ['ciso','soc'] },
            { letter: 'N', name: 'NewSQL', acronym: '', definition: 'relational database system that bridges the gap between SQL and NoSQL. NewSQL databases aim to scale and stay consistent.', source: 'NICCS/CISA', roles: ['ciso','soc'] },
            { letter: 'N', name: 'Next-Generation Firewall', acronym: 'NGFW', definition: 'A firewall that combines traditional firewall capabilities with advanced features including application awareness, intrusion prevention, and cloud-delivered threat intelligence.', source: 'SANS', roles: ['network-infra'] },
            { letter: 'N', name: 'NIDS', acronym: 'Network Intrusion Detection System', definition: 'An intrusion detection system that monitors network traffic for suspicious activity and known attack patterns, analyzing packets as they traverse network segments.', source: 'SANS', roles: ['soc','network-infra'] },
            { letter: 'N', name: 'NIST Cybersecurity Framework', acronym: 'NIST CSF', definition: 'A set of guidelines, standards, and practices for managing cybersecurity risks developed by the National Institute of Standards and Technology. Covers five functions: Identify, Protect, Detect, Respond, and Recover.', source: 'Threatpedia', roles: ['ciso','grc'] },
            { letter: 'N', name: 'NIST SP 800-171', acronym: '', definition: 'Security requirements for protecting controlled unclassified information (CUI) in nonfederal information systems. Commonly required for contractors handling government data.', source: 'Threatpedia', roles: ['grc'] },
            { letter: 'N', name: 'NIST SP 800-53', acronym: '', definition: 'A specialized publication providing recommendations for security controls for federal information systems. Includes detailed security control families and implementation guidance.', source: 'Threatpedia', roles: ['grc'] },
            { letter: 'N', name: 'Non-Human Identity', acronym: 'NHI', definition: 'Any digital identity — such as service accounts, API keys, OAuth tokens, bots, or workload identities — that authenticates and operates autonomously without direct human control. NHIs outnumber human identities by ratios of 10:1 to 50:1 in typical enterprises and are a growing attack surface.', source: 'Threatpedia', roles: ['cloud-sec','ciso','network-infra'] },
            { letter: 'N', name: 'Non-Repudiation', acronym: '', definition: 'A security property ensuring that a user cannot deny having performed an action. Achieved through digital signatures and audit logs.', source: 'Threatpedia', roles: ['ciso','soc','network-infra','appsec-devsecops'], related: 'integrity, authenticity' },
            { letter: 'N', name: 'Nonce', acronym: '', definition: 'A number used once in a cryptographic communication to prevent replay attacks. Ensures that old communications cannot be reused in replay attacks.', source: 'SANS', roles: ['network-infra','appsec-devsecops'] },
            { letter: 'N', name: 'Noob', acronym: '', definition: 'a person who is inexperienced in a particular sphere or activity, especially as related to computing', source: 'NICCS/CISA', roles: ['ciso','soc'] },
            { letter: 'N', name: 'NTLM', acronym: 'NT LAN Manager', definition: 'A legacy Microsoft authentication protocol suite. Vulnerable to pass-the-hash and relay attacks; organizations are encouraged to migrate to Kerberos.', source: 'SANS', roles: ['pentest-red','network-infra','ir-forensics'] },
            { letter: 'N', name: 'Nuclei Scanner', acronym: '', definition: 'An open-source vulnerability scanner by ProjectDiscovery that uses YAML-based templates for automated, community-driven scanning of web applications, APIs, and network services for known vulnerabilities.', source: 'Threatpedia', roles: ['pentest-red','appsec-devsecops'] },
            { letter: 'O', name: 'OAuth', acronym: 'Open Authorization standard', definition: 'An open authorization framework that allows users to authorize third-party applications to access their resources without sharing passwords. Widely used for social login.', source: 'Threatpedia', roles: ['ciso','network-infra','grc'] },
            { letter: 'O', name: 'Obfuscation', acronym: '', definition: 'The deliberate act of making code or data difficult to understand or analyze. Used by malware authors to evade detection and by developers to protect intellectual property.', source: 'SANS', roles: ['threat-hunter','ir-forensics','appsec-devsecops'] },
            { letter: 'O', name: 'Object', acronym: '', definition: 'A passive information system-related entity containing or receiving information.', source: 'NICCS/CISA', roles: ['ciso','soc'], related: 'subject, access, access control' },
            { letter: 'O', name: 'OCSF', acronym: 'Open Cybersecurity Schema Framework', definition: 'An open-source schema framework for normalizing security event data across different security tools and vendors, enabling better data sharing and correlation.', source: 'SANS', roles: ['soc','ciso'] },
            { letter: 'O', name: 'OffSec', acronym: 'Offensive Security', definition: 'the proactive approach to securing networks and systems from attacks by actively seeking out vulnerabilities and weaknesses', source: 'NICCS/CISA', roles: ['soc','threat-hunter'] },
            { letter: 'O', name: 'Open-Source Intelligence', acronym: 'OSINT', definition: 'Intelligence gathered from publicly available sources such as social media, news, government records, and academic publications. Commonly used in threat analysis and reconnaissance.', source: 'Threatpedia', roles: ['threat-intel'] },
            { letter: 'O', name: 'OpenID Connect', acronym: 'OIDC', definition: 'An identity layer built on top of OAuth 2.0 that provides user authentication and profile information. Combines authentication with authorization capabilities.', source: 'Threatpedia', roles: ['ciso','network-infra'] },
            { letter: 'O', name: 'OpenIOC', acronym: 'Open Indicators of Compromise', definition: 'An extensible XML schema that enables you to describe the technical characteristics that identify a known threat, an attacker\'s methodology, or other evidence of compromise.', source: 'NICCS/CISA', roles: ['threat-hunter'] },
            { letter: 'O', name: 'Operate & Maintain', acronym: '', definition: 'A NICE Framework category consisting of specialty areas responsible for providing the support, administration, and maintenance necessary to ensure effective and efficient IT system performance and security.', source: 'NICCS/CISA', roles: ['grc'] },
            { letter: 'O', name: 'Operation Masquerade', acronym: '', definition: 'A 2026 FBI court-authorized law enforcement operation that disrupted Russian APT28 DNS hijacking infrastructure by performing remote DNS resets on thousands of compromised SOHO routers across 120+ countries.', source: 'Threatpedia', roles: ['threat-intel','network-infra'] },
            { letter: 'O', name: 'Operational Exercise', acronym: '', definition: 'An action-based exercise where personnel rehearse reactions to an incident scenario, drawing on their understanding of plans and procedures, roles, and responsibilities. Also referred to as operations-based exercise.', source: 'NICCS/CISA', roles: ['ciso','soc'] },
            { letter: 'O', name: 'Operational Technology', acronym: 'OT', definition: 'Hardware and software that detects or causes changes through direct monitoring and control of physical devices, processes, and events in industrial environments.', source: 'Allot', roles: ['network-infra','ciso'] },
            { letter: 'O', name: 'Operations Technology', acronym: '', definition: 'The hardware and software systems used to operate industrial control devices.', source: 'NICCS/CISA', roles: ['soc'], related: 'Industrial Control System' },
            { letter: 'O', name: 'OS Command Injection', acronym: '', definition: 'A vulnerability that allows attackers to execute arbitrary operating system commands through vulnerable application input. Often occurs when user input is passed unsanitized to shell commands or system calls.', source: 'Threatpedia', roles: ['pentest-red'] },
            { letter: 'O', name: 'OSINT', acronym: 'Open Source Intelligence', definition: 'Intelligence collected from publicly available sources including social media, websites, public records, and technical data. Used in reconnaissance and threat intelligence.', source: 'SANS', roles: ['threat-intel','pentest-red'] },
            { letter: 'O', name: 'Out-of-Band Application Security Testing', acronym: 'OAST', definition: 'A technique that uses external callback servers to detect blind vulnerabilities by triggering out-of-band interactions (DNS, HTTP) from the target, confirming exploitation even when no in-band response is visible.', source: 'Threatpedia', roles: ['pentest-red','appsec-devsecops'] },
            { letter: 'O', name: 'Outside( R) Threat', acronym: '', definition: 'A person or group of persons external to an organization who are not authorized to access its assets and pose a potential risk to the organization and its assets.', source: 'NICCS/CISA', roles: ['soc','threat-hunter'], related: 'inside( r) threat' },
            { letter: 'O', name: 'Overfitting', acronym: '', definition: 'an undesirable machine learning behavior that occurs when the machine learning model gives accurate predictions for training data but not for new data', source: 'NICCS/CISA', roles: ['ciso','soc'] },
            { letter: 'O', name: 'Oversight & Development', acronym: '', definition: 'A NICE Framework category consisting of specialty areas providing leadership, management, direction, and/or development and advocacy so that all individuals and the organization may effectively conduct cybersecurity work.', source: 'NICCS/CISA', roles: ['ciso'] },
            { letter: 'O', name: 'OWASP', acronym: 'Open Web Application Security Project', definition: 'A nonprofit foundation working to improve the security of software. Produces freely available tools, standards, and knowledge including the OWASP Top 10.', source: 'SANS', roles: ['appsec-devsecops'] },
            { letter: 'O', name: 'OWASP Top 10', acronym: '', definition: 'A list of the ten most critical web application security vulnerabilities compiled by the Open Worldwide Application Security Project. Updated regularly to reflect emerging threats.', source: 'Threatpedia', roles: ['soc','threat-hunter'] },
            { letter: 'P', name: 'PaaS', acronym: 'Platform as a Service', definition: 'a cloud computing model where a third-party provider delivers hardware and software tools to users over the internet', source: 'NICCS/CISA', roles: ['cloud-sec'] },
            { letter: 'P', name: 'Package Repository Security', acronym: '', definition: 'Security measures for protecting software package repositories (npm, PyPI, Maven) from malicious uploads and account compromise.', source: 'Threatpedia', roles: ['ciso','soc'] },
            { letter: 'P', name: 'Packet Capture', acronym: 'PCAP', definition: 'The interception and recording of network packets for analysis. Used for troubleshooting, intrusion detection, and forensic investigation of network security incidents.', source: 'SANS', roles: ['soc','ir-forensics','network-infra'] },
            { letter: 'P', name: 'Packet Sniffing', acronym: '', definition: 'The practice of intercepting and logging network traffic. Used legitimately for network diagnostics and by attackers to capture sensitive data in transit.', source: 'Allot', roles: ['network-infra','pentest-red'] },
            { letter: 'P', name: 'Pass-the-Hash', acronym: 'PtH', definition: 'An attack technique that uses stolen password hashes to authenticate without knowing the actual password. Exploits NTLM authentication in Windows environments.', source: 'SANS', roles: ['pentest-red','ir-forensics','threat-hunter'] },
            { letter: 'P', name: 'Pass-the-Ticket', acronym: 'PtT', definition: 'An attack technique that uses stolen Kerberos tickets to authenticate to services without needing the account password. Enables lateral movement in Active Directory.', source: 'SANS', roles: ['pentest-red','ir-forensics','threat-hunter'] },
            { letter: 'P', name: 'Passive Attack', acronym: '', definition: 'An actual assault perpetrated by an intentional threat source that attempts to learn or make use of information from a system, but does not attempt to alter the system, its resources, its data, or its operations.', source: 'NICCS/CISA', roles: ['pentest-red'], related: 'active attack' },
            { letter: 'P', name: 'Password', acronym: '', definition: 'A string of characters (letters, numbers, and other symbols) used to authenticate an identity or to verify access authorization.', source: 'NICCS/CISA', roles: ['ciso','network-infra'] },
            { letter: 'P', name: 'Password Manager', acronym: '', definition: 'A software application that generates, stores, and manages complex unique passwords for multiple accounts. Reduces the risk of password reuse and weak password selection.', source: 'SANS', roles: ['ciso'] },
            { letter: 'P', name: 'Password Spraying', acronym: '', definition: 'An attack that uses a few common passwords against many user accounts to avoid triggering account lockouts. Less detectable than traditional brute force attacks.', source: 'Threatpedia', roles: ['pentest-red'] },
            { letter: 'P', name: 'Passwordless', acronym: '', definition: 'an authentication method in which a user can log in to a computer system without the entering a password or any other knowledge-based secret', source: 'NICCS/CISA', roles: ['ciso','network-infra'] },
            { letter: 'P', name: 'Passwordless Authentication', acronym: '', definition: 'Authentication methods that do not rely on passwords, such as biometrics, hardware keys, or push notifications. Improves security by eliminating password-related vulnerabilities.', source: 'Threatpedia', roles: ['network-infra','appsec-devsecops'] },
            { letter: 'P', name: 'Patch Management', acronym: '', definition: 'The process of developing, testing, and deploying security patches to fix vulnerabilities. Essential for maintaining a secure infrastructure.', source: 'Threatpedia', roles: ['ciso','soc'] },
            { letter: 'P', name: 'Path Traversal', acronym: '', definition: 'A vulnerability that allows attackers to access files and directories outside the intended scope by using path sequences like "../" or "..\\".', source: 'Threatpedia', roles: ['pentest-red'] },
            { letter: 'P', name: 'Payload', acronym: '', definition: 'The component of malware that performs the malicious action, such as data theft, encryption, or system destruction. Delivered via exploits or social engineering.', source: 'SANS', roles: ['pentest-red','ir-forensics','soc'] },
            { letter: 'P', name: 'Payment Card Industry Data Security Standard', acronym: 'PCI DSS', definition: 'A set of security standards designed to ensure that all companies that accept, process, store, or transmit credit card information maintain a secure environment.', source: 'SANS', roles: ['grc'] },
            { letter: 'P', name: 'PCI DSS', acronym: 'Payment Card Industry Data Security Standard', definition: 'A security standard for organizations handling credit card information. Requires network security, access control, and regular testing.', source: 'Threatpedia', roles: ['grc'] },
            { letter: 'P', name: 'Pen Test', acronym: '', definition: 'A colloquial term for penetration test or penetration testing.', source: 'NICCS/CISA', roles: ['ciso','soc'] },
            { letter: 'P', name: 'Pen Test Report', acronym: '', definition: 'A formal document detailing the findings, methodology, and recommendations from a penetration test. Includes risk ratings, proof of concept, and remediation guidance.', source: 'SANS', roles: ['pentest-red','grc'] },
            { letter: 'P', name: 'Penetration Test', acronym: 'Pen Test', definition: 'An authorized, controlled security test where experts simulate real attacks to identify exploitable vulnerabilities and assess security controls.', source: 'Threatpedia', roles: ['pentest-red'] },
            { letter: 'P', name: 'Penetration Testing', acronym: '', definition: 'An evaluation methodology whereby assessors search for vulnerabilities and attempt to circumvent the security features of a network and/or information system.', source: 'NICCS/CISA', roles: ['pentest-red'] },
            { letter: 'P', name: 'Pentester', acronym: 'Penetration tester', definition: 'An information security expert who performs penetration tests', source: 'NICCS/CISA', roles: ['ciso','soc'] },
            { letter: 'P', name: 'Perfect Forward Secrecy', acronym: 'PFS', definition: 'A cryptographic property where compromise of long-term keys does not affect the security of past sessions. Session keys are independent and temporary.', source: 'Threatpedia', roles: ['network-infra','appsec-devsecops'] },
            { letter: 'P', name: 'Persistence', acronym: '', definition: 'Techniques used by attackers to maintain access to a compromised system across reboots and credential changes. Includes registry modifications, scheduled tasks, and implants.', source: 'SANS', roles: ['threat-hunter','ir-forensics','pentest-red'] },
            { letter: 'P', name: 'Personal Identifying Information / Personally Identifiable Information', acronym: '', definition: 'The information that permits the identity of an individual to be directly or indirectly inferred.', source: 'NICCS/CISA', roles: ['ciso','network-infra'] },
            { letter: 'P', name: 'PhaaS', acronym: '', definition: 'A model where cybercriminals offer pre-packaged phishing tools and resources, like malicious email templates, landing pages, and hosting, to others, effectively lowering the barrier to entry for launching phishing campaigns.', source: 'NICCS/CISA', roles: ['ciso','soc'] },
            { letter: 'P', name: 'Pharming', acronym: '', definition: 'An attack that redirects website traffic to a fraudulent site by poisoning DNS servers or modifying the hosts file. More dangerous than phishing as it doesn\'t require user action.', source: 'SANS', roles: ['network-infra','soc'] },
            { letter: 'P', name: 'Phishing', acronym: '', definition: 'A social engineering attack that uses fraudulent emails, messages, or websites to trick users into divulging sensitive information or downloading malware. Attackers impersonate trusted entities to create a sense of urgency or legitimacy.', source: 'Threatpedia', roles: ['pentest-red','ciso','soc'] },
            { letter: 'P', name: 'Phishing Kit', acronym: '', definition: 'A package of tools and templates that allows low-skill attackers to easily create and deploy phishing campaigns. Often sold or shared on underground forums.', source: 'Huntress', roles: ['threat-intel','soc'] },
            { letter: 'P', name: 'Phishing Simulation', acronym: '', definition: 'A controlled exercise that sends simulated phishing emails to employees to test security awareness and train them to recognize and report phishing attempts.', source: 'SANS', roles: ['ciso','soc'] },
            { letter: 'P', name: 'Pipeline Bill of Materials', acronym: 'PBOM', definition: 'An extension of the SBOM concept that maps the entire build pipeline from source control through deployment, providing traceability across every artifact, tool, and process involved in software delivery. Enhances supply chain transparency beyond code dependencies.', source: 'Threatpedia', roles: ['appsec-devsecops','grc'] },
            { letter: 'P', name: 'PIV', acronym: 'Personal Identity Verification', definition: 'an identification card issued by a federal agency that contains a computer chip, which allows it to receive, store, recall, and send information in a secure method', source: 'NICCS/CISA', roles: ['ciso','soc'] },
            { letter: 'P', name: 'Pivot', acronym: '', definition: 'A technique where an attacker uses a compromised system as a stepping stone to access other systems in the network. A key component of lateral movement.', source: 'SANS', roles: ['pentest-red','threat-hunter'] },
            { letter: 'P', name: 'Pivoting', acronym: '', definition: 'A technique where an attacker uses a compromised system as a launching point to attack other systems on the same network that are not directly accessible from the attacker\'s position.', source: 'SANS', roles: ['pentest-red','threat-hunter'] },
            { letter: 'P', name: 'PKI', acronym: 'Public Key Infrastructure', definition: 'A framework of hardware, software, policies, and procedures used to create, manage, distribute, and revoke digital certificates for secure electronic communication.', source: 'SANS', roles: ['network-infra','ciso'] },
            { letter: 'P', name: 'Plaintext', acronym: '', definition: 'Unencrypted information.', source: 'NICCS/CISA', roles: ['network-infra','appsec-devsecops'], related: 'ciphertext' },
            { letter: 'P', name: 'Platform as a Service', acronym: 'PaaS', definition: 'A cloud service model providing a platform for developing, testing, and deploying applications. Cloud provider manages infrastructure and OS security.', source: 'Threatpedia', roles: ['ciso','soc'] },
            { letter: 'P', name: 'Playbook', acronym: '', definition: 'A documented set of procedures and response steps for handling specific types of security incidents. Standardizes incident response and ensures consistent handling.', source: 'SANS', roles: ['soc','ir-forensics'] },
            { letter: 'P', name: 'Policy-as-Code', acronym: 'PaC', definition: 'The practice of defining security, compliance, and operational policies in machine-readable code that can be version-controlled, tested, and automatically enforced across infrastructure and CI/CD pipelines. Commonly implemented with tools like Open Policy Agent (OPA).', source: 'SANS', roles: ['appsec-devsecops','cloud-sec','grc'] },
            { letter: 'P', name: 'Polymorphic Malware', acronym: '', definition: 'Malware that changes its code and signature while maintaining functionality, evading signature-based detection. Uses encryption or code obfuscation to hide its presence.', source: 'Threatpedia', roles: ['soc','threat-hunter'] },
