#
# This file defines scheduled jobs and recurring tasks for Threatpedia agents.
# During Phase 0 freeze, only manual jobs are defined. Scheduled jobs will be
# enabled after the freeze lifts and the dangermouse-bot runtime is operational.
#
# JOB FORMAT:
#   - id: unique identifier (JOB-NNNN)
#     name: human-readable name
#     owner: which agent runs this (dangermouse | penfold | kernel-k | runtime)
#     trigger: manual | schedule | event
#     schedule: cron expression (only if trigger=schedule)
#     event: event name (only if trigger=event)
#     status: enabled | disabled | frozen
#     description: what this job does
#     references: list of related files/docs
#     last_run: ISO 8601 UTC of most recent run
#     next_run: ISO 8601 UTC of next scheduled run

